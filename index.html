const searchBlobs = HYMNS.map(h => {
  const parts = [h.title || "", h.first_line || ""];
  if (h.verses) parts.push(...h.verses);
  if (h.credits) {
    if (h.credits.author) parts.push(h.credits.author);
    if (h.credits.tune) parts.push(h.credits.tune);
  }
  return parts.join(" ").toLowerCase().replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
});

const $ = id => document.getElementById(id);
const listView = $("listView");
const search = $("search");
const searchClear = $("searchClear");
const countEl = $("count");
const detailView = $("detailView");
const hymnDetail = $("hymnDetail");

let currentHymnIdx = null;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 1);
  if (terms.length === 0) return escaped;
  const pattern = new RegExp("(" + terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|") + ")", "gi");
  return escaped.replace(pattern, "<mark>$1</mark>");
}

function renderList(query) {
  const q = query.trim().toLowerCase();
  const qNum = /^\d+$/.test(q) ? parseInt(q, 10) : null;
  
  let matches;
  if (!q) {
    matches = HYMNS.map((h, i) => ({ h, i, score: 0 }));
  } else if (qNum !== null) {
    // Search both current number AND old number
    matches = HYMNS.map((h, i) => ({ h, i, score: 0 }))
      .filter(({ h }) => String(h.number).includes(q) || (h.old_number && String(h.old_number).includes(q)));
    // Sort: exact match first, then current number matches before old
    matches.sort((a, b) => {
      const aExact = a.h.number === qNum || a.h.old_number === qNum;
      const bExact = b.h.number === qNum || b.h.old_number === qNum;
      if (aExact !== bExact) return bExact - aExact;
      const aCurrent = String(a.h.number).includes(q);
      const bCurrent = String(b.h.number).includes(q);
      if (aCurrent !== bCurrent) return bCurrent - aCurrent;
      return a.h.number - b.h.number;
    });
  } else {
    const terms = q.split(/\s+/).filter(t => t.length > 0);
    matches = [];
    HYMNS.forEach((h, i) => {
      const blob = searchBlobs[i];
      const titleBlob = (h.title || "").toLowerCase();
      let matched = terms.every(t => blob.includes(t));
      if (!matched) return;
      let score = 0;
      const firstLineBlob = (h.first_line || "").toLowerCase();
      terms.forEach(t => {
        if (titleBlob.includes(t)) score += 10;
        if (firstLineBlob.includes(t)) score += 3;
        if (titleBlob.startsWith(t)) score += 5;
      });
      matches.push({ h, i, score });
    });
    matches.sort((a, b) => b.score - a.score || a.h.number - b.h.number);
  }
  
  const total = HYMNS.length;
  if (!q) {
    countEl.textContent = `${total} hymns`;
  } else {
    countEl.textContent = `${matches.length} of ${total}`;
  }
  
  if (matches.length === 0) {
    listView.innerHTML = `<div class="empty">No hymns match "${escapeHtml(query)}"</div>`;
    return;
  }
  
  const html = matches.map(({ h, i }) => {
    const oldTag = h.old_number ? `<span class="old-num-tag">${h.old_number}</span>` : "";
    return `
      <div class="hymn-card" data-idx="${i}">
        <div class="hymn-card-header">
          <span class="hymn-num">${h.number}</span>
          <span class="hymn-title">${highlight(h.title || "Hymn " + h.number, q)}</span>
          ${oldTag}
        </div>
        ${h.first_line ? `<div class="hymn-first-line">${highlight(h.first_line, q)}</div>` : ""}
      </div>`;
  }).join("");
  
  listView.innerHTML = html;
  listView.querySelectorAll(".hymn-card").forEach(card => {
    card.addEventListener("click", () => {
      openHymn(parseInt(card.dataset.idx, 10));
    });
  });
}

function renderDetail(idx) {
  const h = HYMNS[idx];
  if (!h) return;
  currentHymnIdx = idx;
  
  const oldNum = h.old_number ? `<div class="detail-old-num">Previous hymnbook \u2116${h.old_number}</div>` : "";
  const versesHtml = (h.verses || []).map((v, idx) => `
    <div class="verse">
      <span class="verse-num">${idx + 1}</span>${escapeHtml(v)}
    </div>
  `).join("");
  
  const credits = h.credits || {};
  let creditsHtml = "";
  if (credits.author || credits.translator || credits.tune) {
    creditsHtml = `
      <div class="credits">
        ${credits.author ? `<div class="credit-line"><span class="credit-label">Author</span> <span class="credit-value">${escapeHtml(credits.author)}</span></div>` : ""}
        ${credits.translator ? `<div class="credit-line"><span class="credit-label">Translator</span> <span class="credit-value">${escapeHtml(credits.translator)}</span></div>` : ""}
        ${credits.tune ? `<div class="credit-line"><span class="credit-label">Tune</span> <span class="credit-value">${escapeHtml(credits.tune)}</span></div>` : ""}
      </div>`;
  }
  
  hymnDetail.innerHTML = `
    <div>
      <div class="detail-num">${h.number}</div>
      ${oldNum}
    </div>
    <h2 class="detail-title">${escapeHtml(h.title || "")}</h2>
    <hr class="detail-divider">
    <div class="verses">${versesHtml}</div>
    ${creditsHtml}
  `;
  
  $("prevBtn").disabled = idx === 0;
  $("nextBtn").disabled = idx === HYMNS.length - 1;
  window.scrollTo(0, 0);
}

function openHymn(idx) {
  document.body.classList.add("detail-mode");
  renderDetail(idx);
  history.pushState({ view: "detail", idx }, "", `#${HYMNS[idx].number}`);
}

function closeHymn() {
  document.body.classList.remove("detail-mode");
  currentHymnIdx = null;
  if (location.hash) {
    history.pushState({ view: "list" }, "", location.pathname);
  }
}

search.addEventListener("input", () => {
  renderList(search.value);
  searchClear.classList.toggle("visible", search.value.length > 0);
});
searchClear.addEventListener("click", () => {
  search.value = "";
  renderList("");
  searchClear.classList.remove("visible");
  search.focus();
});

$("backBtn").addEventListener("click", () => {
  if (history.state && history.state.view === "detail") {
    history.back();
  } else {
    closeHymn();
  }
});

$("prevBtn").addEventListener("click", () => {
  if (currentHymnIdx > 0) openHymn(currentHymnIdx - 1);
});
$("nextBtn").addEventListener("click", () => {
  if (currentHymnIdx < HYMNS.length - 1) openHymn(currentHymnIdx + 1);
});

const textSizes = ["", "text-large", "text-larger"];
let textSizeIdx = 0;
function applyTextSize() {
  document.body.classList.remove("text-large", "text-larger");
  if (textSizes[textSizeIdx]) document.body.classList.add(textSizes[textSizeIdx]);
}
applyTextSize();
$("textSizeBtn").addEventListener("click", () => {
  textSizeIdx = (textSizeIdx + 1) % textSizes.length;
  applyTextSize();
});

window.addEventListener("popstate", (e) => {
  if (e.state && e.state.view === "detail") {
    document.body.classList.add("detail-mode");
    renderDetail(e.state.idx);
  } else {
    document.body.classList.remove("detail-mode");
    currentHymnIdx = null;
  }
});

function handleInitialHash() {
  const hash = location.hash.replace("#", "");
  if (/^\d+$/.test(hash)) {
    const num = parseInt(hash, 10);
    const idx = HYMNS.findIndex(h => h.number === num);
    if (idx >= 0) {
      document.body.classList.add("detail-mode");
      renderDetail(idx);
      return;
    }
  }
}

renderList("");
handleInitialHash();

document.addEventListener("keydown", (e) => {
  if (document.body.classList.contains("detail-mode")) {
    if (e.key === "ArrowLeft" && currentHymnIdx > 0) openHymn(currentHymnIdx - 1);
    if (e.key === "ArrowRight" && currentHymnIdx < HYMNS.length - 1) openHymn(currentHymnIdx + 1);
    if (e.key === "Escape") history.back();
  } else {
    if (e.key === "/" && document.activeElement !== search) {
      e.preventDefault();
      search.focus();
    }
  }
});
</script>
</body>
</html>
