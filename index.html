ur heart, and mind, Agree to banish every kind, Of malice falsehood and disguise, And here on earth a paradise, Of peace and harmony maintain, Where concord and goodwill shall reign.", "For God observes our thoughts and deeds, The secrets of our heart He reads; The wicked cannot be concealed, Their evil ways shall be revealed, He every true believer knows, And love and grace on him bestows."], "credits": {"author": "T.H.Kingo (1634-1703) (Denmark)", "translator": "Ole T. Arneson (1853-1917)", "tune": "Vater Unser"}}, {"number": 136, "old_number": "327", "title": "How sweet is Thine abode", "first_line": "How sweet is Thine abode, Thou living God, my Lord; Thou here my soul sustaineth", "verses": ["How sweet is Thine abode, Thou living God, my Lord; Thou here my soul sustaineth, With living words sweet savor. For grace that Thou dost grant me, With joyful heart I thank Thee.", "O Lord of hosts, divine, For Thy blest courts I pine. There I find consolation, And rest in tribulation. My body, soul rejoices, Great thankfulness it voices.", "As swallows swiftly fly, Through dark and threatening sky, Back to their nests and nest- ling, Up in the highest sapling: Thus even to Thine altar, My soul doth long to enter.", "Incline Thine ear to me, Lord Sabaoth, hear my plea: Increase Thy kingdom ever, From Satan's might deliver. Bear me to be a member, Through blessed death life enter.", "One day within Thy courts, Is better far, dear Lord, Than all brief earthly pleasures, That perish with its treasures. Grant I may be doorkeeper, For Thee, dear Lord and Keeper.", "The Lord God is the Sun, And Shield in battle won, Thou art my surest Armor, 'Pon which I'm trusting ever. Thou givest grace and glory, And peaceable end for me."], "credits": {"author": "H.Spegel (1645-1714) (S", "tune": "AufMeinen Lieben"}}, {"number": 137, "old_number": "320", "title": "O day of rest and gladness", "first_line": "O day of rest and gladness, O day of joy and light, O balm of care and sadnss, M", "verses": ["O day of rest and gladness, O day of joy and light, O balm of care and sadnss, Most beautiful, most bright! On Thee the high and lowly, Through ages joined in tune, Sing holy, holy, holy! To the great God Triune.", "On Thee, at the creation, The light first had its birth; On Thee for our salvation, Christ rose from depths of earth; On Thee our Lord, victorious, The Spirit sent from heaven; And thus on Thee most glorious, A triple light was given.", "New graces ever gaining, From this our day of rest, We reach the rest remaining, To spirits ofthe blest. To Holy Ghost be praises, To Father, and to Son; The Church her voice upraises, To Thee, blest Three in One."], "credits": {"author": "C.Wordsworth (1862) (England)", "tune": "Aurelia"}}, {"number": 138, "old_number": null, "title": "Praise the Rock of our salvation", "first_line": "Praise the Rock of our salvation, Laud His name from zone to zone; On that Rock ", "verses": ["Praise the Rock of our salvation, Laud His name from zone to zone; On that Rock the church is builded, Christ himself the cornerstone; Vain against our rock-built Zion, Winds and waters, fire and hail; Christ is in her midst; against her, Sin and hell shall not prevail.", "Built of living stones, cemented, By the Spirit's unity, Based on prophets and apostles, Firm in faith and stayed on Thee, May Thy church, O Lord incarnate, Grow in grace, in peace, in love; Emblem of the heavenly Zion, The Jerusalem above.", "Where Thou reignest, King of Glory, Throned in everlasting light, Midst Thy saints, no more is needed, Sun by day, nor moon by night; Soon may we those portals enter, When this earthly strife is o'er; There to dwell with saints and angels, In Thy pres- ence evermore."], "credits": {"author": "B. Webb(1872) (England)", "tune": "Converse"}}, {"number": 139, "old_number": "323", "title": "The Church's one foundation", "first_line": "The Church's one foundation, Is Jesus Christ her Lord; She is His new creation, ", "verses": ["The Church's one foundation, Is Jesus Christ her Lord; She is His new creation, By water and the word; From heaven He came and sought her, To be His holy bride; With His own blood He bought her, And for her life He died.", "Elect from every nation, Yet one o'er allthe earth, Her charter of salvation, One Lord, one faith, one birth, One Holy name she blesses, Partakes one holy food, And to one hope, she presses With every grace endued.", "Though with a scornful wonder, Men see her sore oppressed, By schisms rent asunder, By heresies distressed; Yet saints their watch are keeping, Their cry goes up, \"How long?\" And soon the night of weeping, Shall be the morn of song."], "credits": {"author": "S.J.Stone (1866) (E", "tune": ""}}, {"number": 140, "old_number": "317", "title": "Grant that Thy Word may faithful be", "first_line": "Abide with us, O Savior dear, For dark and lowering clouds appear; And let Thy l", "verses": ["Abide with us, O Savior dear, For dark and lowering clouds appear; And let Thy light, Thy word divine, Continue in Thy church to shine.", "Lord Jesus, help, Thy church uphold, For we are weak, indifferent, cold; Give us Thy Spirit and Thy grace, And spread Thy truth in every place.", "And keep us steadfast in Thy word, Stay Satan's fatal wiles, O Lord; To us Thy grace and power reveal, And let Thy church, Thy presence feel.", "Thy word is in distress and need, Our comfort and defense indeed; By it Thy church keep pure within, And free from error, shame, and sin.", "Grant that Thy word may light our way, That we in darkness may not stray, But through this vale of sin and woe, May to the heavenly mansions go."], "credits": {"author": "Ph. Melanchthon u.1 1540,", "tune": "Ack,Bliu Hos Oss"}}, {"number": 141, "old_number": "324", "title": "Blessed is the man that feareth", "first_line": "Blessed is the man that never, Doth in godless counsel meet; Nor in ngland) sinn", "verses": ["Blessed is the man that never, Doth in godless counsel meet; Nor in sinner's way stands ever, Nor sits in the scorner's seat, But on God's all perfect law, Meditates with holy awe; Day and night he delves for treasure, In the word - 'tis all his pleasure.", "As a tree that has been planted, By the flowing waters fair, In its season e'er is granted, Fruits and foliage to bear, So is he, the righteous, seen. Ever fruitful, ever green, And his leaf shall wither never, All he does shall prosper ever.", "To the wicked 'tis not given, Such a happy lot to share; As the chaff by wind is driven, So shall the ungodly fare; They in judgment shall not stand, Nor be in the righteous band; These the Lord forsaketh ever, Those shall be cast off forever.", "For the Lord His people knoweth, His pure eyes behold their way, And the blessing He bestoweth, Is their heritage for aye: But the wicked ever tend, To their doom and to their end: God will all the righteous cherish, But the wicked ones shall perish."], "credits": {"author": "M.B.Landstad, P. Gerhardt (", "translator": "C.Doving (18", "tune": "Went"}}, {"number": 142, "old_number": "337", "title": "God's word is our great heritage", "first_line": "God's word is our great heritage. And shall be ours forever; To spread its light", "verses": ["God's word is our great heritage. And shall be ours forever; To spread its light from age to age, Shall be our chief endeavor; Through life it guides our way, In death it is o stay; Lord grant, while worlds endure, We keep its teachings pure, Throughout all generations."], "credits": {"tune": "Ein Feste Burg"}}, {"number": 143, "old_number": "329", "title": "What curses doth the Law impart", "first_line": "The Law commands and makes us know, What duties to our God we owe; But 'tis the ", "verses": ["The Law commands and makes us know, What duties to our God we owe; But 'tis the Gospel must reveal, Where lies our strength to do His will.", "The Law discovers guilt and sin, And shows how vile our hearts have been; The Gospel only can express, Forgiving love and cleansing grace.", "What curses doth the Law pronounce, Against the man that fails but once! But in the Gospel Christ appears, Pard'ning the guilt ofnum'rous years.", "My soul, no more attempt to draw, Thy life and comfort from the Law. Fly to the hope the Gospel gives; The man that trusts the promise lives."], "credits": {"author": "I.Watts (1709) (England)", "tune": "Old Hundredth"}}, {"number": 144, "old_number": "330", "title": "To Jesus we for refuge flee", "first_line": "The law is good, but since the Germany) fall, Its holiness condemns us all: It d", "verses": ["The law is good, but since the fall, Its holiness condemns us all: It dooms us for our sin to die, And has no power to justify.", "When men the offered help disdain, And dead in sin and woe remain, Its terror in their ears resounds, And keeps their wickedness in bounds. ur", "To those who help in Christ have found, And would in works oflove abound, It shows ste Burg what deeds are His delight, And should be done as good and right.", "To Jesus we for refuge flee, Who from the curse has set us free, And humbly worship at His throne, Saved by His grace through faith alone."], "credits": {"author": "M.Loy (1863) (USA)", "tune": "Erhalt Uns, Herr"}}, {"number": 145, "old_number": "340", "title": "The gospel shows the Father's grace", "first_line": "The gospel shows the Father's grace, Who sent His Son to save our race, Proclaim", "verses": ["The gospel shows the Father's grace, Who sent His Son to save our race, Proclaims how Jesus lived and died, That man might thus be justified.", "It sets the Lamb before our eyes, Who made the atoning sacrifice, And calls the souls with guilt opprest, To come and find eternal rest.", "It brings the Savior's righteousness, Our souls to robe in royal dress; From all our guilt it brings release, And gives the troubled conscience peace.", "It is the pow'r of God to save, From sin and Satan and the grave; It works the faith, which firmly clings, To all the treasures which it brings.", "It bears to all the tidings glad, And bids their hearts no more be sad; The heavy laden souls it cheers, And banishes their guilty fears.", "May we in faith its tidings learn, Nor thanklessly its blessings spurn; May we in faith its truth confess, And praise the Lord our Righteousness!"], "credits": {"author": "M.Loy (1863)", "tune": "Herr Jesu C"}}, {"number": 146, "old_number": null, "title": "If God Himself be for me", "first_line": "If God Himself be for me, I may a 111:1 host defy; For when I pray, before me, M", "verses": ["If God Himself be for me, I may a host defy; For when I pray, before me, My foes, confounded, fly. If Christ, my Head and Master, Befriend me from above, What foe or what disaster, Can drive me from His love?", "This I believe, yea, rather, Of this I mak my boast, That God is my dear Father, The Friend who loves me most, And that, whate'er betide me, My Savior is at hand, Through stormy seas to guide me, And bring me safe to land.", "I build on this foundation, That Jesus and His blood, Alone are my salvation, The true, eternal good. Without Him all that pleases, Is valueless on earth; The gifts I owe to Jesus, Alone my love are worth.", "My Jesus is my Splendor, My Sun, my Light, alone; Were He not my Defender, Before God's awe-full throne, I never should find favor, And mercy in His sight, But be destroyed forever, As darkness by the light.", "He canceled my offenses, Delivered me from death; He is the Lord who cleanses, My soul from sin through faith. In Him I can be cheerful, Bold, and undaunted aye; In Him I am not fearful, Of God's great Judgment Day.", "Naught, naught, can now condemn me, Nor set my hope aside; Now hell no more can claim me, Its fury I deride. No sentence e'er reproves me, No ill destroys my peace; For Christ, my Savior, loves me, And shields me with His grace.", "His Spirit in me dwelleth, And o'er my mind He reigns. All sorrow He dispelleth, And soothes away all pains. He crowns His work with blessing, And helpeth me to cry, My Father! without ceasing, To Him Who dwells on high.", "And when my soul is lying, Weak, trembling, and opprest, He pleads with groans and sighing, That cannot be exprest; But God's quick eye discerns them, Although they give no sound, And into language turns them, E'en in the hearts deep ground.", "To mine His Spirit speaketh, Sweet word, of holy cheer, How God to him that seeketh, For rest is always near, And how He hath erected, A city fair and new, Where what our faith expected, We evermore shall view.", "In yonder home doth flourish, My heritage, my lot; Though here I die and perish, My heaven shall fail me not. Though care and want assail me, And troubles sore oppress, My God will never fail me; His Spirit speaks me blest.", "Who clings with resolution, To Him whom Satan hates, Must look for persecution; For him the burden waits, Of mockery, 1211 shame, and losses, Heaped on his blameless head; A thousand plagues and crosses, Will be his daily bread.", "From me this is not hidden, Yet I am not afraid; I leave my cares, as bidden, To Whom my vows were paid. Though life and limb it cost me, And everything I won, Unshaken shall I trust Thee, And cleave to Thee alone.", "Though earth be rent asunder, Thou'rt mine eternally; Not fire nor sword nor thunder, Shall sever me from Thee; Not hunger, thirst, nor danger, Not pain nor poverty, Nor mighty princes anger, Shall ever hinder me.", "No angel and no gladness, No throne, no pomp, no show, No love, no hate, no sadness, No pain, no depth of woe, No scheme of man's contrivance, However small or great, Shall draw me from Thy guidance, Nor from Thee separate.", "My heart for joy is springing, And can no more be sad, Tis full of mirth and singing, Sees naught but sunshine glad. The Sun that cheers my spirit, Is Jesus Christ, my King; That which I shall inherit, Makes me rejoice and sing.", "Tu711!: Valet Will !ch Dir Geben"], "credits": {"author": "P.Gerhardt (1656) (Germany)", "translator": "Richard Massie (1857)"}}, {"number": 147, "old_number": "153", "title": "Keys are given to the kingdom", "first_line": "Keys are given to the Christians, To His faithful children here; To unlock the d", "verses": ["Keys are given to the Christians, To His faithful children here; To unlock the door of Heaven, To the needy coming near; By the power of the gospel, It is theirs to loos and bind; Setting free and safe in Heaven, All the needy that they find.", "By His word and in His power, Christians here perform the deed; Binding all the unrepentant, Setting free who speak their need; Holy angels keep the record, In the blessed book of life; Of the children of the kingdom, Who are victors in the strife.", "In that Fountain in the heavens, On the earth so near us all; Men are cleansed and born of Spirit, When they heed the Master's call; Not by pride nor in vainglory, Will the keys work here on earth; But by grace the words are spoken, And by faith we see their worth.", "Should we fall before the tempter, When we stray beyond the gates; And lie wounded by the wayside, There a faithful Christian waits; With His keys He keeps the portals, They are yours and they are mine; Binding up the brokenhearted, Pouring in the oil and wine.", "In that land beyond the river, In the judgment all must face; He has promised that He'll honor; His words spoken by His grace; From His time up to the present, Greater power is given to men; And His word though e said in weakness, it will stand in glory then."], "credits": {"author": "F.P. Ward (USA)", "tune": "Nettleton"}}, {"number": 148, "old_number": null, "title": "Not all the blood of beasts", "first_line": "Not allthe blood of beasts, On Jewish altars slain, Could give the guilty consci", "verses": ["Not allthe blood of beasts, On Jewish altars slain, Could give the guilty conscience peace, Or wash away the stain.", "But Christ, the heavenly Lamb, Takes all our sins away; A sacrifice of nobler name, And richer blood than they.", "My faith would lay its hand, On that dear Head divine, As penitently here I stand, Confessing guilt is mine.", "My soul looks back to see, The burden You did bear, en hanging on the cursed tree; I know my gmlt was there.", "Believing, we rejoice, To see the curse remove; We bless the Lamb with cheerful voice, And sing His bleeding love."], "credits": {"author": "I.Watts (1709) (Germany)", "tune": "Southwell"}}, {"number": 149, "old_number": null, "title": "Not what these hands have done", "first_line": "Not what these hands have done, Can save this guilty soul; Not what this toiling", "verses": ["Not what these hands have done, Can save this guilty soul; Not what this toiling flesh has borne, Can make my spirit whole.", "Not what I feel or do, Can give me peace with God; Not all my prayers and sighs and tears, Can bear my awful load.", "Thy work alone, O Christ, Can ease this weight of sin; Thy blood alone, O Lamb of God, Can give me peace within.", "Thy love to me, O God, Not mine, O Lord to Thee, Can rid me of this dark unrest, And set my spirit free.", "Thy grace alone, O God, To me can pardon speak; Thy power alone, O Son of God, Can this sore bondage break.", "I bless the Christ of God, I rest on love divine, And with unfaltering lip and heart, I call this Savior mine."], "credits": {"author": "H.Bonar(1861) (Germ", "tune": "St."}}, {"number": 150, "old_number": null, "title": "O Christ, our hope, our heart's desire", "first_line": "Christ, our hope, our heart's desire, Redemption's only spring! Creator of the w", "verses": ["Christ, our hope, our heart's desire, Redemption's only spring! Creator of the world art Thou, Its Savior and its King.", "How vast the mercy and the love, Which laid our sins on Thee, And led Thee to a cruel death, To set Thy people free!", "But now the bands of death are burst, The ransom has been paid; And Thou art on Thy Father's throne, In glorious robes arrayed.", "O may Thy mighty love prevail, Our sinful souls to spare! O may we come before Thy throne, And find acceptance there!", "O Christ, be Thou our present joy, Our future great reward; Our only glory may it be, To glory in the Lord!"], "credits": {"tune": "Lobt Gottlhr Christen(modified)"}}, {"number": 151, "old_number": null, "title": "Rise from thy stupor, heart and mind", "first_line": "Rise from thy stupor, heart so uneasy; Why so completely forget what thou hast? ", "verses": ["Rise from thy stupor, heart so uneasy; Why so completely forget what thou hast? Christ is forever, Thy loving Saviour, He's still the same as He was in the past.", "Pause and consider, earnestly ponder, What thou possessest in Him, not in thee; Righteous and holy, Perfect most truly, Art thou in Christ, Who from sin sets us free.", "Right in the midst of sin's daily affliction, Justification eternal thou hast. That thou are holy, Thou ow'st Him solely, Him upon Whom all thy burdens were cast.", "God is in Christ now thy Friend and thy Father: Jesus thy Brother on Calvary died; And by His merit, Has sent His Spirit, To be thy Strength, and thy Comfort, and Guide."], "credits": {"author": "C. 0. Rosenius (", "tune": "Angsliga Hjiirta, Upp Ur D"}}, {"number": 152, "old_number": null, "title": "The dead in Christ shall rise again", "first_line": "Great God, what do I see and hear! The end of things created! The Judge of manki", "verses": ["Great God, what do I see and hear! The end of things created! The Judge of mankind doth appear, On clouds of glory seated; The trumpet sounds; the graves restore, The dead which they contained before; Prepare my soul to meet Him.", "The dead in Christ shall first arise, At the last trumpet's sounding. Caught up to meet Him in the skies, With joy their Lord surrounding; No gloomy fears their souls dismay; His presence sheds eternal day, On those prepared to meet Him.", "But sinners, filled with guilty fears, Behold His wrath prevailing, For they shall rise and find their tears, And sighs are unavailing; The day of grace is past and gone; They trembling stand before the throne, All unprepared to meet Him.", "O Christ, Who died and yet dost live, To me impart Thy merit: My pardon seal, my sins forgive, And cleanse me by Thy Spirit, Beneath Thy cross I view the day, When heaven and earth shall pass away, And thus prepare to meet Thee."], "credits": {"author": "111 anonymous 112-4 W.B. Collyer", "tune": "Lutlu!rs Hymn"}}, {"number": 153, "old_number": "160", "title": "Lord, now indeed I find Thy power", "first_line": "I hear the Savior say, Thy strength indeed is small, Child of weakness watch and", "verses": ["I hear the Savior say, Thy strength indeed is small, Child of weakness watch and pray, Find in Me thine all in all. Jesus paid it all, All to Him I owe; Sin had left a crimson stain, He washed it white as snow.", "Lord, now indeed I find, Thy power and Thine alone, Can change the leper's spots, And melt the heart of stone. Jesus paid it all, etc.", "For nothing good have I, Whereby Thy grace to claim, I will wash my garments white, In the blood of Calvary's Lamb. Jesus paid it all, etc.", "And when, before the throne, I stand in Him complete, \"Jesus died my soul to save,\" My lips shall still repeat. Jesus paid it all, etc."], "credits": {"author": "E.M.Hall (1865) (USA)", "tune": "Jesus Paid It All"}}, {"number": 154, "old_number": "158", "title": "O Jesus Christ, do not delay", "first_line": "The day is surely drawing near, When God's Son, the Annointed, Shall with great ", "verses": ["The day is surely drawing near, When God's Son, the Annointed, Shall with great majesty appear, As Judge of all appointed. All mirth and laughter then shall cease, When flames on flames will still increase, As scripture truly teacheth.", "A trumpet loud shall then resound, And all the earth be shaken. Then all who in their graves are found, Shall from their sleep awaken; But all that live shall in that hour, By the Almighty's boundless pow'r, Be changed at His commanding.", "A book is opened then to all, A record truly telling, What each hath done, both great and small, When he on earth was dwelling; And ev'ry heart be closely seen, And all be known as they have been, In thoughts and words and actions.", "Then woe to those who scorned the Lord, And sought but carnal pleasures, Who here despised His precious word, And loved their earthly treasures! With shame and trembling they will stand, And at the Judge's stem command, To Satan be delivered.", "O Jesus, Who my debt didst pay, And for my sin wast smitten, Within the Book of Life, Oh may, My name be also written! I will not doubt! I trust in Thee, From Satan Thou hast made me free, And from all condemnation.", "Therefore my Intercessor be, And for Thy blood and merit, Declare my name from judgment free, With all who life inherit, That I may see Thee face to face, With all Thy saints in that blest place, Which Thou for us hast purchased.", "O Jesus Christ, do not delay, But hasten our salvation; We often tremble on our way, In fear and tribulation. Then hear us when we cry to Thee; Come, mighty Judge, and make us free, From every evil! Amen."], "credits": {"author": "B.Ringwaldt (1565) (Germany)", "translator": "P.A.Peter (1872)", "tune": "Luthers Hymn"}}, {"number": 155, "old_number": null, "title": "The child that's born to us today", "first_line": "Thy scepter, Jesus, shall extend, As far as day prevaileth; Thy glorious kingdom", "verses": ["Thy scepter, Jesus, shall extend, As far as day prevaileth; Thy glorious kingdom, without end, Shall stand when all else faileth, Thy blessed Name shall be confessed, And round Thy cross forever blest, Shall kings and people boweth.", "The child that's born to Thee we take, To thee in death we hasten; In joy we often Thee forsake, But not when sorrows chasten. Where truth and virtue are oppressed, Where sorrow dwells, pain and unrest, Thy help alone availeth.", "Come, Jesus, then, in weal and woe, In life and death be near us; Thy grace 'pon broken hearts bestow, And let thy spirit teach us, For every conflict strength afford, And gather us in peace, O Lord, When all the world Thou judgest."], "credits": {"author": "F.M.Franzen (Swede", "tune": "Luthers Hy"}}, {"number": 156, "old_number": null, "title": "This Lamb is Christ, the Soul's great Friend", "first_line": "A Lamb goes uncomplaining forth, The guilt of all men bearing; And laden with th", "verses": ["A Lamb goes uncomplaining forth, The guilt of all men bearing; And laden with the sins of earth, None else the burden sharing! Goes patient on, grow weak and faint, To slaughter led without complaint, That spotless life to offer; Bears shame and stripes, and wounds and death, Anguish and mockery, and saith, \"Willing all this I suffer.\"", "This Lamb is Christ, the soul's great Friend, The Lamb of God, our Savior; Him God the Father chose to send, To gain for us His favor. \"Go forth, My Son,\" the Father saith, \"And free men from the fear of death, From guilt and condemnation. The wrath and stripes are hard to bear, But by Thy passion men shall share, The fruit of Thy salvation.\"", "O wondrous love, what hast Thou done! The Father offers up His Son! The Son, content, descendeth! O love, how strong Thou art to save! Thou beddest Him within the grave, Whose word the mountains rendeth.", "Of death I am no more afraid, New life from Thee is flowing; Thy cross affords me cooling shade, When noonday's sun is glowing. When by my grief l am opprest, On Thee my weary soul shall rest, Serenely as on pillows. Thou art my Anchor when by woe, My bark is driven to and fro, On trouble's surging billows.", "And when Thy glory I shall see, And taste Thy kingdom's pleasure, Thy blood my royal robe shall be, My joy beyond all measure. When I appear before Thy throne, Thy righteousness shall be my crown, With these I need not hide me. And there, in garments richly wrought, As Thine own bride, I shall be brought, To stand in joy beside Thee."], "credits": {"author": "P.Gerhardt (1648) (Germany)", "tune": "An Wasserfluessen Babylon"}}, {"number": 157, "old_number": null, "title": "Lo, how a Rose e'er blooming", "first_line": "Christ, the Life of all the living, Christ, the death of death, our foe, Who, Th", "verses": ["Christ, the Life of all the living, Christ, the death of death, our foe, Who, Thyself for me once giving, To the darkest depths of woe, Through Thy sufl'rings, death and merit, I eternal life inherit; Thousand, thousand thanks shall be, Dearest Jesus, unto Thee.", "Thou, ah' Thou, hast taken on Thee, Bonds and stripes, a cruel rod; Pain and scorn were heaped upon Thee, O Thou sinless Son of God! Thus didst Thou my soul deliver, From the bonds of sin forever. Thousand, thousand thanks shall be, Dearest Jesus, unto Thee.", "Then for all that wrought by pardon, For Thy sorrows deep and sore, For Thine anguish in the Garden, I will thank Thee evermore, Thank Thee for Thy groaning, sighing, For Thy .bleeding and Thy dying, For that last triumphant cry, And shall praise Thee, Lord on high."], "credits": {"author": "E.C.Homburg (1659) (Germmiy)", "translator": "C.Winkworth (1863)", "tune": "Jesu, Mein.es Lebens Leben"}}, {"number": 158, "old_number": null, "title": "Only the blood of Jesus", "first_line": "Listen, Eve's children, Haren! Ye vainly beautified! Such beauty heavily burdene", "verses": ["Listen, Eve's children, Haren! Ye vainly beautified! Such beauty heavily burdened, The heart of the Crucified.", "Mockingly they adorned Him, On purple robes of scorn. See how the soldiers plaited, The crown of thorns He wore.", "Scorn crowned the brow of Jesus, Price of man's vanity! Spit marred His sacred visage, He bore it all for thee.", "Lo! See the Lamb in silence, Bears bitter agony! How canst thou yet continue, To live in vanity?", "Thy clothing fine and costly, Thy gold, thy home so fair; What can these things avail thee? Moth, rust such treasures share.", "Only the blood of Jesus, True beauty can create, Unchanging everlasting, Receiving grace through faith.", "Cast off this world's vain glitter, Which withers and decays, Mind that you'll soon be taken, To the last resting place.", "Reveal to us thy glory, Point us unto Thy cross. Keep us Thy feeble children, By faith victorious."], "credits": {"author": "G.Skinnari (1894) (Finland)", "tune": "Kuule Sa Eevan Lapsi"}}, {"number": 159, "old_number": null, "title": "O dearest Jesus, what law hast Thou broken", "first_line": "O dearest Jesus, what law hast thou broken That such sharp sentence should on Th", "verses": ["O dearest Jesus, what law hast Thou broken That such sharp sentence should on Thee be spoken? Of what great crime is laid to Thy oppression, What dark transgression?", "Mocked and imprisoned, thorn crowned, scourged and beaten. And by the masses, blasphemously treated. You suffered greatly, crucifixion, torment. Punishment suffered, for my atonement.", "What punishment so strange is suffered yonder! The Shepherd dies for sheep that loved to wander; The Master pays the debt His servants owe Him, Who would not know Him.", "The sinless Son of God must die in sadness; The sinful child of man may live in gladness; Man forfeited his life and is acquitted; God is committed.", "O wondrous love, whose depths no heart hath sounded, That brought Thee here, by foes and thieves surrounded! All worldly pleasures, heedless, I was trying; While Thou wert dying.", "O mighty King, no time can dim Thy glory! How shall I spread abroad Thy wondrous story? How shall I find some worthy gift to proffer? What dare I offer?", "The noblest gift my hands could e'er deliver, Were far too little, Lord, to thank the Giver. Though with my tears I should forever grieve Thee, I could not save Thee.", "And when, dear Lord, before Thy throne in heaven, To me the crown of joy at last is given, Where sweetest hymns Thy saints forever raise Thee, I too shall praise Thee."], "credits": {"author": "J.Heermann (1630) (Aus", "translator": "C.Winkworth (1827-1", "tune": "Herzliebste"}}, {"number": 160, "old_number": null, "title": "A pilgrim and a stranger", "first_line": "A pilgrim and a stranger, !journey here below; Far distant is my country, The ho", "verses": ["A pilgrim and a stranger, I journey here below; Far distant is my country, The home to which I go. Here I must toil and travail, Oft weary and opprest; But there my God shall lead me, To everlasting rest.", "So I must hasten forward; Thank God the end will come! This land of passing shadows, Is not my destined home. The everlasting city, Jerusalem above, This evermore abideth, The home of light and love."], "credits": {"author": "P.Gerhardt (1666) (Germany)", "translator": "J.Borthwick (1858)", "tune": "Passion Chorale"}}, {"number": 161, "old_number": "325", "title": "Brightly beams our Father's mercy", "first_line": "Brightly beams our Father's mercy, From His lighthouse ever more, But to us He g", "verses": ["Brightly beams our Father's mercy, From His lighthouse ever more, But to us He gives the keeping, Of the lights along the shore. Let the lower lights be burning! Send a gleam across the wave, Some tria) poor fainting, struggling seaman, You may 878) rescue, you may save. r Jesu", "Dark the night of sin has settled, Loud the angry billows roar; Eager eyes are watching, longing, For the lights along the shore. Let the lower lights etc.", "Trim your feeble lamp, my brother! Some poor sailor, tempest toss'd, Trying now to make the harbor, In the darkness may be lost. Let the lower lights etc. AutJwr: P.P.Bliss (1871)"], "credits": {"tune": "Lower Li"}}, {"number": 162, "old_number": 162, "title": "Christians", "first_line": "Christians, prayer may well employ you, The powers of darkness would destroy you", "verses": ["Christians, prayer may well employ you, The powers of darkness would destroy you: Yea, Satan's self has planned your fall. Wield God's word, a weapon glorious, Against each foe; and soon victorious, Our God will make you o'er them all. Is Satan strong and fell? Here is Immanuel. Sing Hosanna! The strong ones yield, With Christ our shield, And we as conquerors hold the field.", "Cast afar this world's vain pleasures, Aye, boldly fight for heavenly treasures, And steadfast be in Jesus' might, He will help, whate'er betide you: And naught will harm with Christ beside you: By faith you'll conquer in the fight. Then shame, O weary soul! Look forth toward the goal: There joy awaits. The race then run, The combat done, Your crown of glory will be won.", "Wisely fight, for time is fleeting, The hours of grace are swift retreating! And life is shortest to the wise. When the trump the dead is waking, And sinners all with fear are quaking, Then will the saints with joy arise. Praise God: our triumph's sure, Though long we did endure, Scorn and trial. Thou, Son of God, To Thy abode. Wilt lead the way Thy hast trod. ghts", "Jesus, all Thy children cherish, And keep them that they never perish, Whom Thou hast purchased with Thy blood. Give new life, that our desiring, Be ever heavenward aspiring, For what is holy, true and good. Thy Spirit on us pour, That we may love Thee more, Hearts o'erflowing: And then will we, Be true to Thee, In death and life eternally."], "credits": {"author": "W.E. Arends (1677-1721) (Germany)", "tune": "Christi.ans Prayer"}}, {"number": 163, "old_number": 165, "title": "We strive that our course may be faithful", "first_line": "Dear Christian, as forward you sojourn, On life's narrow treacherous way, Take h", "verses": ["Dear Christian, as forward you sojourn, On life's narrow treacherous way, Take heed how you tread on the pathway, Lest this evil world lead astray.", "There's danger around you dear pilgrim, The foe sets his snare very fine, Be careful and prayerful each moment, Resist him with power divine.", "You battle and fight 'gainst this strong one, But one stronger fights on your side, Be not sore dismayed neither fearful, Christ battles for you His dear bride.", "There's love and great oneness of purpose, Wherever true Christians are found, Their tears and their prayers, all their watchings, Are closely entwined, mutually bound.", "We strive that our raiment be spotless, With faith burning brightly our part, Remember dear friend that forgiveness, Is found in each true Christian's heart.", "And so let us press boldly onward, We're sheltered and safe 'mongst His own. There's help, hope, and refuge us promised, In Christ's church our spiritual home."], "credits": {"author": "E. Levanen (1", "tune": "Dear Christian, As Forward Y"}}, {"number": 164, "old_number": null, "title": "Grant that Thy Spirit's holy light", "first_line": "How can I thank Thee, Lord, For all Thy loving-kindness, That Thou hast patientl", "verses": ["How can I thank Thee, Lord, For all Thy loving-kindness, That Thou hast patiently, Borne with me in my blindness? When dead in many sins, And trespasses I lay, I kindled, holy God, Thine anger every day.", "It is Thy work alone, That I am now converted; O'er Satan's work in me, Thou hast Thy power asserted. Thy mercy and Thy grace, That rise afresh each morn, Have turned my stony heart, Into a heart new-born.", "I could but grieve Thee, Lord, And with my sins displease Thee; Yet to atone for sin My works could not appease Thee. Thoug h I co d fall from grace, And choose the way of sm, I had no strength to rise A new life ' to begin.", "But ';l'hou hast raised me up, To joy and exultation, And clearly shown the way, That leads me to salvation. My sins are washed away, For this I thank thee Lord, ' And with my heart and soul, All dead work are abhorred.", "Grant. that Thy Spirit's help, To me be always given, Lest I should fall again, And lose the way to heaven; That He may give me strength, In mine infirmity, And e'er renew ou Sojourn my heart, To serve Thee willingly.", "Oh, guide and lead me, Lord, While here below I wander, That I may follow Thee, Till I shall see Thee yonder. For if I led myself, I soon would go astray; But if Thou leadest me, I keep the narrow way.", "O Father, God oflove, Hear Thou my supplication; O Savior, Son of God, Grant me Thy full salvation; And Thou, O Holy Ghost, Be Thou my faithful Guide, That I may serve Thee here, And there with Thee abide."], "credits": {"author": "D.Denicke (1648) (Germany)", "translator": "ACrull (1845-1923)", "tune": "0 Gott, De Frommer Gott"}}, {"number": 165, "old_number": null, "title": "Jesus, lead Thou on", "first_line": "Jesus, lead Thou on, Till our rest is won; And although the way be cheerless, We", "verses": ["Jesus, lead Thou on, Till our rest is won; And although the way be cheerless, We will follow calm and fearless. Guide us by Thy hand, To our fatherland.", "If the way be drear, If the foe be near, Let not faithless fears o'ertake us; Let not faith and hope forsake us; For through many a woe, To our home we go.", "When we seek relief, From a long-felt grief; When temptations come alluring, Make us patient and enduring; Show us that bright shore, Where we weep no more.", "Jesus, lead Thou on, Till our rest is won. Heavenly Leader, still direct us, Still support, control, protect us, Till we safely stand, In our fatherland."], "credits": {"author": "C.Gregor (1778) (Ger", "translator": "J.Brothwick", "tune": "Seelenbr"}}, {"number": 166, "old_number": null, "title": "Jesus, my Truth, my Way", "first_line": "Jesus, my Truth, my Way, My sure, unerring Light, On Thee my feeble soul I stay,", "verses": ["Jesus, my Truth, my Way, My sure, unerring Light, On Thee my feeble soul I stay, Which Thou wilt lead aright.", "My Wisdom and my Guide, My Counselor Thou art; Oh, let me never leave Thy side, Nor from Thy paths depart!", "Thou seest my feebleness; Jesus, be Thou my Power, My Help and Refuge in distress, y Fortress and my Tower. 1411", "Give me to trust in Thee; Be Thou my sure Abode; My Horn and Rock and Buckler be ' My Savior and my God.", "Myself I cannot save, Myself I cannot keep; But strength in Thee I surely have ' Whose eyelids never sleep.", "My soul to Thee alone, Now, therefore, I commend. Thou, Jesus, having loved Thine own, Wilt love me to the end."], "credits": {"author": "C. Wesley (1749) (Germany)", "tune": "Swabia"}}, {"number": 167, "old_number": 15, "title": "Lord Jesus Christ, my life, my light", "first_line": "Lord Jesus Christ my Life my Light, My Strength by day, Y Trus by t night, On ea", "verses": ["Lord Jesus Christ my Life my Light, My Strength by day, Y Trus by t night, On earth I'm but a passing guest And ' sorely with my sins oppressed.", "Far off I see my fatherland, Where through many) Thy blood I hope to stand; But ere I reach (1854) autigam that Paradise, A weary way before me lies.", "My heart sinks at the journey's length, My wasted flesh has little strength; My soul alone still cries in me; Lord, take me home, take me to Thee.", "Oh, let Thy sufferings give me pow'r, To meet the last and darkest hour! Thy blood refresh and comfort me; Thy bonds and fetters make me free.", "Ah, then shall I most joyful be, And with the angels sing to Thee, And with Thy blessed, chosen fold, Fore'er Thy gracious face behold."], "credits": {"author": "M.Behm (1611) (Germany)", "translator": "C. Winkworth (1858)", "tune": "0 Jesu Chrisre, Wahres Licht"}}, {"number": 168, "old_number": "225", "title": "Lord, clasp my falt'ring hand in Thine", "first_line": "Lord, clasp my falt'ring hand in Thine; Too weak I am to walk alone; My path, de", "verses": ["Lord, clasp my falt'ring hand in Thine; Too weak I am to walk alone; My path, dear Lord, I would not choose, But ever say, \"Thy will be done.\"", "Tempted at times to trust in self, And in this self feel brave and strong; Help, in my weakness, Thee to trust, To do the right, and shun the wrong.", "I'll trust in Thee each day and hour, As through this sinful world I go; I'll lean upon Thine arm of pow'r, And then defeat I ne'er shall know.", "If I in Thee shall fall asleep, Or in the clouds shall see Thee come; Then, where there'll be no cause to weep, Greet me, my Savior, in that home."], "credits": {"author": "FA.Graves (1895) (England)", "tune": "Llei.da"}}, {"number": 169, "old_number": null, "title": "Must Jesus bear the cross alone", "first_line": "Must Jesus bear the cross alone, And all the world go free? No, there's a cross ", "verses": ["Must Jesus bear the cross alone, And all the world go free? No, there's a cross for every one, And there's a cross for me.", "How happy are the saints above, Who once went sorrowing here, But now they taste unmingled love, And joy without a tear.", "The consecrated cross I'll bear, Till death shall set me free; And then go home my crown to wear, For there's a crown for me.", "Upon the crystal pavement, down At Jesus' pierced feet, Joyful, I'll cast my' golden crown, And His dear Name repeat.", "O precious cross! O glorious crown! O resurrection day! Ye angels, from the stars flash down, And bear my soul away."], "credits": {"author": "T.Shepard (1665-1 739) (USA)", "tune": "Maitland"}}, {"number": 170, "old_number": null, "title": "O Jesus Christ, Thou well of grace", "first_line": "O Jesus Christ, Thou well of grace, Life's water, purifying, Deign Thou to hear ", "verses": ["O Jesus Christ, Thou well of grace, Life's water, purifying, Deign Thou to hear and lift Thy face, To hearts downcast and sighing, Thy wondrous grace, Thy crown of thorns, Draw me unto Thy open arms, To tell to thee my anguish.", "Around Thy cross, oh Jesus dear, I stretch my arms upraising, And toward the banner Thou dost bear, I fix my hopeful gazing. The woe of the forbidden tree, Upon the cross was paid by Thee, To my great consolation.", "So give me grace for Thy name's sake, To see my sin and weakness, And love Thee, who my sin can take, Away and show forgiveness, I then receive what thou wilt give, At Thy good pleasure I may live, And evermore may prosper.", "I, wretched worm and traveler weak, In burdensome migration, My right homeland I wish to seek. In prayer and tribulation, This earth provides no safe enclave, But past the portals of the grave, Awaits for me a haven.", "My right homeland in heaven is, Not here in worldly glitter, This world's false extravagance, Like flowers soon shall wither, My life a vapor is a dream, Flows quickly onward as a stream, Like rain in sand disperses.", "When mortal life to death shall go, The eye o'ercome by blackness, Oh take me from all sorrow and woe, To everlasting gladness, To Father, Son and Holy Ghost, All praise be from the heavenly host, Now and forever. Amen."], "credits": {"author": "Unknown Swedish Author (1656),"}}, {"number": 171, "old_number": "252", "title": "The Lord my faithful Shepherd is", "first_line": "The Lord my faithful Shepherd is. And me He safely guideth, I shall not want, fo", "verses": ["The Lord my faithful Shepherd is. And me He safely guideth, I shall not want, for I am His, Who all things good provideth; I follow Him, I hear His voice, In Him my Lord I do rejoice; Blest am I in His keeping.", "A tender Shepherd leads His sheep, Where pastures green are growing, And there His flock doth guard and keep, Beside still waters flowing, Thus Christ, my Shepherd, leadeth me, My soul and body feedeth He, And for their wants provideth.", "Thy goodness and Thy mercy, Lord, Shall follow me, attending, The days Thou dost to me afford, Until they reach their ending; Thereafter shall I in Thy love, Dwell in Thy house in heaven above, Forever and forever."], "credits": {"author": "AC. Arrebo (1587- 1637) (Denmark)", "translator": "C.V,ving (1867 - 1937)", "tune": "Luthers Hymn"}}, {"number": 172, "old_number": 180, "title": "The sands have been washed in the footprints", "first_line": "The sands have been washed in the footprints, Of the Stranger on Galilee's shore", "verses": ["The sands have been washed in the footprints, Of the Stranger on Galilee's shore, And the voice that subdued the rough billows, Will be heard in Judea no more; But the path of the lone Galilean, With joy I will follow today; And the toils ofthe road will seem nothing, When I get to the end of the way.", "There are so many hills to climb upward, I often am longing for rest; But He who appoints me my pathway, Knows just what is needful and best. I know in His word He has promised, That my strength, \"it shall be as the day;\" And the toils of etc.", "He loves me too well to forsake me, Or Give me a trial too much; AllHis people have been dearly purchased, And Satan can never claim such. By and by I shall see Him and praise Him, In the city of unending day; And the toils of etc.", "When the last feeble step has been taken, And the gates of that city appear, And the beautiful songs of the angels, Float out on my listening ear; When all that now seems so mysterious Will be bright and as clear as the day; And the toils of etc."], "credits": {"author": "C.D.Tillman ( O.Kolmodin (Sweden) J.O.Wallin (Swed", "tune": "When I Get To The End Of The Way Gd Varsamt, Min Kristen Seelenbriiuti", "translator": "C.D11"}}, {"number": 173, "old_number": null, "title": "Walk cautiously, Christian, for strait is the gate", "first_line": "Walk cautiously, Christian, for straight is the gate, And narrow the way, as God", "verses": ["Walk cautiously, Christian, for straight is the gate, And narrow the way, as God's word doth relate. Few be there that find it, this pathway to life, While many choose rather the way broad and wide.", "This path can by no man be traversed with ease, Where danger is lurking we cannot perceive, Oh, one wayward step will bring sorrow and pain, Destruction ensues if we let the flesh reign.", "The world and the devil to conquer have we, And pride overthrown from our minds it must be, For humiliations, prepare day by day, For suffring denial of self on the way.", "Be diligent therefore, repent while you may, Be clothed in His righteousness, be saved today, Oh trust in the Savior, you're 'all and in all', He covers the sinner, redeems from the fall.", "O come with your sins where the Lord's blood doth flow, To make your black heart to be whiter than snow, By faith is His mercy preserved in the heart, And for all of your struggles His strength will impart.", "Walk on in His footsteps they lead you aright, His yoke it is easy, His burden is light, Though toilsome and weary the blest narrow way, It only can bring you to Heaven one day."], "credits": {"author": "O.Kolmodin (Sweden)", "tune": "Gd Varsamt, Min Kristen"}}, {"number": 174, "old_number": null, "title": "Watch, my soul, and pray", "first_line": "Watch, my soul, and pray; Arm for life's affray. When the danger least thou fear", "verses": ["Watch, my soul, and pray; Arm for life's affray. When the danger least thou fearest, Watch, the tempter's snares are nearest, Such is e'er his way: Watch, my soul, and pray.", "Watch and pray, my soul, Flesh and blood control; When the world, in tempting story, Tells of pleasure, wealth, and glory, Be not led astray: Watch, my soul, and pray.", "See the promised land, On the heavenly strand; See God's people, thither tending, Through the sea and desert wending, Led by Joshua's hand: Seek the promised land.", "Through thy pilgrimage, Guard thy heritage; Pray and fight, on Christ relying, Live to Him, thyself denying; Onward to the goal, Win the crown, my soul!", "Watch, and fight, and pray, Through this mortal day; Soon thy Canaan thou attainest, Soon thy crown and palm thou gainest, Peace is won for aye: Watch, my soul, and pray."], "credits": {"author": "J.O. Wallin (Sweden)", "translator": "C.D11uing", "tune": "Seelenbriiutigam"}}, {"number": 175, "old_number": "32", "title": "Yield not to temptation", "first_line": "Yield not to temptation, For yielding is sin, Each vict'ry will help you, Some o", "verses": ["Yield not to temptation, For yielding is sin, Each vict'ry will help you, Some other to win; Fight valiantly onward, Dark passions subdue, Look ever to Jesus, He11 carry you through. Ask the Savior to help you, Comfort, strengthen, and keep you; He is willing to aid you, He will carry you through.", "Shun evil companions, Bad language disdain, God's name hold in rev'rence, Nor take it in vain; Be thoughtful and earnest, Kind hearted and true, Look ever to Jesus, He'll carry you through. Ask the Savior to etc.", "To him that o'ercometh, God giveth a crown, Through faith we shall conquer, Though often cast down; He who is our Savior. Our strength will renew, Look ever to Jesus, He'll carry you through. Ask the Savior to etc."], "credits": {"author": "H.R.Palmer (1868)", "tune": "Yield Not To Temptation Dennis K GoodAnd Pleasant 'Tis To See"}}, {"number": 176, "old_number": 14, "title": "Blest be the tie that binds", "first_line": "Blest be the tie that binds, Our hearts in Christian love: The fellowship of kin", "verses": ["Blest be the tie that binds, Our hearts in Christian love: The fellowship of kindred minds, Is like to that above.", "Before our Father's throne, We pour our ardent prayers: Our fears, our hopes, our aims are one, Our comforts and our cares.", "We share our mutual woes, Our mutual burdens bear; And often for each other flows, The sympathizing tear.", "When we asunder part, It gives us inward pain; But we shall still be joined in heart, And hope to meet again.", "This glorious hope revives, Our courage by the way, While each in expectation lives, And longs to see the day.", "From sorrow, toil, and pain, And sin, we shall be free, And perfect love and friendship reign, Through all eternity."], "credits": {"author": "J.Fawcett (1782) (England)", "tune": "Dennis"}}, {"number": 177, "old_number": 173, "title": "Brethren, called by one vocation", "first_line": "Brethren, called by one vocation, Members of one family, Heirs through Christ of", "verses": ["Brethren, called by one vocation, Members of one family, Heirs through Christ of one salvation, Let us live in harmony; Nor by strife embitter life, Journeying to eternity.", "In a land where all are strangers, And our sojourning so short, In the midst of common dangers, Concord is our best support; Heart with heart divides the smart, Lightens grief of every sort.", "Let us shun all vain contention, Touching words and outward things, Whence, alas so much dissension, And such bitter rancor springs; Troubles cease, where Christ brings peace, And sweet healing on His wings."], "credits": {"author": "KJ.P.Spitta (1833) (Germany)", "tune": "Kalmar"}}, {"number": 178, "old_number": 174, "title": "Good and pleasant 'tis to see", "first_line": "Good and pleasant 'tis to see, Brethren dwell in unity, When the law which Jesus", "verses": ["Good and pleasant 'tis to see, Brethren dwell in unity, When the law which Jesus taught, Rules each word and deed and thought.", "God has promised there, we know, Blessings richly to bestow, Life on earth, with all its store, Life in heaven for evermore.", "Sun of righteousness, arise! Shine on our benighted eyes; To Thy Church Thy light unfold, That the nations may behold.", "Jesus! Head of Christians all! Grant lM that we, both great and small, Through Thy gospel's light divine, May be one and wholly thine.", "Bring back all that go astray, Heavenly Shepherd! to Thy way; 'Neath Thy favor and Thy light, All Thy pasture-sheep unite."], "credits": {"author": "M.MUller (1700)", "tune": "Good And Pleasant 'Tis To See"}}, {"number": 179, "old_number": "247", "title": "Jesus calls us o'er the tumult", "first_line": "Jesus calls us o'er the tumult, Of our lifes' wild, restless sea; Day by day His", "verses": ["Jesus calls us o'er the tumult, Of our lifes' wild, restless sea; Day by day His sweet voice soundeth, Saying, Christian follow me!", "Jesus calls us, from the worship, Of the many) vain world's golden store; From each idol almar that would keep us, Saying Christian, love me more!", "In our joys and in our sorrows, Days of toil and hours of ease, Still He calls in cares and pleasures, Christian, love me more than these!", "Jesus calls us! by Thy mercies, Savior may we hear Thy call; Give our hearts to Thy obedience, Serve and love Thee best of all!"], "credits": {"author": "C.F.Alexarnkr (1852)", "tune": "Galilee"}}, {"number": 180, "old_number": 245, "title": "Jesus is my friend, most precious", "first_line": "Jesus is my Friend, most precious, Never friend doth love as He; Should I leave ", "verses": ["Jesus is my Friend, most precious, Never friend doth love as He; Should I leave this Friend so gracious, Spurn His wondrous love for me? No! nor friend nor foe shall sever, Me from Him who loves me so; His shall be my will forever, There above and here below.", "Bitter death for me He suffered; From all guilt He set me free; To His Father He hath offered, Everlasting prayers for me. Who is he that would condemn me? Christ hath saved me by His grace; Who can from my Savior draw me? I am safe in His embrace.", "And I am persuaded ever, Life nor death shall tear me from, Christ my blessed Lord and Savior, Present things nor things to come, Height nor depth, nor fear, nor favor, Aught that heaven and earth afford, Can me from God's love e'er sever, Love revealed in Christ our Lord."], "credits": {"author": "JArrhenius (Sw", "tune": "Jesus Ar Min Van Den"}}, {"number": 181, "old_number": "250", "title": "Jesus, Lover of my soul", "first_line": "Jesus, Lover of my soul, Let me to Thy bosom fly, While the nearer waters roll, ", "verses": ["Jesus, Lover of my soul, Let me to Thy bosom fly, While the nearer waters roll, While the tempest still is high! Hide me, O my Savior, hide, Till the storm of life is past; Safe into the haven guide; Oh, receive my soul at last!", "Other refuge have I none; Hangs my helpless soul on Thee; Leave, ah leave me not alone, Still support and comfort me! All my trust on Thee is stayed, All my help from Thee I bring; Cover my defenseless head' With the shadow of Thy wing.", "Thou, O Christ, art all I want; More than all in Thee I find; Raise the fallen cheer the b faint, Heal the sick, and lead the lind. Just and holy is Thy Name; I am all unrighteousness: False and full of sin I am; Thou art full of truth and grace.", "Plenteous grace with Thee is found, Grace to cover all my sin; Let the healing streams abound; Make and keep me pure within. Thou of life the fountain art, Freely let me take of Thee. Spring Thou up within my heart, Rise to all eternity."], "credits": {"author": "C.Wesley (1740) (England)", "tune": "Martyn"}}, {"number": 182, "old_number": "227", "title": "Love divine, all loves excelling", "first_line": "Love divine, all loves excelling, Joy ofheav'n, to earth come down! Fix in us Th", "verses": ["Love divine, all loves excelling, Joy ofheav'n, to earth come down! Fix in us Thy humble dwelling, All Thy faithful mercies crown. Jesus, Thou art all compassion, Pure, unbounded love Thou art; Visit us with Thy salvation, Enter ev'ry trembling heart.", "Breathe, O breathe Thy loving Spirit, Into every troubled breast! Let us all in Thee in- herit, Let us find the promised rest; Take away the love of sinning; Alpha and Omega be; End of faith as its beginning! Set our hearts at liberty.", "Finish then, Thy new creation, Pure and spotless may we be: Let us see our whole salvation, Perfectly secured by Thee! Changed from glory into glory, Till in heaven we take our place; Till we cast our crowns before Thee, Lost in wonder, love, and praise."], "credits": {"author": "C.Wesley (1747) (Eng", "tune": "Be"}}, {"number": 183, "old_number": null, "title": "No work is left undone", "first_line": "O perfect life of love! All, all, is finished now, All that He left His throne a", "verses": ["O perfect life of love! All, all, is finished now, All that He left His throne above, To do for us below.", "No work is left undone, Of all the Father willed; His toil, His sorrows, one by one, The Scriptures have fulfilled.", "No pain that we can share, But He has felt its smart; All forms of human grief and care, Have pierced that tender heart.", "And on His thorn-crowned head, And on His sinless soul, Our sins in od's everlasting grace.", "O depth ofgrace, our sin is buried, Through death of Jesus Christ our Lord. Now healed are wounds so deep I carried. He paid the debt in our accord, In time and through eternity, With His own blood so gracefully.", "When former sin, my heart is temptinl?; I seek from God, peace for my soul. In Chri_st, by grace my head is bending, I look by faith upon th goal. There I will find in His embrace, God's everlasting peace and grace.", "If pressed down to the earth and heavy, And none can seem to make me glad, If all my earthly comforts vanish, That keeps my body fed and clad; One thing remains, it gets me through, It is God's mercy firm and true.", "Though in the best of all my actions, In works that are admired the most, I must perceive great imperfections, I surely have no right to boast; Yet this sweet comfort doth abide: In mercy only I confide.", "Oh come what may, my life is guided, By His good will, in mercy great. The hert whose faith in Him is grounded, From Him will never separate. For Truly I believe and pray, God's mercy be with us today.", "On this foundation I unshrinking, Will stand while I on earth remain; This shall engage my acting, thinking, While I the breath of life retain; Then I will sing eternally, Unfathomed mercy, still of Thee."], "credits": {"author": "J.AIWthe (1688-1758) (Sw", "tune": "Wer Weiss, Wie"}}, {"number": 188, "old_number": "270", "title": "What though our sins are many", "first_line": "Out of the deep I cry to Thee, O Lord God, hear my crying; Incline Thy gracious ", "verses": ["Out of the deep I cry to Thee, O Lord God, hear my crying; Incline Thy gracious ear to me, With prayer to Thee applying. For if Thou fix Thy searching eye, On all sin and iniquity, Who, Lord, can stand before Thee.", "But love and grace with Thee prevail, O God, our sins forgiving. The holiest deeds cannot avail, Of all before Thee living. Before Thee none can boast him clear; Therefore must each Thy judgment fear, And live on Thy compassion.", "For this my hope in God shall rest, Naught building on my merit; My heart confides of Him possest, His goodness stays my spirit, His precious word assureth me; My solace, my sure rock is He, Wherein my soul abideth.", "And though I wait the livelong night, And till the morn returneth, My heart undoubting trusts His might, Nor in impatience mourneth. Born of His spirit, Israel, In the right way thus fareth well, And on His God reposeth.", "What though our sins are manifold? Supreme His mercy reigneth; No limit can His hand withhold, Where evil most obtaineth. He, the good Shepherd, is alone, Who Israel will eden) Nahe redeem His own, Forgiving alltransgression."], "credits": {"author": "M.Luther (1523) (Germany)", "translator": "A.T.Russell (1806-1874)", "tune": "Luthers Hymn"}}, {"number": 189, "old_number": null, "title": "Awake! the watchman crieth", "first_line": "Awake! the watchman crith, On Zion's ramparts still! The Lod s ae supplieth, Rep", "verses": ["Awake! the watchman crieth, On Zion's ramparts still! The Lord His grace supplieth, Repent, and heed His will. Life's journey fast is nearing, The everlasting shore; The hour of death appearing, When time shall be no more.", "Too late the sinners waken, Where morn hath ceased to dawn; Where grace that was forsaken, Is evermore withdrawn; Where is heard no praying sentence, God's mercy to implore; For there is no repentance, When time shall be no more.", "Awake! the voice still soundeth; 'Tis now the accepted hour; The grace of God aboundeth To save from sin's dread power. Make haste, implore Christ's favor, Thy sins confess, and bow, Before Thy Lord and Saviour - The accepted time is now."], "credits": {"author": "F.M.Fronzen"}}, {"number": 190, "old_number": "255", "title": "Come, let us to the Lord our God", "first_line": "Come, ye disconsolate, where'er ye languish, Come to the mercy seat, fervently k", "verses": ["Come, ye disconsolate, where'er ye languish, Come to the mercy seat, fervently kneel; Here bring your wounded hearts, here tell your anguish; Earth has no sorrow that Heav'n cannot heal.", "Joy of the desolate, light of the straying, Hope of the penitent, fadeless and pure, Here speaks the Comforter, tenderly saying, \"Earth has no sorrow that Heav'n cannot cure\".", "Here see the bread of life, see waters flowing, Forth from the throne of God, pure from above; Come to the feast of love, come, ever knowing, Earth has no sorrow but Heav'n can remove."], "credits": {"author": "T.Hastings(l832) I T. Moore reuiser (England)", "tune": "Consolator"}}, {"number": 191, "old_number": null, "title": "Lord, we confess our numerous faults", "first_line": "Lord, we confess our numerous faults; How great our guilt has been, How vain and", "verses": ["Lord, we confess our numerous faults; How great our guilt has been, How vain and foolish all our thoughts, And all our lives were sin.", "But, O my soul, forever praise, Forever love, His name, Who turns thy feet from dangerous ways, Of folly, sin, and shame.", "'Tis not by works of righteousness, Which our own hands have done, But we are saved by God's free grace, Abounding through His Son.", "'Tis from the mercy of our God, That all our hopes begin; 'Tis by the water and the blood, Our souls are washed from sin."], "credits": {"author": "I.Watts(1709) (Ger", "tune": "St. F"}}, {"number": 192, "old_number": null, "title": "None will reach the goal who tarries", "first_line": "None will reach the goal in the heavenly rest, Who will not boldly press onward.", "verses": ["None will reach the goal in the heavenly rest, Who will not boldly press onward. Here the soul must battle, the faith stand the test. Faith only faith brings you forward. Strait the gate is called, and narrow is the way. Soul you must here choose to follow or deny. Here you must now battle, yes, battle and strive. Heaven is lost if you're sleeping.", "Much there is that hinders, resist oh my soul. Satan denies you salvation. Press yourselfbeyond what diverts from your goal. Leave worldly wells of temptation. Heed not to the voice that's calling you away. For my precious soul, you will be led astray. No, through Jesus love I will plead and I pray. Fight for your crown in God's power.", "Wonderful is heaven, it's worth all your strife. Worth all your prayers and desire. None will e'er regret that has once reached the goal. And for his crown did aspire. Therefore, do not sleep, in faith you watch and pray. Always be prepared, to see the judgemnt day. One must wear the garment received from the Lord, For in the city to enter.", "Tis true that God is rich in grace Behold ing His Anointed's face. The blood f Christ atoned for sin, He died eternal life to win, Yet God doth not vouchsafe to say That tho ' shalt live \"another day.\"", "O hasten, sinner, to be wise! Nor dare God's message to despise. He Who this hour supplies thy breath, The next, may give thee o'er to death. And if thy sins are not forgiven, Thou'lt never, never enter heaven."], "credits": {"author": "L.Linderrot(1798) (Sweden) N.Herman Transl: M.Loy", "tune": "lngen Binner Fram Vater Unser"}}, {"number": 193, "old_number": null, "title": "O trifle not the time away", "first_line": "<25s> O trifle not the time away! Say not, \"I'll come another day.\" Say not, \"I'", "verses": ["O trifle not the time away! Say not, \"I'll come another day.\" Say not, \"I'll have my soul's desire, And turn when of the world I tire.\" Say not, \"I'll then converted be, God will be merciful to me.\"", "Tis true that God is rich in grace Beholding His Anointed's face. The blood of Christ atoned for sin, He died eternal life to win, Yet God doth not vouchsafe to say That thoα shalt live \"another day.\" '", "O hasten, sinner, to be wise! Nor dare God's message to despise. He Who this hour supplies thy breath, The next, may give thee o'er to death. And if thy sins are not forgiven, Thou'lt never, never enter heaven."], "credits": {"author": "N.Herman Transl: M.Loy",  health's eternal spring.", "To Father, Son, and Holy Ghost, e God, whom we adore, Be glory as it was, is now, And shall be evermore."], "credits": {"author": "N.Tate & N.Brad.y (1696) fE11Kland)", "tune": "Hudson(modi/ied)"}}, {"number": 198, "old_number": null, "title": "From God shall naught divide me", "first_line": "From God shall naught divide me, For He is true for aye, And on my path will gui", "verses": ["From God shall naught divide me, For He is true for aye, And on my path will guide me, Who else should often stray; His ever bounteous hand, By night and day is heedful, And gives me what is needful, Wheree'er I go or stand.", "When man's help and affection, Shall unavailing prove, God grants me His protection, And shows His pow'r and love. He helps in ev'ry need, From sin and shame redeems me, From chains and bonds reclaims me, Yea, e'en from death I'm freed.", "In God, my full trust shall be, Through trials I meet here, That He by faith will help me, So I have not to fear. With firm hope view my goal, Though tested in my journey, My Father guides and leads me, My body, spirit soul.", "Whate'er shall be His pleasure, Is surely best for me; He gave His dearest treasure, That our weak hearts might see, How good His will toward us; And in His Son He gave us, Whate'er could bless and save us; Praise Him who loveth thus!", "O praise Him, for He never, Forgets our daily need; O blest the hour whenever, To Him our thoughts can speed; Yea, all the time we spend, Without Him is but wasted, Till we His joy have tasted, The joy that hath no end.", "For when the world is passing, With all its pomp and pride, All we were here amassing, No longer may abide; But in our earthly bed, Where softly we are sleeping, God hath us in His keeping, To wake us from the dead.", "My soul be led to freedom, To rest eternally Where there will be no weeping, No pain ' to trouble me; Redeemed from all my sin, For grace, through Christ's own merit, God's kingdom, I inherit, As His child, foes; That soul, though all hell should endeavor to shake, I'll never, no never, no never forsake."], "credits": {"author": "N.J.Holm (1829) (Norway) K (1787) (England)", "translator": "c.uing 1906", "tune": "Huor Salig Er Den Lille Flok"}}, {"number": 200, "old_number": 279, "title": "How firm a foundation", "first_line": "How firm a foundation, ye saints of the Lord! Is laid for your faith in His exce", "verses": ["How firm a foundation, ye saints of the Lord! Is laid for your faith in His excellent word! What more can He say, than to you He hath said, To you who for refuge to Jesus have fled?", "Fear not, I am with thee, O be not dismayed, For I am thy God, I will still give thee aid; I'll strengthen thee, help thee, and cause thee to stand, Upheld by My righteous omnipotent hand.", "When through the deep waters, I call thee to go, The rivers of sorrow shall not overflow; For I will be with thee thy troubles to bless, And sanctify to thee thy deepest distress.", "When through fiery trials thy pathway shall lie, My grace all-sufficient, shall be thy supply, The flame shall not hurt thee, I only design, Thy dross to consume, and thy gold to refine.", "The soul that on Jesus hath leaned for repose, I will not, I will not desert to his foes; That soul, though all hell should endeavor to shake, I'll never, no never, no never forsake."], "credits": {"author": "K (1787) (England)", "tune": "Foundation"}}, {"number": 201, "old_number": null, "title": "I know my faith is founded", "first_line": "I know my faith is founded, On Jesus Christ, my God and Lord; And this my faith ", "verses": ["I know my faith is founded, On Jesus Christ, my God and Lord; And this my faith confessing, Unmoved I stand upon His word. Man's reason cannot fathom, The truth of God profound; Who trusts her subtle wisdom, Relies on shifting ground. God's word is all-sufficient, It makes divinely sure, And trusting in its wisdom, My faith shall rest secure.", "Increase my faith, dear Savior, For Satan nd heaven made; He hears the cry I sendeth, And graciously doth aid.", "Lows not my feet to blunder, For vigilant is He; He doth not sleep nor slumber, With me will always be. He shelters me with mercy, Is shade upon my hand, He night and day doth keep me, And ever will defend.", "Casts out the evil in me, He will sustain my soul; Allows His grace shine 'pon me, When grieved He doth console. My going and my coming, He leads by His own hand, With grace remains beside me, To Him I all commend."], "credits": {"author": "J.Arrhenius (1642-1725) (", "tune": "Au Fort De Ma D"}}, {"number": 204, "old_number": 253, "title": "In God, my faithful God", "first_line": "In God, my faithful God, I trust when dark my road; Though many woes o'ertake me", "verses": ["In God, my faithful God, I trust when dark my road; Though many woes o'ertake me, Yet He will not forsake me, His love it is doth send them, And when 'tis best, will end them.", "My sins assail me sore, But I despair no more. I build on Christ, Who loves me; From this Rock nothing moves me. To Him I all surrender, To Him, my soul's Defender.", "O Jesus Christ, my Lord, So meek in deed and word, Thou once didst die to save us, Because Thy love would have us Be eirs of heavenly gladness, When ends 'this hfe of sadness.", "\"So be it,\" then I say, With all my heart ech daJ'.'. We too, dear Lord, adore Thee; We smg for JOY before Thee. Guide us while here we wander, Until we praise Thee yonder.", "Look to Jesus, praying, waking, s trea d; Follow, worldly pomp feet on rose king, With thy cros s, whe re He hath forsa n; Baffled led. Look to Jesus in temptatio ter flee, And God 's angels shall the temp come to thee . ring, Per4. Look to Jesus, when dark lowe Unli ke His disciples ils thy horizon dim; _ cowering, Calm 'mid temp ests look n Him. Wm d and Trust in Him who still rebuketh, then, and billow, fire and flood; Forward! trust in God ., See what", "Look to Jesus when distressed hear t with conHe the Sinless, bore, Is th
