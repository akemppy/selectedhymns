s dear Lord are we, And come Thy lowly bed to see; Enlighten every", "verses": ["Thy little ones dear Lord are we, And come Thy lowly bed to see; Enlighten every soul and mind, That we the way to Thee may find.", "With songs we hasten Thee to greet, And kiss the dust before Thy feet, O blessed hour, O sweetest night, That gave Thee birth, our soul's delight.", "O draw us wholly to Thee, Lord, Do Thou to us Thy grace accord, True faith and love to us impart, That we may hold Thee in our heart.", "Until at last we, too, proclaim, With all Thy saints, Thy glorious name; In paradise our songs renew, And praise Thee as the angels do."], "credits": {"translator": "H.R.Krauth Spaeth (1898)", "tune": "Her Kommer Dine Arme Snul"}}, {"number": 65, "old_number": "92", "title": "While shepherds watched their flocks", "first_line": "While shepherds watched their flocks by night, All seated on the ground, The ang", "verses": ["While shepherds watched their flocks by night, All seated on the ground, The angel of the Lord came down, And glory shown around, And glory shown around.", "\"Fear not!\" said he; for mighty dread, Had seized their troubled mind, \"Glad tidings of great joy I bring, To you and all mankind, To you and all mankind.\"", "\"To you, In David's town this day, Is born of David's line, The Savior who is Christ the Lord; And this shall be the sign, And this shall be the sign:\"", "The heavenly babe you there shall find, To human view displayed, All meanly wrapped in swathing-bands, And in a manger laid, And in a manger laid.\"", "\"All glory be to God on high, And to the earth be peace; Good will henceforth from heaven to men, Begin and never cease, Begin and never cease.\""], "credits": {"tune": "Christmas"}}, {"number": 66, "old_number": null, "title": "From heav'n above to earth I come", "first_line": "From heav'n above to earth I come, To bear good news to ev'ry home; Glad tidings", "verses": ["From heav'n above to earth I come, To bear good news to ev'ry home; Glad tidings of great joy I bring, Whereof I now will say and sing:\"", "\"To you this night is born a Child, Of Mary, chosen virgin mild; This little Child, of lowly birth, Shall be the joy of all the earth.\"", "\"This is the Christ, our God and Lord, Who in all need shall aid afford; He will Himself your Savior be, From all your sins to set you free.\"", "\"He will on you the gifts bestow, Prepared by God for all below, That in His kingdom, bright and fair, You may with us His glory share. M", "\"These are the tokens ye shall mark: The swaddling-clothes and manger dark; There ye shall find the Infant laid, By whom the heavens and earth were made.\"", "Now let us all with gladsome cheer, Go with the shepherds and draw near, To see the precious gift of God, Who hath His own dear Son bestowed.", "Give heed, my heart, lift up thine eyes! What is it in yon manger lies? Who is this Child, so young and fair? The blessed Christchild lieth there.", "Welcome to earth, Thou noble Guest, Through whom the sinful world is blest! Thou com'st to share my misery; What thanks shall I return to Thee?", "Ah, Lord, who hast created all, How weak art Thou, how poor and small, That Thou dost choose Thine infant bed, Where humble cattle lately fed!", "For velvet's soft and silken stuff, Thou hast but hay and straw so rough, Where on Thou King, so rich and great, As 'twere Thy heaven, art throned in state.", "Were earth a thousand times as fair, Beset with gold and jewels rare, It yet were far too poor to be, A narrow cradle, Lord, for Thee.", "And thus, dear Lord, it pleaseth Thee, To make this truth quite plain to me, That all the world's wealth, honor, might, Are naught and worthless in Thy sight.", "Ah, dearest Jesus, holy Child, Make Thee a bed, soft, undefiled, Within my heart, that it may be, A quiet chamber kept for Thee.", "My heart for very joy doth leap, My lips no more can silence keep; I, too, must sing with joyful tongue, That sweetest ancient cradle-song:", "Glory to God in highest heaven, Who unto us His Son hath given! While angels sing with pious mirth, A glad new year to all the earth."], "credits": {"author": "M.Luther (1535) (Germany)", "translator": "C. Winkworth (1855)", "tune": "Vom Himmel Hoch"}}, {"number": 67, "old_number": "232", "title": "O'er Jerusalem Thou weepest", "first_line": "O'er Jerusalem Thou weepest, In compassion, dearest Lord. Love divine, of love t", "verses": ["O'er Jerusalem Thou weepest, In compassion, dearest Lord. Love divine, of love the deepest, O'er Thine erring Israel poured, Crieth out in bitter moan: \"O loved city, hadst thou known, This thy day of visitation, Thou wouldst not reject salvation.\"", "By the love Thy tears are telling, O Thou Lamb for sinners slain, Make my heart Thy temple dwelling, Purged from ev'ry guilty stain. Oh, forgive, forgive, my sin! Cleanse me, cleanse me, Lord, within! I am Thine since Thou hast sought me, Since Thy precious blood hath bought me .", "O Thou Lord of my salvation, Grant my soul Thy blood bought peace. By Thy tears of lamentation, Bid my faith and love increase. Grant me grace to love Thy Word, Grace to keep the message heard, Grace to own Thee as my Treasure, Grace to love Thee without measure.", "And while we pray, we lift our eyes, To dear ones gone before us, Safe home with Thee in Paradise, Whose peace descendeth o'er us; :An d beg of Thee, when life is past, To reunite us all at last, With those who've gone before us.", "We gather up, in this brief hour, The memory of Thy mercies: Thy wondrous goodness, love, and power, Our grateful song rehearses: For Thou hast been our Strength and Stay, In many a dark and dreary day, Of sorrows and reverses.", "Then, O great God, in years to come, Whatever may betide us, Right onward ) through our journey home, Be Thou at hand to guide us; Nor leave us till at close of life, Safe from all perils, toil, and strife, Heaven shall enfold and hide us."], "credits": {"author": "A.B.Dorothy HopP4J (1919) (USA J.Hamilton (1882) (Engl.and.)"}}, {"number": 68, "old_number": 108, "title": "Across the sky the shades of night", "first_line": "Across the sky the shades of night, This winter's eve are fleeting, We deck Thin", "verses": ["Across the sky the shades of night, This winter's eve are fleeting, We deck Thine altar, Lord, with light, In solemn worship meeting; And as the year's last hours go by, We raise to Thee our earnest cry, Once more Thy love entreating.", "Before Thee, Lord, we humbly bow; O do not Thou forsake us! Renew our faith and love, and now, More worthy Christians make us. So help us, Lord! Our strength must fail, Unless Thy light shine through the vale, To show where Thou would'st take us.", "New Year, new mercies, new gifts of love, New light of truth revealing! Grant us, dear Lord, from heav'n above, The power of healing feeling; Give us the faith that makes us free; Grant us Thy peace while we trust Thee, New grace for each day sealing.", "And while the year rolls onward fast, And suns rise up and vanish, Until we see Thy face at last, Do Thou our doubting banish. To all who seek Thee, Lord, be near, Through ev'ry month and ev'ry year, Until Thy grace our fears shall banish."], "credits": {"author": "Anonymous", "tune": "New Year Hymn"}}, {"number": 69, "old_number": 109, "title": "With grateful hearts the seed we sow", "first_line": "Great God! we sing that mighty hand, By which supported still we stand; The open", "verses": ["Great God! we sing that mighty hand, By which supported still we stand; The opening year Thy mercy shows, Let mercy crown it to its close.", "By day, by night, at home, abroad, Still we are guarded by our God; By His incessant bounty fed, By His unerring counsel led.", "With grateful hearts the past we own; The future, all to us unknown, We to Thy guardian care commit, And, peaceful, leave before Thy feet.", "In scenes exalted or depressed, Be Thou our joy and Thou our rest; Thy goodness all our hopes shall raise, Adored through all our changing days.", "When death shall interrupt our songs, And seal in silence mortal tongues, Our helper, God, in Whom we trust, In a better world our soul shall rest."], "credits": {"author": "P.Doddridge (1755) (England)", "tune": "Mendon"}}, {"number": 70, "old_number": 110, "title": "Help, Lord Jesus, let Thy blessing", "first_line": "Help, Lord Jesus, let Thy blessing, Rest upon this opening year; May we now, new", "verses": ["Help, Lord Jesus, let Thy blessing, Rest upon this opening year; May we now, new strength possessing, Walk in love and holy fear; Dearest Savior, speed our way; Strength bestow from day to day.", "In our hearts one purpose keeping, May we live alone to Thee; In our waking and our sleep- ing, Jesus, Thou our portion be; Going out, be Thou our guide; In our home with us abide.", "Lord, Thy blessing now receiving, Grant Thou us a hallowed year; Firmly on Thy word believing, May our service be sincere; That on earth we may become, Fitted for our heavenly home."], "credits": {"author": "J.uon Rist 1643 (Germany)", "tune": "Komm, 0 Komm, Du Geis"}}, {"number": 71, "old_number": "112", "title": "Jesus, name of wondrous love", "first_line": "Jesus, name of wondrous love. Name all other names above! Unto which must every ", "verses": ["Jesus, name of wondrous love. Name all other names above! Unto which must every knee, Bow in deep humility.", "Jesus, only name that's given, Under all the mighty heaven, Whereby man to sin enslaved, Bursts his fetters, and is saved.", "Jesus, name of wondrous love, Human name of God above: Pleading only this we flee, Helpless, O our God, to Thee."], "credits": {"author": "W.W.How (1854) (England)", "tune": "Gott Sei Dank"}}, {"number": 72, "old_number": "230", "title": "O God, our help in ages past", "first_line": "God, our help in ages past, Our Hope in years to come, Our Shelter from the stor", "verses": ["God, our help in ages past, Our Hope in years to come, Our Shelter from the stormy blast, And our eternal home.", "Under the shadow of Thy throne, Thy saints have dwelt secure; Sufficient is Thine arm alone, And our defense is sure.", "Time, like an ever rolling stream, Bears all its sons away; They fly forgotten, as a dream, Dies at the opening day.", "O God, our help in ages past, Our hope for years to come, Be Thou our Guard while troubles last, And our eternal home."], "credits": {"author": "I. Watts (1719) (England)", "tune": "St. Anne"}}, {"number": 73, "old_number": "113", "title": "Precious Name, oh how sweet", "first_line": "T ake the name of Jesus with you, Child of sorrow and of woe; It will joy and co", "verses": ["T ake the name of Jesus with you, Child of sorrow and of woe; It will joy and comfort give you, Take it, then, where'er you go. Precious name, oh, how sweet, Hope of earth and joy ofheaven. :,:", "Take the name of Jesus ever, As a shield from every snare; If temptations round you gather, Breathe that holy name in prayer. Precious name, oh, etc.", "At the name of Jesus bowing, Falling prostrate at His feet, King ofkings in heaven we'll crown Him, When our journey is complete. Precious name, oh, etc."], "credits": {"author": "L.O.Baxter (1870) (USAJ", "tune": "Precious Name"}}, {"number": 74, "old_number": "114", "title": "So that as Christians we may live", "first_line": "T he old year now hath passed away; We thank Thee, O our God today, That Thou ha", "verses": ["T he old year now hath passed away; We thank Thee, O our God today, That Thou hast kept us through the year, When danger and distress were near.", "We pray Thee, O eternal Son, Who with the Father reign'st as One, To guard and rule Thy Christendom, Through all the ages yet to come.", "Take not Thy saving word away, Our souls' true comfort, staff and stay; Abide with us and keep us free, From errors, following only Thee.", "So that as Christians we may live, Or die in peace that Thou canst give, To rise again when Thou shalt come, And enter Thine eternal home.", "There shall we thank Thee and adore, With all the angels evermore, Lord Jesus Christ, increase our faith, To praise Thy name through life and death."], "credits": {"author": "J.Steurlein (1588) (Germany)", "translator": "C. Winkworth (1863)", "tune": "Wenn Wir In Hachsten Noten Sein"}}, {"number": 75, "old_number": "115", "title": "Holy Jesus, every day", "first_line": "As with gladness men of old, Did the guiding star behold; As with joy they haile", "verses": ["As with gladness men of old, Did the guiding star behold; As with joy they hailed its light, Leading onward, beaming bright; So, most gracious God, may we, Evermore be led to Thee.", "As with joyful steps they sped, To that lowly cradle bed, There to bend the knee before, Him whom heaven and earth adore; So may we with willing feet, Ever seek Thy mercy-seat.", "As they offered gifts most rare, At that dwelling rude and bare; So may we with holy joy, Pure, and free from sin's alloy, All our costliest treasures bring, Christ, to Thee, our heavenly King.", "Holy Jesus, every day, Keep us in the narrow way; And, when earthly things are past, Bring our ransomed souls at last, Where they need no star to guide, Where no clouds Thy glory hide."], "credits": {"author": "W.C.Dix (1860) (Engla", "tune": "D"}}, {"number": 76, "old_number": "155", "title": "O wondrous type, O vision fair", "first_line": "O wondrous type, O vision fair, Of glory that the Church shall share, Which Chri", "verses": ["O wondrous type, O vision fair, Of glory that the Church shall share, Which Christ upon the mountain shows, Where brighter than the sun He glows.", "From age to age the tale declare, How with the three disciples there, Where Moses and Elias meet, The Lord holds converse high and sweet.", "The law and prophets there have place, The chosen witnesses of grace; The Father's voice from out the cloud, Proclaims His only Son aloud.", "With shining face and bright array, Christ deigns to manifest today, What glo- ry shall to faith be given, When we enjoy our God in heaven. Allthor: Sarum.Breviary (1494) (Latin)"], "credits": {"translator": "J.M. Neale (1851)", "tune": "Viilsignat Ar Det Hem Forvisst"}}, {"number": 77, "old_number": null, "title": "Jesus, by grace Thou savest us", "first_line": "The chosen three by grace from Thee, The holy mount ascended, Where, wrapped in ", "verses": ["The chosen three by grace from Thee, The holy mount ascended, Where, wrapped in blissful ecstasy, They saw the vision splendid, Their Lord arrayed in living light, And on His left hand and His right, By nd) glorious saints attended. i:.c", "O vision bright, too bright to tell, The joys of heaven unveiling! How precious on those hearts it fell, When earthly hopes were failing; If the dim foretaste was so bright, O what shall be the dazzling light, Of Thine eternal dwelling."], "credits": {"author": "W.W.How (1823-1897) (England)", "tune": "Luthers Hymn"}}, {"number": 78, "old_number": "350", "title": "Comfort, comfort, ye My people", "first_line": "Comfort, comfort, ye My people, Speak ye peace, thus saith our God; Comfort thos", "verses": ["Comfort, comfort, ye My people, Speak ye peace, thus saith our God; Comfort those who sit in darkness, Mourning 'neath their sorrows' load. Speak ye to Jerusalem, Of the peace that waits for them; Tell her that her sins I cover, And her warfare now is over.", "Yea, her sins our God will pardon, Blotting out each dark misdeed; All that well deserved His anger, He no more will see or heed. She hath suffered many a day, Now her griefs have passed away; God will change her pining sadness, Into everspringing gladness.", "Hark, the Herald's voice is crying, In the desert far and near, Bidding all men to repentance, Since the kingdom now is here. Oh, that warning cry obey! Now prepare for God a way; Let the valleys rise to meet Him, And the hills bow down to greet Him.", "Make ye straight what long was crooked, Make the rougher places plain; Let your hearts be true and humble, As befits His holy reign. For the glory of the Lord, Now o'er earth is shed abroad, And all flesh shall see the token, That His word is never broken."], "credits": {"author": "J.G.Olearius (1671) (G", "translator": "C.Winkworth", "tune": "Freu Dich Sehr (Genev"}}, {"number": 79, "old_number": "117", "title": "A way to Calv'ry leadeth", "first_line": "Away to Calv'ry leadeth, From dark Gethsemane, May ev'ry one behold Him, Who wea", "verses": ["Away to Calv'ry leadeth, From dark Gethsemane, May ev'ry one behold Him, Who weary walks that way. The way doth lead to perfect bliss, But a way of pain it is.", "In nameless woe our Savior, Here passed with troubled breath, His heart of tender mercy, That day was pierced to death. The way doth lead etc.", "Behold Him in the garden, All down with sorrow weighed, When in that hour of darkness, He sweated blood and prayed. The way doth lead etc.", "My soul, in night of sorrow, Learn here what you must do, Then at the cross your treasure, Will be revealed to you. The way doth lead etc.", "With nails and spear-point wounded, He down to death must go, But from those wounds abundant, The streams of life will flow. The way doth lead etc.", "What bliss to be permitted, One's soul to bathe therein, And thus be cleansed forever, From every taint of sin! The way doth lead etc.", "Thus only we are learning, That song forever new, Which to our Savior's glory, Shall ring all ages through. The way doth lead etc."], "credits": {"author": "C.G.Liander (1882-1916) (Sweden)", "translator": "O.Lee (1859-1943)", "tune": "Via Dolorosa"}}, {"number": 80, "old_number": null, "title": "Alas! and did my Savior bleed", "first_line": "Alas! and did my Savior bleed? And did my Sov'reign die? Would He devote that sa", "verses": ["Alas! and did my Savior bleed? And did my Sov'reign die? Would He devote that sacred head, For such a worm as I?", "Was it for crimes that I have done, He groan'd upon the tree? Amazing pity! grace unknown! And love beyond degree!", "Well might the sun in darkness hide, And shut His glories in, When Christ, the mighty Maker, died, For man, the creature's sin.", "But drops of grief can ne'er repay, The debt of love I owe: Here, Lord, I give myself away, 'Tis all that I can do."], "credits": {"author": "I.Watts (1707) (En", "tune": "Hudson(modi"}}, {"number": 81, "old_number": 119, "title": "Go to dark Gethsemane", "first_line": "Go to dark Gethsemane, Ye that feel the tempter's power; Your Redeemer's conflic", "verses": ["Go to dark Gethsemane, Ye that feel the tempter's power; Your Redeemer's conflict see, Watch with Him one bitter hour; Turn not from His griefs away, Learn of Jesus Christ to pray.", "Follow to the judgment-hall, View the Lord of life arraigned; O the wormwood and the gall! O the pangs His soul sustained! Shun not suffering, shame or loss, Learn of Him to bear the cross.", "Calvary's mournful mountain climb, There, adoring at His feet, Mark that miracle of time, God's own sacrifice complete; \"It is finished,\" hear the cry, Learn of Jesus Christ to die.", "Early hasten to the tomb, Where they laid His breathless clay; Allis solitude and gloom, Who hath taken Him away? Christ is risen! He meets our eyes, Savior, teach us so to rise."], "credits": {"author": "J.Montgornery (1820) (En", "tune": "Redhead N"}}, {"number": 82, "old_number": null, "title": "Jesus, keep me near the cross", "first_line": "Jesus, keep me near the cross, There a precious fountain, Free to all, a healing", "verses": ["Jesus, keep me near the cross, There a precious fountain, Free to all, a healing stream, Flows from Calvary's mountain. In the cross, in the cross, Be my glory ever; Till my raptured soul shall find, Rest beyond the river.", "Near the cross, a trembling soul, Love and mercy found me; There the Bright and Morning Star, Sheds its beams around me. In the cross, in the cross, Be my glory ever; Till my raptured soul shall find, Rest beyond the river.", "Near the cross! O Lamb of God, Bring its scenes before me; Help me walk from day to day, With its shadow o'er me. In the cross, in the cross, Be my glory ever; Till my raptured soul shall find, Rest beyond the river.", "Near the cross I'll watch and wait, Hoping, trusting ever, Till I reach the golden strand, Just beyond the river. In the cross, in the cross, Be my glory ever; Till my raptured soul shall find, Rest beyond the river."], "credits": {"author": "F.Crosby (1869) (USA) Bernard ofClairoaux (1153)", "tune": "Jesus Keep Me Near The Cross Passion", "translator": "Latin to German P.G"}}, {"number": 83, "old_number": 121, "title": "O sacred Head, now wounded", "first_line": "O sacred Head, now wounded, With grief and shame weighed down, Now scornfully su", "verses": ["O sacred Head, now wounded, With grief and shame weighed down, Now scornfully surrounded, With thorns, Thine only crown; O sacred Head, what glory, What bliss till now was Thine! Yet, though despised and gory, I joy to call Thee mine.", "What Thou, my Lord, hast suffered Was all for sinners' gain; Mine, mine was the transgression, But Thine the deadly pain. Lo, here I fall, my Savior! 'Tis I deserve Thy place; Look on me with Thy favor, Vouchsafe to me Thy grace.", "What language shall I borrow To thank Thee, dearest Friend, For this Thy dying sorrow, Thy pity without end? O make me Thine forever; And should I fainting be, Lord, let me never, never Outlive my love for Thee.", "Be near when I am dying, O show Thy cross to me! And, for my succor flying, Come, Lord, to set me free. These eyes, new faith receiving, From Thee shall never move; For he who dies believing, Dies safely in Thy love."], "credits": {"author": "P.Gerhardt (1656) (Germany)", "translator": "J.W.Alexander (1830)", "tune": "Passion Chorale"}}, {"number": 84, "old_number": "122", "title": "O what precious balm and healing", "first_line": "O what precious balm and healing, Jesus, in Thy wounds I find! Every hour that I", "verses": ["O what precious balm and healing, Jesus, in Thy wounds I find! Every hour that I am feeling, Pains of body and of mind; Should some evil thought rush in, And provoke my flesh to sin, Thoughts of Thy deep wounds, from sinning, Keep me in its first beginning.", "Yes, whate'er may pain or grieve me, Thy dear wounds can make me whole; When my heart sinks, they revive me, Life pours in upon my soul: May Thy comfort render sweet, Every bitter cup I meet; Thou who by Thy death and passion, Hast procured my soul's salvation.", "Well of life, if Thou art nigh me, May I be of Thee supplied; Fill my soul with joy and gladness, Cleanse me, purify my heart; Grant me Lord, to see Thy goodness, Ere from earth I now depart."], "credits": {"author": "J.Heerman (1644) (Pol.and)", "translator": "Composite trans/.ation."}}, {"number": 85, "old_number": null, "title": "Gethsemane, Gethsemane", "first_line": "The hour in Gethsemane, I never shall forget, When Christ alone the battle fough", "verses": ["The hour in Gethsemane, I never shall forget, When Christ alone the battle fought, In grief and bloody sweat. Gethsemane, Gethsemane, I must remember thee, Where God's eternal Son I saw, In prayer on bended knee.", "When I among thy solemn trees, In spirit gazed around; I saw the burden of my sin, On Him with judgment bound. Gethsemane, Gethsemane, I etc.", "I saw Him tempted to despair, By anguish, grief, bent low; The depth of pain He suffered there, No man can fully know. Gethsemane, Gethsemane, I etc.", "If ever Lord, my love to Thee, Should cold and fruitless be, O show me in Gethsemane, Thy suffring there for me. Gethsemane, Gethsemane, I etc."], "credits": {"author": "E.P.Hamrrwnd (1866) (", "translator": "T.O.Bumtvedt (193", "tune": "Gethsemane(modi"}}, {"number": 86, "old_number": null, "title": "When o'er my sins I sorrow", "first_line": "When o'er my sins I sorrow, Lord, I will look to Thee, And hence my comfort borr", "verses": ["When o'er my sins I sorrow, Lord, I will look to Thee, And hence my comfort borrow, That Thou wast slain for me. Yea, Lord, Thy precious blood was spilt, For me, O most unworthy, To take away my guilt.", "O what a marv'lous offering! Behold, the Master spares His servants, and their suffring, And grief for them He bears. God stoopeth from His throne on high; For me, His guilty creature, He deigns as Man to die.", "My manifold transgression, Henceforth can harm me none, Since Jesus' bloody passion, For me God's grace hath won. His precious blood my debts hath paid; Of hell and all its torments, I am no more afraid.", "Therefore I will forever, Give glory unto Thee, O Jesus, loving Savior, For what Thou didst for me. I'll spend my breath in songs of thanks, For Thy sad cry, Thy suffrings, Thy wrongs, Thy guiltless death."], "credits": {"author": "J. Gesenius (1601-1673) (Germany)", "translator": "C. Winkworth", "tune": "0 Jesu, An De Dina"}}, {"number": 87, "old_number": "126", "title": "He is arisen! Glorious word!", "first_line": "He is arisen! Glorious word! Now reconciled is God, my Lord; The gates of heaven", "verses": ["He is arisen! Glorious word! Now reconciled is God, my Lord; The gates of heaven are open. My Jesus died triumphantly, And Satan's arrows broken lie, Destroyed hell's direst weapon."], "credits": {"tune": "Wie Schon Leuchtet"}}, {"number": 88, "old_number": "127", "title": "Jesus lives! the broken tomb", "first_line": "Jesus lives! the broken tomb, Tells the resurrection story, Joy has now dispelle", "verses": ["Jesus lives! the broken tomb, Tells the resurrection story, Joy has now dispelled the gloom; Sealed His passion is with glory. Lightning gleams, and mountains shiver, He was dead, but lives forever.", "I have won; the triumph's His! Death is swallowed up in victory! Bound the Prince of Darkness is, Free am I! O blessed mystery! Mine is heaven fair and glorious, Jesus won, I am victorious."], "credits": {"author": "J.N.Brun (1745-1816) (N", "translator": "D.G.", "tune": "Blesd Jesus, At Thy"}}, {"number": 89, "old_number": null, "title": "Like the golden sun ascending", "first_line": "Like the golden sun ascending, Breaking through the gloom of night, On the earth", "verses": ["Like the golden sun ascending, Breaking through the gloom of night, On the earth His glory spending, So that darkness takes to flight; Thus my Jesus from the grave, And death's dismal dreadful cave, Rose triumphant Easter morning, At the early purple dawning.", "Thanks to Thee, O Christ victorious! Thanks to Thee, O Lord of life! Death hath now no power o'er us, Thou hast conquered in the strife; Thanks because Thou didst arise, And hast opened Paradise! None can fully sing the glory, Of the resurrection story.", "For my heart finds consolation, And my fainting soul grows brave, When I stand in contemplation, At the dark and dismal grave, When I see where Thou didst sleep, In death's dungeon dark and deep, Yet didst break all bands asunder, Must I not rejoice and wonder?", "Thou hast died for my transgression. All my sins on Thee were laid; Thou hast won for me salvation, On the cross my debt was paid; From the grave I shall arise, And shall meet Thee in the skies. Death itself is transitory, I shall lift my head in glory.", "Grant me grace, O blessed Saviour, And orway) Ristad Thy Holy Spirit send, That my walk and my Word behavior, May be pleasing to the end: That I may not fall again, Into death's grim pit and pain, Whence by grace Thou hast retrieved me, And from which Thou hast relieved me.", "For the joy Thy birth doth give me, For Thy holy, precious word; For Thy baptism which doth save me, For Thy gracious festal board; For Thy death, the bitter scorn, For Thy resurrection morn, Lord, I thank Thee and extol Thee, And in heaven I shall behold Thee."], "credits": {"author": "T.H.Kingo (1689) (Denmark)", "translator": "KKSolberg (1908)", "tune": "Werde Munr"}}, {"number": 90, "old_number": null, "title": "Praise the Savior, Now and ever", "first_line": "Praise the Savior, Now and ever! Praise Him all beneath the skies! Prostrate lyi", "verses": ["Praise the Savior, Now and ever! Praise Him all beneath the skies! Prostrate lying, Suffering, dying, On the cross, a sacrifice; Victory gaining, Life obtaining, Now in glory, He doth rise.", "All is finished, And accomplished; Christ is now our righteousness. He our Savior, Hath forever, Set us free from dire distress. Through His merit, we inherit, Light and peace and happiness.", "We're delivered, Our bonds severed, Christ hath bruised the serpent's head; Death no longer is the stronger, Hell itself is captive led. Christ hath risen, From death's prison, O'er the tomb, He light hath shed.", "Praise forever, For His favor, Unto God the Father sing; Praise the Savior, Praise Him ever, Son of God, our Lord and King; Praise the Spirit, Through Christ's merit, He doth us salvation bring."], "credits": {"author": "V.H.C.Fortunatus (530-609) (Fronc", "translator": "A.Nelson (18", "tune": "Upp, Min"}}, {"number": 91, "old_number": null, "title": "The Savior is risen", "first_line": "The Savior is risen, Light bursts from the tomb; The living fulfillment of scrip", "verses": ["The Savior is risen, Light bursts from the tomb; The living fulfillment of scripture is come. Adored by the angels, The victor comes forth, To claim for His kingdom, The ransomed on earth. The seal has been broken, The stone rolled away, And gone are the 71S watcher, In fear and dismay; Hell trembles before Him_ Hallelujah.", "Light grappled with darkness, death wrestled with life; Now light comes triumphant, From out of dead strife. While death lieth vanquised, Hope kindles again, The torch of the faithful, To shine among men. Ye sorrowing women, Who hither have sped Why d seek ye the living, Today 'mongst the ead? For Jesus is risen, Hallelujah.", "Now God in His heaven, And men are as one, The grave is a pathway, thru' Christ to th throne. Ye friends that are bending, In gnef at the cross, Now lift your heads gladly, Ye suffered no loss. O flock scattered y' widely, Return to the fold: Th Shepherd still liveth, And now as of old, He leadeth thee Godward. Hallelujah.", "Mid storms and upheavals, His Church stands secure. The truth of His gospel, Shall e (Gaul)) ever endure. Lo! unto all peoples, His mes63-1949) sage shall speed, Proclaiming 'mid turmoil Tunga The Lord's mighty deed, Proclaiming th . S8:viour, Who died for all men, And, having arisen, Now liveth again, Firstfruits of the sleeping. Hallelujah.", "Then weep not, ye faithful Yield not to despair: The night soon is o er, The day shall appear. Though earth shall embrace 'lb you, When death lays you low, The seed of His sowing, To harvests will grow; And soon shall the Sower, Return to His field, With angels to gather, Its heavenly yield, From evil tares severed. Hallelujah."], "credits": {"author": "F.M.Franzen (1811) (S", "translator": "E. W.Olson (187", "tune": "Hvad Ljus O{ver G"}}, {"number": 92, "old_number": "132", "title": "O wondrous Conqueror and great", "first_line": "O wondrous Conqueror and great, Scorned by the world Thou didst create, Thy work", "verses": ["O wondrous Conqueror and great, Scorned by the world Thou didst create, Thy work is all completed! Thy toilsome course is at an end; Thou to the Father dost ascend, In royal glory seated. Lowly, Holy, Now victorious, High and glorious: Earth and heaven, To Thy rule, O Christ, are given.", "Thou, Lord, art now our head, and we, Thy members are, and draw from Thee, Our life and full salvation. For comfort, peace, joy, light and power, For balm to heal in sorrow's hour, We yield Thee adoration. Kneeling, Feeling, Thou art nearest, Lord, and dearest: we're receiving, Grace surpassing our conceiving.", "Lord Jesus, keep our eyes on Thee; Help us Thy servants true to be, Fulfilling Thy good pleasure, Set Thou our minds on things above, Let this vain world ne'er win our love, Be Thou our only treasure. Wholly, Lowly, We would own Thee, And enthrone Thee: Wisdom learning, All Thy perfect ways discerning.", "Thou, Jesus, art our shield and guide, O weckn) let Thy words in us abide, Directing all our O-1958) going. Teach us to love Thy blessed will, To riften suffer meekly and be still, Nor fear griefs tide o'erftowing, Weeping, Keeping, Low before Thee, We adore Thee, 'Midst our sorrow, Lord, we hail the coming morrow.", "Lord Jesus, hasten Thy return; Our longing hearts expectant yearn, To prove the joys of heaven. Thy precious blood has set us free, We owe our present all to Thee, For us Thy life was given. Singing, Bringing, Praise abounding, Now we're sounding, Never-ending, Triumph, Lord, in Thy ascending."], "credits": {"author": "E.C.Homburg (1605-1681) (Germany)", "translator": "H.KBurlingham 1865", "tune": "Wie Schan Leuchtet"}}, {"number": 93, "old_number": null, "title": "Praise we the Father and the Son", "first_line": "Come, Holy Ghost, Creator blest, Vouchsafe within our souls to rest; Come with T", "verses": ["Come, Holy Ghost, Creator blest, Vouchsafe within our souls to rest; Come with Thy grace and heavenly aid, And fillthe hearts which Thou hast made.", "To Thee, the Comforter, we cry, To Thee the gift of God most high, The fount of life, the fire of love, The soul's anointing from above.", "Thy light through every sense and part, And shed Thy love in every heart; Thy own unfailing might supply, To strengthen our infirmity.", "Make Thou to us the Father known; Teach us the eternal Son to own, And Thee, whose name we ever bless, Of both the Spirit to confess.", "Praise we the Father and the Son, And Holy Spirit, Three in One: And may the Son on us bestow, The gifts that from the Spirit fl.ow."], "credits": {"author": "R.Maurus circia (800) (Ge", "translator": "", "tune": "M"}}, {"number": 94, "old_number": "135", "title": "Come, Holy Spirit, God and Lord", "first_line": "Come, Holy Spirit, God and Lord! Be all Thy graces now outpoured, On each believ", "verses": ["Come, Holy Spirit, God and Lord! Be all Thy graces now outpoured, On each believer's mind and heart; Thy fervent love to them impart. Lord, by the brightness of Thy light, Thou in the faith dost men unite, Of every land and every tongue; This to Thy praise, O Lord, be sung. Hallelujah! Hallelujah!", "Thou Holy Light, Guide divine, O cause the word of life to shine; Teach us to know our God aright, And call Him Father with delight. From error, Lord, our souls defend, That they on Christ alone attend, In Him with living faith abide, In Him with all their might confide. Hallelujah! Hallelujah!", "Thou Holy Fire, Source of rest, Grant hat with joy and hope possest, We always m Thy service stay, And trouble drive us not away. Lord, By Thy power prepare each heart, To our weak nature strength impart, That firmly here we may contend Through life and death to Thee ascend '. Hallelujah! Hallelujah!"], "credits": {"author": "M.Luther (1524) (Germany) H.Held crcia", "translator": "Composite translation C. W.Schaeffer (1866)", "tune": "Komm, Heiliger Geist, Herre Gott Kalmar"}}, {"number": 95, "old_number": 136, "title": "Come, O come Thou quickening Spirit", "first_line": "Come, O come Thou quickening Spirit, Thou forever art divine; Let Thy power neve", "verses": ["Come, O come Thou quickening Spirit, Thou forever art divine; Let Thy power never fail me, Always fill this heart of mine; Thus shall grace, and truth, and light, Dissipate the gloom of night.", "Grant my mind and my affections, Wisdom, counsel, purity, That I may be ever seeking, Naught but that which pleases Thee, Let Thy knowledge spread and grow, And all error overthrow.", "And when my last hour is nearing, O assure me ever more, As the chosen heir of heaven, Of that bliss for me in store, Greater far than tongue can tell, There, redeemed by Christ, to dwell."], "credits": {"author": "H.Held circa (1664) (Germany)", "translator": "C.W.Schaeffer (1866)", "tune": "Kalmar"}}, {"number": 96, "old_number": "137", "title": "O Holy Spirit, enter in", "first_line": "Holy Spirit, enter in, And in our hearts Thy work begin, Thy temple deign to mak", "verses": ["Holy Spirit, enter in, And in our hearts Thy work begin, Thy temple deign to make us; Sun of the soul, Thou light divine, Around and in us brightly shine, To joy and gladness wake us. That we, To Thee, Truly living, To Thee giving, Prayer unceasing, Still may be in love increasing.", "O mighty Rock, O Source of life, Let Thy dear word, mid doubt and strife, Be so within us burning, That we be faithful unto death, In Thy pure love and holy faith, From Thee true wisdom learning! Thy grace, And peace, On us shower; By Thy power, Christ confessing, Let us win our Savior's blessing.", "Grant that our days, while life shall last, In purest holiness be passed, Be Thou our strength forever; Grant that our hearts henceforth be free, From sinful lust and vanity, Which us from Thee must sever, Keep Thou, Pure now, From offenses, Heart and senses, Blessed spirit! Let us heavenly life inherit."], "credits": {"author": "M.Schirm£r (1640) (Ger", "translator": "C. Winkwort", "tune": "Wie Schan Leu"}}, {"number": 97, "old_number": 155, "title": "O Holy Spirit, grant us grace", "first_line": "Holy Spirit, grant us grace, That we our Lord and Savior, In faith and fervent l", "verses": ["Holy Spirit, grant us grace, That we our Lord and Savior, In faith and fervent love embrace, And truly serve Him ever, So that when death is drawing nigh, We to His open wounds may fly, And find in them salvation.", "Help us that we Thy saving word, In faithful hearts may treasure; Let e'er that bread of life afford, New grace in richest measure; Yea, let us die to every sin, For heav'n create us new within, That fruits of faith may flourish.", "And when our earthly race is run, Death's bitter hour impending. Then may Thy work, in us begun, Continue 'til life's ending; Until we gladly may commend, Our souls into our Savior's hand, To rest in peace eternal."], "credits": {"author": "B.Ringwaldt (1581) (Germany)", "translator": "O.H.Smeby (1909)", "tune": "Luthers Hymn"}}, {"number": 98, "old_number": null, "title": "Oh Holy Spirit, come this hour", "first_line": "Oh Holy Spirit, come this hour, Waken us all with thy Holy Word, Let all the peo", "verses": ["Oh Holy Spirit, come this hour, Waken us all with thy Holy Word, Let all the people see thy power. Fire descending from heav'n to earth, A prick within our hearts do give, That we eternally may live, Oh Holy Spirit, hear us. many) h 1863", "Spirit of Truth, expose our strife, Secret chtet distress by Thy light is shown. Nourishment from God's word gives life, Man shall not live by bread alone. Oh that a hunger may be stirred, Throughout the earth to hear Thy word, Spirit of Truth, awaken us.", "Oh Holy Spirit, peaceful dove, Highly proclaim of Christ's mystery, Witness by faith of His passion and love, Show the disheartened His victory, Show unto us God's righteousness, Let us behold His blessedness, Oh Holy Spirit, save us.", "Spirit of Charity, hand in hand, Teach us to walk with each other. Bind us with peace, That mighty band, Help us that love we discover, Guide us to follow Jesus' way. Teaching us in Thy name to pray, Spirit of charity, lead us."], "credits": {"author": "P.Nilsson (1934) (", "tune": "Der Geist Des Herm Erfallt"}}, {"number": 99, "old_number": null, "title": "Come, Thou mighty King", "first_line": "Come, Thou almighty King, Help us Thy name to sing, Help us to praise; Father; a", "verses": ["Come, Thou almighty King, Help us Thy name to sing, Help us to praise; Father; all-glorious, O'er all victorious, Come and reign over us, Ancient of days.", "Come, Thou incarnate Word, Gird on Thy mighty sword; Our prayer attend; Come and Thy people bless, And give Thy word success, Spirit of holiness, On us descend!", "Come, Holy Comforter! Thy sacred witness bear, In this glad hour; Thou who almighty art, Now rule in every heart, And ne'er from us depart, Spirit of power!", "To the great One in Three, The highest praises be, Hence evermore: His sovereign majesty, May we in glory see, And to eternity love and adore."], "credits": {"author": "Anonymous: ataly)", "tune": "Italian Hymn"}}, {"number": 100, "old_number": "142", "title": "Hallelujah! Let praises ring!", "first_line": "Hallelujah! Let praises ring! To God the Father let us bring, Our songs of adora", "verses": ["Hallelujah! Let praises ring! To God the Father let us bring, Our songs of adoration. To Him through everlasting days, Be worship, honor, pow'r, and praise, Whose hand sustains creation. Singing, Ringing: Holy, holy, God is holy, Spread the story, Of our God, the Lord of Glory.", "Hallelujah! Let praises ring! Unto the Lamb of God we sing, In Whom we are elected, He bought His Church with His own blood, He cleansed her in that blessed flood, And as His Bride selected. Holy, Holy, Is our union, And communion. His befriending, Gives us joy and peace unending.", "Hallelujah! Let praises ring! Unto the Holy Ghost we sing, For our regeneration. The saving faith in us He wrought, And us unto the Bridegroom brought, Made us His chosen nation. Glory! Glory! Joy eternal, Bliss supernal; There is manna, And an endless, glad hosanna.", "Hallelujah! Let praises ring! Unto our Triune God we sing; Blest be His name forever! With angel hosts let us adore, And sing His praises more and more, For all His grace and favor! Singing, Ringing: Holy, holy, God is holy, Spread the story, Of our God, the Lord of Glory!"], "credits": {}}, {"number": 101, "old_number": "143", "title": "Holy, holy, holy! Lord God Almighty", "first_line": "Holy, holy, holy! Lord God Almighty! Early in the morning our so g shall ?- rise", "verses": ["Holy, holy, holy! Lord God Almighty! Early in the morning our so g shall ?- rise to Thee; Holy, holy, holy, mer ciful and mighty; God in three Persons, blessed Trinity!", "Holy, holy, holy! All the saints adore Theel Casting down their golden crowns around the glassy sea; Cherubim and seraphim falling down before Thee, Which wert and art and evermore shalt be.", "Holy, holy, holy! Though the darkness hide Thee! Though the eye of sinful man Thy glory may not see; Only Thou art holy; there is none beside Thee, Perfect in power, in love and purity.", "Holy, holy, holy! Lord God Almighty! All Thy works shall praise Thy name, in earth and sky and sea; Holy, holy, holy, mer d mighty; God in three Persons, blessed Trinity!"], "credits": {"author": "R.Heber (1826) (England)"}}, {"number": 102, "old_number": null, "title": "Let me be Thine forever", "first_line": "Let me be Thine forever, My faithful God and Lord; Let me forsake Thee never, No", "verses": ["Let me be Thine forever, My faithful God and Lord; Let me forsake Thee never, Nor wander from Thy Word. Lord, do not let me waver, But give me steadfastness, And for such grace forever, Thy holy name I'll bless.", "Lord Jesus, my salvation, My light, my life divine, My only consolation, O make me wholly Thine! For Thou hast dearly bought me, With blood and bitter pain. Let me, since Thou hast sought me, Eternal life obtain.", "And Thou, O Holy Spirit, My comforter and guide, Grant that in Jesus' merit, I always may confide, Him to the end confessing, Whom I have known by faith. Give me Thy constant blessing, And grant a Christian death."], "credits": {"author": "N.SelMclrer (u. 1) u.2&3 (1572)(1688) (Germany)"}}, {"number": 103, "old_number": null, "title": "O Jesus Christ, Thou Shepherd good", "first_line": "Lord, my God, I cry to Thee! In my distress Thou helpest me. To Thee myself I no", "verses": ["Lord, my God, I cry to Thee! In my distress Thou helpest me. To Thee myself I now commend: O swiftly now Thine angel send, To guide me home and cheer my heart, Since Thou dost call me to depart.", "O Jesus Christ, Thou Lamb of God, Once slain to take away our load; Now let Thy cross, Thine agony, Avail to save and solace me; Thy death to open heaven, and there, Bid me the joy of angels share.", "O Holy Spirit, at the end, Sweet Comforter, be Thou my friend; When death and hell assail me sore, Leave me, O leave me nevermore, But bear me safely through the strife, As Thou hast promised, into life!"], "credits": {"author": "N.Selnecker (1587) (G", "translator": "C. Wi", "tune": "Vate"}}, {"number": 104, "old_number": null, "title": "Oh, Holy Father, come and bless", "first_line": "Oh, Holy Father, come and draw us nearer, That we can see Your doctrine so much ", "verses": ["Oh, Holy Father, come and draw us nearer, That we can see Your doctrine so much clearer, You Who can give us, all things that are dearer, Hear us, oh Father.", "Jesus be near us, death for us You suffered. Bring us salvation, hear the prayer we utter. Lead us and bear us, that we do not falter. All through Your power.", "Oh, Holy Spirit, Who in truth does lead us. Heavenly Dove, today, descend upon us. Sanctify, bless each, praying soul, and hear us. Amen, yes Amen."], "credits": {"author": "J.T.Jacobsson (1889)", "tune": "Lobet De"}}, {"number": 105, "old_number": 140, "title": "Behold a host", "first_line": "Behold a host, arrayed in white, Like thousand snow-clad mountains bright. With ", "verses": ["Behold a host, arrayed in white, Like thousand snow-clad mountains bright. With palms they stand; Who are this band, Before the throne of light? Lo, these are they, of glorious fame, Who from the great affliction came, And in the flood of Jesus' blood, Are cleansed from guilt and blame; Now gathered in the holy place, Their voices they in worship raise, Their anthems swell where God doth dwell, Mid angels' songs of praise.", "Then hail! ye mighty legions, yea, All hail! now safe and blest for aye; And praise the Lord, Who with His Word, Sustained you on the way. He by His blood redeemed you, And from darkness brought you into light; He shielded, safely guided, And through grace eternal gained your right. His faithful love, From heaven above, Will crown you now with joy and blessedness."], "credits": {"author": "H.A.Brorson (1760) (Denmark)", "translator": "Composite translation", "tune": "Den Store Huide Flok"}}, {"number": 106, "old_number": null, "title": "For all the saints who from their labors rest", "first_line": "For all the saints who from their labors rest, Who Thee by faith before the worl", "verses": ["For all the saints who from their labors rest, Who Thee by faith before the world confess, Thy name, O Jesus, be forever blest, Alleluia! Alleluia!", "Thou wast their Rock, their Fortress, and their Might; Thou, Lord, their Captain in the well-fought fight; Thou, in the darkness drear, their one true Light. Alleluia! Alleluia", "Oh, may Thy soldiers, faithful, true and bold, Fight as the saints who nobly fought of old, And win with them the victor's crown of gold. Alleluia! Alleluia!", "O blest communion, fellowship divine, We feebly struggle, they in glory shine; Yet all are one in Thee, for all are Thine. Alleluia! Alleluia!", "And when the fight is fierce, the warfare long, Steals on the ear the distant triumph song, And hearts are brave again, and arms are strong. Alleluia! Alleluia!", "But, lo, there breaks a yet more glorious day; The saints triumphant rise in bright array; The King of Glory passes on His way. Alleluia! Alleluia!", "From earth's wide bounds, from ocean's farthest coast, Through gates of pearl streams in the countless host, Singing to Fa- ther, Son, and Holy Ghost, Alleluia! Alleluia!", "The golden evening brightens in the west; Soon, soon, to faithful warriors cometh rest. Sweet is the calm of paradise the blest. Alleluia! Alleluia!", "Apostles, prophets, martyrs, And all the sacred throng, Who wear the spotless raiment, Who raise the ceaseless song; For these, passed on before us, Savior, we Thee adore, And, walking in their footsteps, Would serve Thee more and more.", "Then praise we God the Father, And praise we God the Son, And God the Holy Spirit, Eternal Three in One; Till all the ransomed number, Fall down before the throne, And honor, power, and glory, Ascribe to God alone."], "credits": {"author": "W.W.How (1864) H.B.Nelson (1864) (England)", "tune": "Sine Nomi1w Aurelia"}}, {"number": 107, "old_number": 152, "title": "From all Thy saints in warfare", "first_line": "From all Thy saints in warfare, For all Thy saints at rest, To Thee, O blessed J", "verses": ["From all Thy saints in warfare, For all Thy saints at rest, To Thee, O blessed Jesus, All praises be addressed. Thou, Lord, didst win the battle, That they might conquerors be; Their crowns of living glory, Are lit with rays from Thee.", "Apostles, prophets, martyrs, And all the sacred throng, Who wear the spotless raiment, Who raise the ceaseless song; For these, passed on before us, Savior, we Thee adore, And, walking in their footsteps, Would serve Thee more and more.", "Then praise we God the Father, And praise we God the Son, And God the Holy Spirit, Eternal Three in One; Till all the ransomed number, Fall down before the throne, And honor, power, and glory, Ascribe to God alone."], "credits": {"author": "H.B.Nelson (1864) (England)", "tune": "Aurelia"}}, {"number": 108, "old_number": "293", "title": "In heav'n above, in heav'n above", "first_line": "In heav'n above, in heav'n above, Where God our Father dwells; How boundless the", "verses": ["In heav'n above, in heav'n above, Where God our Father dwells; How boundless there the blessedness! No tongue its greatness tells; There face to face, and full, and free, Forever, evermore we see, Our God, the Lord of hosts!", "In heav'n above, in heav'n above, What glory deep and bright! The splendor of the noonday sun, Grows pale before its light. The heavenly light that ne'er goes down, Around whose radiance clouds ne'er frown, Is God, the Lord of hosts!", "In heav'n above, in heav'n above, Behold a countless throng! Angels in mystic radiance garbed, Lead the triumphal song; Angels and saints are one and we, Shall join the blessed company, And hail the Lord of hosts.", "In heav'n above, in heav'n above, No tears of pain are shed; Nothing can yonder fade or die; Life's fullness round is spread. And like an ocean, joy o'er flows, And with immortal mercy glows, Our God the Lord of Hosts.", "In heav'n above, in heav'n above, God hath a joy prepared, Which mortal ear had never heard Nor mortal vision shared, Which nev er pi rced to mortal breast, By mortal lips was ne'er expressed, O God the Lord of hosts!"], "credits": {"author": "L.L.Laurinus (1573-1655)", "translator": "William Macca", "tune": ""}}, {"number": 109, "old_number": "33", "title": "Dear Father, who hast made us all", "first_line": "Dear Father, who hast made us all, To Thee Thy children humbly pray: Look on thi", "verses": ["Dear Father, who hast made us all, To Thee Thy children humbly pray: Look on this babe who at Thy call, Now enters on life's narrow way.", "Dear Savior, for Thy love untold, We bring this little child to Thee, Receive it Shepherd, to Thy fold, And keep it Thine eternally.", "Dear Spirit, rest upon this child, As Thou didst brood upon the sea, And make it pure and undefiled, A holy temple unto Thee.", "O Triune God, we humbly pray, That all Thy blessings be conferred, Upon this child baptized today, By means of water and the word."], "credits": {"author": "AKnapp (1798-1864) (Germany)", "translator": "W.M.Czarnanske (1939)", "tune": "Herr Jesu Christ"}}, {"number": 110, "old_number": null, "title": "Jesus loves all the children", "first_line": "Jesus all the children's friend. And the little ones defender. Gracious Thou wil", "verses": ["Jesus all the children's friend. And the little ones defender. Gracious Thou will yet extend, Unto them Thy mercy tender. With a father's wisdom rear them. With a mother's comfort cheer them.", "In Thy fold, Thine own embrace, And the weak lambs not forgetting. Bath of life and table of grace, Earnestly before them setting.", "Our children are Thy gift, and a source for joy and blessing. Unto You we up them lift. Take them now, Thy love impressing. Baptized pure, in You believing, hold them close, thus never leaving.", "Let us travel with them so, that with them we heav'n inherit. Not with poor example go, thus they squander His great merit. That the angels that do lead them, would accuse us there before Him.", "His Word says a childlike heart, who reach out to God and brother, Will of heaven's joy take part. Only one way, there's no other. Grant us all such hearts to find Thee. Call upon Thee, love Thee, mind Thee."], "credits": {"author": "F.M.Franzen (Swed", "tune": "LiebsU!r"}}, {"number": 111, "old_number": null, "title": "Ye parents", "first_line": "Ye parents, hear what Jesus taught, When little ones to Him were brought, Forbid", "verses": ["Ye parents, hear what Jesus taught, When little ones to Him were brought, Forbid them not, but heed My plea, And suffer them to come to Me.", "Obey your Lord and let His truth, Be taught your children in their youth, That they in church and school may dwell, And learn their Savior's praise to tell.", "For if you love them as you ought, To Christ your children will be brought. If thus you place them in His care, You and your household well shall fare."], "credits": {"author": "L.Helmbold (1596) (Germany)", "translator": "W.M.Czamanske (1938)", "tune": "Herr Jesu Christ"}}, {"number": 112, "old_number": null, "title": "'Twas on that dark, that doleful night", "first_line": "Twas on that dark, that doleful night, When powers of earth and hell arose Again", "verses": ["Twas on that dark, that doleful night, When powers of earth and hell arose Against the Son of God's delight, And friends betrayed Him to His foes.", "Before the mournful scene began, He took the bread and blessed and brake. What love through all His actions ran! What wondrous words of grace He spake!", "\"This Is My body, broke for sin; Receive and eat the living food\"; Then took the cup en) Jesu and blessed the wine: \"'Tis the new covenant in My blood.\"", "\"Do this,\" He said, \"till time shall end, In memory ofyour dying Friend. Meet at My table and record, The love of your departed Lord.\"", "Jesus, Thy feast we celebrate; We show Thy death, we sing Thy name, Till Thou return and we shall eat, The marriage supper of the Lamb."], "credits": {"author": "I. Watts (1709) (Germany)", "tune": "St. Cross"}}, {"number": 113, "old_number": "39", "title": "I come to Thee with sin and grief", "first_line": "I come to Thee, O blessed Lord, Invited by Thy gracious Word, To this Thy feast,", "verses": ["I come to Thee, O blessed Lord, Invited by Thy gracious Word, To this Thy feast, to sup with Thee; Grant that a worthy guest I be.", "I come to Thee with sin and grief, For Thou alone canst give relief, Thy death for me dear Lord I plead: O Jesus help me in my need!", "Shouldst Thou a strict account demand, Who could, O Lord before Thee stand? Purge all my secret sins away: Be Thou, O Christ the sinner's Stay!", "O Jesus, Lamb of God, alone, Thou didst for all our sins atone; Though I have sinned and gone astray, Turn not, O Lord, Thy guest away.", "O Jesus, Lamb of God, alone, Thou didst for all our sins atone; Be merciful, I Thee implore, Be merciful forevermore."], "credits": {"author": "M.B.Landstad (1863) (Norway)", "translator": "C.Doving (1910)"}}, {"number": 114, "old_number": null, "title": "Jesus Christ is the foundation", "first_line": "Jesus Christ is the foundation, For our lasting soul's salvation. With His suffr", "verses": ["Jesus Christ is the foundation, For our lasting soul's salvation. With His suffring on the cross, He has redeemed each one of us.", "As His pledge of love undying, He, this precious food supplying. Gives His body with the bread, And with the wine the blood He shed.", "Here He gives us consolation, Given freely is salvation. This assurance we believe, When Lord's communion we receive.", "Pow'r of grace then He will show us, Only by our faith He knows us. He has died in our stead, It's published when we eat this bread.", "Thou shalt hold with faith unshaken, That this food is to be taken, By the sick who are distressed, By hearts that long for peace and rest.", "Whoso to this board repaireth, May take heed how he prepareth. For if he does not believe, Then death for life, he shall receive.", "Then take heed of your condition, Do not doubt when in contrition. For His gracious word is true, You firm will find it through and through.", "Suffered for my sin intently, \"Come to Me,\" He called so gently, \"Come ye burdened, in despair, Your debt of sin, on Me I bear.\"", "And His promise is admitting, To the humble hearts submitting. They who feel their walk is slow, Will to this table, worthy go.", ",,When to us, our sins revealing, Strength He gives, repentance, healing. In true faith, of Him we dine, And in our hearts is peace divine.", "Lord, to Thee our praise conveying, Feed on Thee, our souls sustaining. Our eternal thanks to Thee, Through Thy great mercy, we are free."], "credits": {"author": "J. Huss (c.1400), M. Luther (1521)", "translator": "C. Elliott (1822) (England)", "tune": "Jesus Christ Is The Foundation"}}, {"number": 115, "old_number": 40, "title": "Just as I am, without one plea", "first_line": "Just as I am, without one plea, But that Thy blood was shed for me, And that Tho", "verses": ["Just as I am, without one plea, But that Thy blood was shed for me, And that Thou bidst me come to Thee, O Lamb of God, I come, I come!", "Just as I am, and waiting not, To rid my soul of one dark blot, To Thee, Whose blood can cleanse each spot, O Lamb of God, I come, I come!", "Just as I am, though tossed about, With many a conflict, many a doubt, Fightings and fears within, without, O Lamb of God, I come, I come!", "Just as I am, poor, wretched, blind; Sight, riches, healing of the mind, Yea, all I need, in Thee I find, O Lamb of God, I come, I come!", "Just as I am, Thou wilt receive, Wilt welcome, pardon, cleanse, relieve, Because Thy promise I believe; O Lamb of God, I come, I come!", "Just as I am, Thy love unknown, Has broken every barrier down; Now to be Thine, yea, Thine alone, O Lamb of God, I come, I come!"], "credits": {"author": "C.Elli-Ot (1822) (England)", "tune": "Woodworth"}}, {"number": 116, "old_number": 41, "title": "Lord Jesus Christ, we humbly pray", "first_line": "Lord Jesus Christ, we humbly pray, That we may feed on Thee today; Beneath these", "verses": ["Lord Jesus Christ, we humbly pray, That we may feed on Thee today; Beneath these forms of bread and wine, Enrich us with Thy grace divine.", "The chastened peace of sin forgiv'n, The filial joy of heirs of heav'n, Grant as we share this wondrous food, Thy body broken and Thy blood.", "Our trembling hearts cleave to Thy Word; All Thou hast said Thou dost afford, All that Thou art we here receive, And all we are to Thee we give.", "One bread, one cup, one body, we, United by our life in Thee, Thy love proclaim till Thou shalt come, To bring Thy scattered loved ones home.", "Lord Jesus Christ, we humbly pray, To keep us steadfast to that day, That each may be Thy welcomed guest. When Thou shalt spread Thy heavenly feast."], "credits": {"author": "H.E.Jacobs (1910) (USA)", "tune": "Mein Seel,O Herr,Muss Loben Dich"}}, {"number": 117, "old_number": 42, "title": "O Bread of Life from heaven", "first_line": "O Bread of Life from heaven, To weary pilgrims given, O manna from above: The so", "verses": ["O Bread of Life from heaven, To weary pilgrims given, O manna from above: The souls that hunger feed Thou. The hearts that seek Thee lead Thou, With Thy most sweet and tender love.", "O Fount of grace redeeming, O River ever streaming, From Jesus' holy side: Come Thou, Thyself bestowing, On thirsting souls, and flowing, Till all their wants are satisfied.", "Jesus, this feast receiving, Thy word of truth believing, We Thee unseen adore: Grant, when our race is ended, That we, to heaven ascended, May see Thy glory ever more."], "credits": {"author": "M.Gesangbueh (1661) (Germany)", "translator": "P.Schaff (1869)", "tune": "Innsbruck"}}, {"number": 118, "old_number": 43, "title": "O Jesus Christ, Thou Bread of Life", "first_line": "O Jesus Christ, Thou Bread of Life, To sinners freely given, Who of their evil w", "verses": ["O Jesus Christ, Thou Bread of Life, To sinners freely given, Who of their evil ways repent, Cast out all earthly leaven, And graciously my heart prepare, The Holy Supper now to share, With Thee in blest communion.", "Deign to Thine altar, blessed Lord, By Thine own hand to lead me, There to renew Thy covenant, And with Thy gifts to feed me; O give me, in Thy flesh and blood, To taste and see that Thou art good; My soul refresh and quicken.", "Cleanse me of all iniquity, Renew my heart within me; My soul so fully occupy, That evil shall not win me. A13 Thou didst suffer on the cross, So teach Thy child to suffer loss, Through faith in Thee, my Savior.", "Come, Savior dear, with me abide. Thy love in me upwelling; O Holy Spirit, be my Guide, And make my heart Thy dwelling. In all my griefs my comfort be, Grant me that unity with Thee, Which life nor death can sever.", "Before Thy sacred table, Lord, My prayers grow faint and falter; Now make me worthy to partake, The bounties of Thine altar. If one with Thee Thou make me there. I know that also I shall share, With Thee the joy of heaven."], "credits": {"author": "J. Rist: J.O. Wallin: J. Suedberg (Germany)", "tune": "Du Lifuets Brod"}}, {"number": 119, "old_number": null, "title": "O Jesus all your chosen", "first_line": "O Jesus all your chosen, You want to gather round. And from your bitter sufferin", "verses": ["O Jesus all your chosen, You want to gather round. And from your bitter suffering, A blessed fruit is found. And unto death You love them so, That You the night of Your betrayal, Gave them a gift from You.", "You took your precious body, Your blood is what You gave, Of our eternal blessing, And of the soul You'd save. Eat and drink, My body and blood, So that in Me you stay forever, And I remain in you.", "The hands that chose to bless us, You took the bread, So near Your heart You kept it, And broke for all our sake.", "This heart is such a refuge, Unto the poor in need. He prayed for us when dying, And from our sins He freed. The heart that with such peace and rest, With blessedness from heaven, Comes to each faithful breast.", "Oh, come Thou loving kingdom, In Jesus name it stands. And lead us in Your kingdom, Into the Father's hands. A Father Who forgives them still, The children You redeemed here, And that belong to You.", "We want to be Your children, O Jesus, to our death. And do the Lord's good will here, In sickness and in health. Then You are near us all our days, Until our life is ending, As Your own promise says."], "credits": {"author": "F.M. Franzen (1812, 1817) (Sweden)", "tune": "O Jesu, An De Dina"}}, {"number": 120, "old_number": "45", "title": "O Living Bread from heaven", "first_line": "Living Bread from heaven, How hast Thou fed Thy guest! The gifts Thou now hast g", "verses": ["Living Bread from heaven, How hast Thou fed Thy guest! The gifts Thou now hast given, Have filled my heart with rest. Oh, wondrous food of blessing, Oh, cup that heals our woes! My heart this gift possessing, In thankful song o'erflows.", "My Lord, Thou here hast led me, Within Thy holiest place, And there Thyselfhast fed me, With treasures of Thy grace: And Thou hast freely given, What earth could never buy. The Bread of Life from heaven, Tha,t now I shall not die!", "Lord, grant me that, thus strengthened, With heavenly food, while here, How'er my course is lengthened, I serve with holy fear: And when Thou call'st my spirit, To leave this world below, I enter, through Thy merit, Where joys unmingled flow."], "credits": {"author": "J.Rist (1651) (Germany)", "translator": "C. Winkworth 1858", "tune": "Passion Chorale"}}, {"number": 121, "old_number": 46, "title": "Rock of Ages, cleft for me", "first_line": "Rock of Ages, cleft for me, Let me hide myself in Thee! Let the water and the bl", "verses": ["Rock of Ages, cleft for me, Let me hide myself in Thee! Let the water and the blood, From Thy riven side which flowed, Be of sin the perfect cure, Save me, Lord, and make me pure.", "Nothing in my hand I bring, Simply to Thy cross I cling; Naked, come to Thee for dress; Helpless, look to Thee for grace; Foul, I to the Fountain fly; Wash me, Savior, or I die!", "While I draw this fleeting breath, When my eyelids close in death, When I soar to worlds unknown, See Thee on Thy judgment throne, Rock of Ages, cleft for me, Let me hide myself in Thee."], "credits": {"author": "A.M.Toplady (1776) (En", "tune": "T"}}, {"number": 122, "old_number": "47", "title": "That this is so and ever shall remain", "first_line": "The death of Jesus Christ our Lord, We celebrate with one accord; It is our comf", "verses": ["The death of Jesus Christ our Lord, We celebrate with one accord; It is our comfort in distress, Our hearts' sweet joy and happiness.", "He blotted out with His own blood, The judgment that against us stood; He full atonement for us made, And allour debt He fully paid.", "That this is so and ever true, He gives an earnest ever new, In this His holy supper here, We taste His love so sweet, so near.", "For His true body, as He said, And His true blood for sinners shed, In this communion we receive, His sacred word we do believe.", "O Jesus Christ, our Brother dear, Unto Thy cross we now draw near; Thy sacred wounds indeed make whole, A wounded and afllicted soul.", "Help us sincerely to believe, That we Thy mercy do receive, And in Thy grace do find our rest, Amen. He who believes is blest."], "credits": {"author": "H.Spegel (1686) (", "translator": "O.Olsson (184", "tune": "Mein Seel,O Herr,Muss Lobe"}}, {"number": 123, "old_number": "25", "title": "Children of the heav'nly Father", "first_line": "Children of the heav'nly Father, Safely in His bosom gather; Nestling bird nor s", "verses": ["Children of the heav'nly Father, Safely in His bosom gather; Nestling bird nor star in heaven, Such a refuge e'er is given.", "God His own doth tend and nourish, In His holy courts they flourish; From all evil things He spares them, In His mighty arms He bears them.", "Neither life nor death shall ever, From the Lord His children sever; Unto them His grace He showeth, And their sorrows all He knoweth.", "Praise the Lord in joyful numbers, Your Protector never slumbers; At the will of your Defender, Every foeman must surrender.", "Though He giveth or He taketh, God His children ne'er forsaketh; His the loving purpose only, To preserve them pure and holy."], "credits": {"author": "K Sandell (855) (Sweden)", "translator": "E. W.Olson (1925)", "tune": "Tryggare Kan Ingen Vara"}}, {"number": 124, "old_number": "27", "title": "Jesus loves me! This I know", "first_line": "Jesus loves me! This I know, For the Bible tells me so, Little ones to Him belon", "verses": ["Jesus loves me! This I know, For the Bible tells me so, Little ones to Him belong, They are weak but He is strong. Yes, Jesus loves me, Yes, Jesus loves me, Yes, Jesus loves me, The Bible tells me so.", "Jesus loves me! He who died, Heaven's gate to open wide; He will wash away my sin, Let His little child come in. Yes, Jesus loves etc.", "Jesus loves me! loves me still, Tho' I'm very weak and ill; From His shining throne on high, Comes to watch me where I lie. Yes, Jesus loves etc.", "Jesus loves me! He will stay, Close beside m all the way; If I love Him when I die, He will take me home on high. Yes, Jesus loves etc."], "credits": {"author": "AB. Warner (1859)", "tune": "Jesus Lov"}}, {"number": 125, "old_number": "34", "title": "My eyes toward the heavens I lift", "first_line": "My eyes toward the heavens I'll raise, My hands I will fold together, To Jesus, ", "verses": ["My eyes toward the heavens I'll raise, My hands I will fold together, To Jesus, Friend of little children, From allmy heart to give praises.", "How joyous it is Thee to extol, And willingly, I shall do so, Thou shalt not cast me away, I know, But condescend to the lowly.", "O thanks to Thee for allthat Thou wilt, Thy grace by grace to me given. O thanks for all else that I cannot, Well fully utter out to You.", "A wee sprig in Thy garden I am, Also for heaven created, To Thy paternal guardianship, From birth already been favored. e", "Guard me my Father dear merciful, Onward by Thy Spirit's power, Then lead my way on the road to heaven, To that life es Me! there everlasting."], "credits": {"author": "J.L.Runeberg (1857) (Sweden)", "tune": "Ma Silm.iit Luon YlOs"}}, {"number": 126, "old_number": "37", "title": "Arm these Thy soldiers, mighty Lord", "first_line": "Arm these Thy soldiers, mighty Lord, With shield of faith and Spirit's sword. Fo", "verses": ["Arm these Thy soldiers, mighty Lord, With shield of faith and Spirit's sword. Forth to the battle may they go, And boldly fight against the foe.", "With banner of the Cross unfurled, They overcome the evil world, And so at last receive from Thee, The palm and crown of victory.", "Come, ever blessed Spirit, come, And make Thy servants' hearts Thy home, May each a living temple be, Hallowed forever, Lord, to Thee.", "Enrich that temple's holy shrine, With sev'nfold gifts of grace divine; With wisdom, light, and knowledge bless, With counsel, strength, fear, godliness.", "O Trinity in Unity, One only God and Persons Three, In Whom, through Whom, by Whom, we live, To Thee we praise and glory give.", "O grant us so to use Thy grace, That we may see Thy glorious face, And ever with the heavenly host, Praise Father, Son, and Holy Ghost!"], "credits": {"author": "C. Wordsworth (1862) (En", "tune": "Erhalt Uns"}}, {"number": 127, "old_number": 35, "title": "O bless Thy word to all the young", "first_line": "Our Lord and God, O bless this day, And hear us, we implore Thee: None of our de", "verses": ["Our Lord and God, O bless this day, And hear us, we implore Thee: None of our dear ones turn away, Who now are here before Thee. We come before Thy face And pray: Let Thy rich grace, Descend from heaven above, In all Thy mighty love, And keep us by Thy Spirit!", "O bless Thy word to all the young, Let each, Thy truth possessing, Bear witness true with heart and tongue, Their faith and ours confessing; From mother's arms Thy grace, With love did them embrace; Baptized into Thy name, As Thine Thou didst them claim, O Lord, as Thine now own them!", "When they their vows today renew, Accept them with Thy favor; And when they speak the great \"I do,\" May they forget it never! But they are weak and frail, When Satan's hosts assail; O arm them with Thy might, And grant that in the fight, They unto death be faithful."], "credits": {"author": "J.N.Brun (1786) (Norway)", "translator": "GA.T. Rygh & Carl Doving (1909)", "tune": "Ein Feste Burg"}}, {"number": 128, "old_number": null, "title": "Holy Father, here before Thee", "first_line": "Holy Father, here before Thee, See, Thy children humbly bow, Seeking for Thy mar", "verses": ["Holy Father, here before Thee, See, Thy children humbly bow, Seeking for Thy marriage blessing, That alone can seal the vow; May they know that mystic union, Once, of old, ordained by Thee. Still reserved for Thy redeemed ones, Who have been to Calvary.", "Savior, as at Cana's wedding, Thou didst water change to wine, Tum their bridal cup of gladness To a holy draft of Thine; May the sacred ties of marriage In their lives be eve seen, And their home, Thy love reflecting, Witness Thou art Head supreme.", "May they know the constant guidance, Of Thy Spirit thro' the word, And, by Thy rich grace sufficient, Both walk worthy of their Lord; And, thro'out life's earthly journey, Strong in faith and hope and love, Serve Thee with Thy love constraining, Till they reach that home above."], "credits": {"author": "J. G. J.Elkrton (1876) (England)", "tune": "Marriage P Aurelia"}}, {"number": 129, "old_number": 57, "title": "O Father, all creating", "first_line": "O Father, all creating, Whose wisdom, love, and pow'r, First bound two lives tog", "verses": ["O Father, all creating, Whose wisdom, love, and pow'r, First bound two lives together, In Eden's primal hour, Today to these Thy children, Thine earliest gifts renew, A home by Thee made happy, A love by Thee kept true.", "O Savior, Guest most bounteous Of old in Galilee, Vouchsafe today Thy presence, With these who call on Thee. Their store of earthly gladness, Transform to heav'nly wine, And teach them in the tasting, To know the gift is Thine.", "O Spirit of the Father, Breathe on them from above, So mighty in Thy pureness So tender in Thy love, That guarded by Thy presence, From sin and strife kept free, Their lives may own Thy guidance, Their hearts be ruled by Thee.", "Except Thou build it, Father, The house is built in vain; Except Thou Savior bless it, The joy will turn to pain, But naught can break the marriage, Of hearts in Thee made one, And love Thy spirit hallows, Is endless love begun."], "credits": {"author": "J.Ellerton (1876) (England)", "tune": "Aurelia"}}, {"number": 130, "old_number": null, "title": "O happy home where Thou art loved", "first_line": "O happy home where Thou art loved most dearly, Thou faithful Friend and Savior f", "verses": ["O happy home where Thou art loved most dearly, Thou faithful Friend and Savior full of grace, And where among the guest there never cometh, One Who can hold such high and honored place!", "O happy home where all, in heart united, In holy faith and blessed hope are one, Whom bitter death a little while divideth, Yet cannot end the union here begun!", "O happy home where two, in heart united, In holy faith are clinging unto Thee; Where both, to Thee, a joyful service bringing, Hear and obey Thy voice most willingly.", "Where both, to Thee in truth forever cleaving, In joy, in grief, make Thee their only stay, And fondly hope in Thee to be believing, Both in the good and in the evil day.", "O happy home where little ones are given, Early to Thee in humble faith and prayer, To Thee, their Friend, Who from the heights of heaven. Guides them and guards with more than mother's care!", "O happy home where each one serves Thee lowly, Whatever his appointed work may be, Till every common task seems great and holy, When it is done, O Lord, as unto Thee!", "O happy home where Thou art not forgot- ten, When joy is overflowing full and free! O happy home where every wounded spirit, Is brought, O great Physician, unto Thee.", "Until at last, when earthly toil is ended, All meet Thee in the blessed home above. From whence Thou earnest, where Thou hast ascended, Thine everlasting home of peace and love!"], "credits": {"author": "K.J.P.Spitta (1833) (Germany)", "translator": "S.B.Findlater (1858)", "tune": "One Radiant Morning"}}, {"number": 131, "old_number": "59", "title": "O perfect Love, all human thought transcending", "first_line": "O perfect Love, all human thought transcending, Lowly we kneel in prayer before ", "verses": ["O perfect Love, all human thought transcending, Lowly we kneel in prayer before Thy throne, That theirs may be the love which knows no ending, Whom Thou forevermore dost join in one.", "O perfect Life, be Thou their full assurance, Of tender charity and steadfast faith, Of patient hope, and quiet, brave endurance, With childlike trust that fears not pain nor death.", "Grant them the joy which brightens earthly sorrow; Grant them the peace which calms all earthly strife, And to life's day the glorious unknown morrow, That dawns upon eternal love and life."], "credits": {"author": "D.F.Gurney (1883) (England)", "translator": "S.B.Findlater (1858)", "tune": "0 Perfect Louc"}}, {"number": 132, "old_number": "237", "title": "Early let us seek Thy favor", "first_line": "Savior, like a Shepherd lead us, Much we need Thy tend'rest care, In Thy pleasan", "verses": ["Savior, like a Shepherd lead us, Much we need Thy tend'rest care, In Thy pleasant pastures feed us, For our use Thy folds prepare. Blessed Jesus, blessed Jesus, Thou hast bought us, Thine we are.", "We are Thine, do Thou befriend us, Be the Guardian of our way; Keep Thy flock, from sin defend us, Seek us when we go astray, Blessed Jesus, blessed Jesus, Hear, Oh hear us when we pray.", "Thou hast promised to receive us, Poor and sinful though we be; Thou hast mercy to relieve us, Grace to cleanse and power to free. Blessed Jesus, blessed Jesus, We will early turn to Thee.", "Early let us seek Thy favor, Early let us do Thy will; Blessed Lord and only Savior, With Thy love our bosoms fill. Blessed Jesus, blessed Jesus, Thou hast loved us, love us still."], "credits": {"author": "D.A.Thrupp (1836) (Engl", "tune": "Bradb"}}, {"number": 133, "old_number": "60", "title": "We have this great festive occasion", "first_line": "We have this great festive moment, A moment, quiet and rare. The holy vows are n", "verses": ["We have this great festive moment, A moment, quiet and rare. The holy vows are now spoken, Together we join in prayer, That Thou wilt guide this dear couple, Give light to brighten the way. That love forever be leading, To blessings, on their way.", "So beautiful are these moments, In this home church, their own. Together they shall now travel, The Lord, His blessings bestows. The words here spoken, remember; Real love is lasting and true. Forgiveth one the other, And serve, most lovingly, too.", "We have a tender feeling, For you, dear wedding pair. Your life, we hope, will be happy; Your days be bright and fair. And when from this wedding festal, You leave, as hus band and wife, May God, Almighty, grant to you, His blessings, all through life."], "credits": {"author": "Unknown (Finland)", "translator": "Translated from Finnish into English: Alpo Marttinen", "tune": "On Tullut Juhlasuuri"}}, {"number": 134, "old_number": null, "title": "By the holy hills surrounded", "first_line": "By the holy hills surrounded, On her firm base securely founded, Stands and) fas", "verses": ["By the holy hills surrounded, On her firm base securely founded, Stands and) fast the city of the Lord; None shall rend her ury walls asunder; On her men look with fear and wonder; And mark who here keeps watch and ward. He slumbers not, nor sleeps, Who His loved Israel keeps. Hallelujah! Happy the race, Who through God's grace, Shall have in her their dwelling place!", "Zion's gates Jehovah loveth, And with es- pecial grace approveth; He maketh fast her bolts and bars; Those who dwell in her He blesses, And comforts them in their distresses, Who cast on Him their griefs and cares. How wonderful the grace, With which He doth embrace, All His people! City of God, How sweet the abode, On which such blessings are bestowed!", "Taught in thee is a salvation, Unknown to every other nation; There great and holy things are heard; In the midst of Thee abiding, Enlightening, comforting, and guiding, Thou hast the Spirit and the Word; There breathing peace around, Is heard the joyful sound, Grace and mercy! How sweet that is, Which here speaks peace, There crowns with everlasting bliss."], "credits": {"author": "KJ.P.Spitta (1843) (Ge", "tune": "Wach"}}, {"number": 135, "old_number": "319", "title": "How fair the Church of Christ shall stand", "first_line": "How fair the Church of Christ shall stand, A beacon light in all the land, When ", "verses": ["How fair the Church of Christ shall stand, A beacon light in all the land, When love and faith all hearts inspire, And all unite in one desire, To be as brothers and agree, To live in peace and unity.", "Tis all in vain that you profess, The doctrine of the Church unless, You live according to your creed, And show your faith by word and deed. Observe the rule: To others do, As you would have them do to you. 1U5", "Resentment, hate, and cruel jest, Must not be harbored in the breast, Where love and charity should dwell; Then, think and speak of others well, Refrain from all that causes strife, And mars a truly Christian life.", "So let your tongue, yo
