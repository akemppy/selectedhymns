, "Let but my fainting heart be blest, With Thy sweet Spirit for its guest, My God, to Thee I leave the rest; \"Thy will be done.\"", "Renew my will from day to day, Blend d) it with Thine and take away, All that now jus makes it hard to say, \"Thy will be done.\"", "Then when on earth I breathe no more, The prayer oft mixed with tears before, I'll sing upon a happier shore, \"Thy will be done.\""], "credits": {"author": "C.Elliot (1834) (England)", "tune": "My God My Father While I Stroy"}}, {"number": 219, "old_number": "235", "title": "Our Father, Thou in heaven above", "first_line": "Our, Father, Thou in heaven above, Who biddest us to dwell in love, As brethren ", "verses": ["Our, Father, Thou in heaven above, Who biddest us to dwell in love, As brethren of one family, And cry for all we need to Thee; Teach us to mean the words we say, And from the inmost heart to pray.", "All hallowed be Thy name, O Lord! O let us firmly keep Thy word, And lead, according to Thy name, A holy life, untouched by blame; Let no false teachings do us hurt, All poor deluded souls convert.", "Thy kingdom come! Thine let it be, In time and in eternity! O let Thy Holy Spirit dwell, With us, to rule and guide us well; From Satan's mighty power and rage, Preserve Thy Church from age to age.", "Thy willbe done on earth, O Lord, As where in heaven Thou are adored! Patience in time of grief bestow, Obedience true in weal and woe; Our sinful flesh and blood control, That thwart Thy will within the soul.", "Give us this day our daily bread, Let us be duly clothed and fed; And keep Thou from our homes afar, Famine and pestilence and war, That we may live in godly peace, Unvexed by cares and avarice.", "Forgive our sins, that they no more. May grieve and haunt us as before, As we forgive their trespasses, Who unto us have done amiss; Thus let us dwell in charity, And serve each other willingly.", "Into temptation lead us not, And when the foe doth war and plot, Against our souls on every hand, Then armed with faith, O may we stand, Against him as a valiant host, Through comfort of the Holy Ghost!", "_Deliverance from all evil give, For yet in evil days we live; Redeem us from eternal death, And when we yield our dying breath, Console us, grant us calm release, And take our souls to Thee in peace.", "Amen! that is, So shall it be! Strengthen our faith and trust in Thee, That we may doubt not, but believe, That what we ask we shall receive; Thus in Thy name and at Thy word, We say Amen; now hear us, Lord!", "Trusting only in Thy merit, Would I seek Thy face: Heal my wounded, broken spirit, Save me by Thy grace. Savior, Savior, hear etc.", "Thou the spring of all my comfort More than life to me, Whom have I on earth 'beside Thee? Whom in heaven but Thee? Savior, Savior, hear etc."], "credits": {"author": "M.Luther (1539) (Germany) F.Crosby (1868) (USA)", "translator": "C.Winkworth (1863)", "tune": "Vater Unser Pass Me Not"}}, {"number": 220, "old_number": 236, "title": "Pass me not, O gentle Savior", "first_line": "Pass me not, O gentle Savior, Hear my humble cry, While on others Thou art calli", "verses": ["Pass me not, O gentle Savior, Hear my humble cry, While on others Thou art calling, Do not pass me by. Savior, Savior, hear my humble cry, While on others Thou art calling, Do not pass me by.", "Trusting only in Thy merit, Would I seek Thy face; Heal my wounded, broken spirit, Save me by Thy grace. Savior, Savior, hear my humble cry, While on others Thou art calling, Do not pass me by.", "Thou the Spring of all my comfort, More than life to me; Whom have I on earth beside Thee? Whom in heav'n but Thee? Savior, Savior, hear my humble cry, While on others Thou art calling, Do not pass me by."], "credits": {"author": "F.J.Crosby (1868) (USA)", "tune": "Pass Me Not"}}, {"number": 221, "old_number": null, "title": "Thou who didst come to bring peace", "first_line": "Thou Whose almighty word, Discord and darkness heard, And took their flight, Hea", "verses": ["Thou Whose almighty word, Discord and darkness heard, And took their flight, Hear us, we humbly pray, And where the Gospel day, Sheds not its glorious ray, Let there be light!", "Thou Who didst come to bring, On Thy redeeming wing, Healing and sight, Health to the sick in mind, Sight to the inly blind, Oh, now to all mankind, Let there be light!", "Spirit of Truth and Love, Lifegiving, holy Dove, Speed forth Thy flight; Move on the water's face, Bearing the lamp of grace, And in earth's darkest place, Let there be light!", "Holy and blessed Three, Glorious Trinity, Wisdom, Love, Might! Boundless as ocean's tide, Rolling in fullest pride, Thro' the earth, far and wide, Let there be light!"], "credits": {}}, {"number": 222, "old_number": null, "title": "Great God, we praise Thy mighty power", "first_line": "Great God, we praise Thy gracious care, Which does our daily bread prepare; O bl", "verses": ["Great God, we praise Thy gracious care, Which does our daily bread prepare; O bless the earthly food we take, And feed our souls for Jesus' sake.", "We thank Thee, Lord, for this our food, For life and health, and every good: May manna to our souls be given, The Bread of life, sent down from heaven."], "credits": {}}, {"number": 223, "old_number": "233", "title": "Oh blest the house, whate'er befall", "first_line": "Oh blest the house, whate'er befall. Where Jesus Christ is all in all, Yea if He", "verses": ["Oh blest the house, whate'er befall. Where Jesus Christ is all in all, Yea if He were not dwelling there, How poor and dark, and void it were!", "Oh blessed more than all the world, Is every home where Jesus' word, About the Father's boundless grace, Is heard by all, from day to day.", "Oh blest that house where faith you find, And all within have set their mind. To trust their God and serve Him still, And do in all His holy will!", "Oh blest the home where every heart, With fervent prayer, like glowing hearth, Rise up on high, a smell so sweet, Before His throne,, our God to meet.", "Oh blest the fruits, if we remain Within His calling every day. And each with iove his burden bear, That God has placed upon us here.", "Oh blest will God's own flock remain Where shepherds teach the gospel plain'. Of Jesus Christ, the children's Friend. An d grace of God forever reigns.", "Then here will I and mine today, A sol- emn cov'nant make and say: \"Though all the world forsake Thy word, I and my house will serve the Lord!\"", "Oh Father, let, before Thy face, Thy children stand and grant us grace, A shield of faith in daily wrest, And in the end, a blessed rest."], "credits": {"author": "C.C.Ludwig von Pfeil (1712-1784) (Sweden)", "tune": "Vli.lsignat Ar Det Hem Foroisst"}}, {"number": 224, "old_number": null, "title": "Good hope of everlasting life", "first_line": "Full soon will fall the winter rain, Soon fade the green hillside; With all the ", "verses": ["Full soon will fall the winter rain, Soon fade the green hillside; With all the glory, fare thee well, Thou radiant summertide.", "Full soon will wail the winter wind, Soon fail the flowers that blow; Let autumn blight the buds of earth, The flower of hope doth grow!", "What though the sunlight wane? ne'er wanes, The grace of Christ the Lord; Amid the gathering gloom shines on, God's everlasting word.", "Though leaf may wither, floweret fade, Though tiny grass blade pale; Our hearts can trust a surer truth, God's love shall never fail.", "I know where true joy has its home, When the earth's splendors cease; From Bethlehem calls a voice, \"To you, Is born the Prince of Peace.\"", "Upon my fairest trees of hope, Lies cold a robe of snow; But from the tree where Jesus died, The living waters fl.ow.", "Good hope of everlasting spring, His church the Saviour gave. Rejoice! Rejoice! The Life Himself, Is risen from the grave!"], "credits": {"author": "C.J. Boye (1833) J.A Eklund (1910) (Denmark)", "tune": "Fram Skr-Ukr Aret I Sin Gdng"}}, {"number": 225, "old_number": null, "title": "As summer dawns, the meadows stir", "first_line": "As summer dawns, the meadows stir, With gentle breezes blowing . The fields and ", "verses": ["As summer dawns, the meadows stir, With gentle breezes blowing . The fields and valleys come alive, All robed in green, and growing. The water's rush, The forest's hush, The blossoms now appearing, Say summertime is nearing.", "From woodland grove and tranquil nest, The thankful birds are praising. Their Lord, who sends the summer's peace, A blissful chorus raising. With cheerful voice, The birds rejoice, Their hymn to Heaven singing, The trees and meadows ringing.", "But Thou, oh Lord, who made our earth, So bright and fair in summer, Thy Word make foremost in my heart, Thy mercy's blessings number. All flowers fall, Time withers all, And life is swift in passing: Our God is everlasting.", "All flesh is grass and it shall fade, When autumn winds are blowing, The seedling blessed by Thee remains, Forever green and growing. Thy Spirit give, That I may live, To bloom in Heaven's garden, Though earthly fields shall harden.", "So pales the summer's golden gleam, All outer beauty faded; My Friend is mine and I am His, A timeless bond created. On Heaven's shore, I'll bloom once more, Eternal gardens adorning, God's endless summer morning."], "credits": {"author": "C.D.afWirsen (1889) (Sw", "tune": "En Vanlig Gronskas Rika D"}}, {"number": 226, "old_number": null, "title": "The summer days of beauty", "first_line": "The summer days of beauty, In blessedness are come. The flowers are rejoicing, T", "verses": ["The summer days of beauty, In blessedness are come. The flowers are rejoicing, To feel the gleaming sun. In grace arisen brightly, O'er fields of golden grain, So warm and all restoring, That nature lives again.", "The fragrance of the meadows, The planting in the vale, The whispers of the forest, Through branches green and hale, These wonders all remind us, How great the stores of wealth, Of Him Whose hand has made us, Who gives us life and health.", "Oh, hear the sparrows praise Him, Who taught them how to sing, Should not our tongues awaken, And thank creation's King? My soul, take up the anthem, With God's rejoicing throng, And praise the One Who gives you, The lovely summer song.", "O Jesus, noble Savior, Our source of warmth and light! Oh, shed Your rays of mercy, Our hearts with love ignite. When You have set them burning, With holy love for You, Then sin and death are buried, And everything is new.", "My lovely Rose of Sharon, Come beautify my soul, And pour the dew of Zion, The grace that makes us whole. The Spirit's light reeden) freshes, Uplifting as the dawn, and robes my rli.kt soul in beauty, As fair as Lebanon.", "Bestow abundant harvest. Oh, bless the planted seed, That meadows grow abundant, With wholesome grain we need, Oh, let us taste the sweetness, Of Your undying Word; Let blessedness and mercy, Be shining on us, Lord!", "Heaven/Salvation Hope For Eternity"], "credits": {"author": "l.Kolmodin (1694) (Sweden)", "tune": "Blornstertid"}}, {"number": 227, "old_number": null, "title": "With God is perfect gladness", "first_line": "With God is perfect gladness, Here troubles press, and fears; Here often bowed a", "verses": ["With God is perfect gladness, Here troubles press, and fears; Here often bowed and sighing, I eat the bread of tears. Here joy with sorrow mingle, For Christ's beloved bride; But 'tis not so up yonder, For there doth joy abide.", "This world is not my homeland, In tents I pass my days; Tow'rd yonder shore of glory, With yearnings eyes I gaze. While seeks the world its follies, I view yon citadel, Where, free from care and sorrow, Forever I shall dwell.", "I would not trade my fortune, With those whose hope lies here. Though tears may cloud my vision, The end I seek is clear. Should worldlyjoy sustain me, Its pleasure soon must pass. I'd rather sow in sorrow, And reap God's peace at last.", "My Jesus, hope's foundation, Shall stand before my eyes. The cross I've carried briefly A meager sacrifice. Soon nothing can detain me, No sorrow press me down, When Jesus is before me, My glory and my crown."], "credits": {"author": "J.N.Brun (Norway)", "tune": "Hos Gud Ar ldel Gliidje"}}, {"number": 228, "old_number": null, "title": "In hope my soul, redeemed from woe", "first_line": "In hope my soul, redeemed to bliss ending, o heaven's glorious height by fth asc", "verses": ["In hope my soul, redeemed to bliss ending, o heaven's glorious height by fth ascendmg, Is mindful ever, That Christ d sever, The bonds of death that I might live forever.", "In Him I have salvation's way discovered The heritage for me He hath recovered. Though death o'ertakes me, Christ ne'er forsakes me To everlasting life He surely wakes me. '", "More radiant there than sun e'er shone in brightness, My soul shall shine before God's throne in whiteness. My God, who knows me, In glory clothes me, As He declared when for His own He chose me.", "Oh, may I come where strife and grief are ended, Where all Thy saints shall meet with peace attended! Grant, Lord, Thy fa yor, :And mercy ever, And turn my sorrow mto JOY forever.", "Lord Jesus Christ, keep me prepared and waiting, Till from the vale of tears Thy bride Thou art taking, To dwell in heaven Where joy is given, And clouds of darkness are forever riven."], "credits": {"translator": "G.H.Trabert", "tune": "I Hoppet Sig Min Fralsta Sja.l Forn.Ojer"}}, {"number": 229, "old_number": "287", "title": "Beyond the sunset, O blissful morning", "first_line": "Beyond the sunset, O blissful morning, When with our Savior, Heaven is begun, Ea", "verses": ["Beyond the sunset, O blissful morning, When with our Savior, Heaven is begun, Earth's toiling ended, O glorious dawning, Beyond the sunset, When day is done.", "Beyond the sunset, No clouds shall gather, No storms will threaten, No tears annoy. O day ofgladness, O day unending, Beyond the sunset, Eternal joy.", "Beyond the sunset, A hand will guide me, To God the Father, Whom I adore. His glorious presence, His words of welcome, Will be my portion, On that fair shore.", "Beyond the sunset, O glad reunion, With our dear loved ones, Who've gone before. In that fair homeland, We'll know no parting, Beyond the sunset, Forevermore."], "credits": {"author": "V.P.Brock (1887-1978)"}}, {"number": 230, "old_number": "289", "title": "Brief life is here our portion", "first_line": "Brief life is here our portion; Brief sorrow, short lived care; The life that kn", "verses": ["Brief life is here our portion; Brief sorrow, short lived care; The life that knows no ending; The tearless life is there. O happy retribution! Short toil, eternal rest; For mortals and for sinners, A mansion with the blest!", "And now we fight the battle, But then shall wear the crown, Of full and everlasting, And passionless renown; And now we watch and ; struggle, And now we live in hope And Zion in her anguish, With Babylon mu t cope.", "But He Whom now we trust in, Shall then be seen and known; And they that know and see Him, Shall have Him for their own. And there is David's fountain, And life in fullest glow; And there the light is golden, And milk and honey flow.", "The morning shall awaken, And shadows Kin shall decay, And each truehearted servant Shall s e as doth the day; Yes! God, my and Portion, In fullness of His grace, We then shall see forever, And worship face to face. ;", "O sweet and blessed country, The home of God's elect! O sweet and blessed country, That eager hearts expect! Jesus in mercy bring us, To that dear land of rest; Who art with God the Father, And Spirit, ever blest."], "credits": {"translator": "J.M.Neale (1853)", "author": "K. Sandell (Sweden", "tune": "Home Sweet Home"}}, {"number": 231, "old_number": null, "title": "I am a guest and stranger", "first_line": "I am a guest and stranger, Like those who've gone before. My home is not on eart", "verses": ["I am a guest and stranger, Like those who've gone before. My home is not on earth no; It's on the other shore. And there my heav'nly Father, Does dwell in glory bright. I also yearn to be in, My Father's house of light. Home, home, My dear sweet home. There is no place so precious, As in my heav'nly home.", "In heaven is my Savior; Lord Jesus, it was Him, Who took my place in death, and, He carried all my sin. Were flowers strewn before me, Each step upon this land. I still would long for Jesus, My God's dear precious Lamb. Home, home, My etc.", "How beautiful the flowers, So pure and fresh their smell. And how the birds are singing, On summer eve so well. How precious are the friendships, So dear and lovely here. My heart still yearns for Heaven, My sweet home over there. Home, home, My etc.", "For here upon this earth, all, Is tainted so by sin. And gives to all this beauty, A figure strange and dim. Though sin cannot condemn me, For self it's been condemned; Down here it causes torment, Yet there all pain will end. Home, home, My etc.", "And soon, the word so teaches, I also will be there. Lord Jesus comes to meet me, To take me in his care. In joy I will behold what, I here believed in. And to my Jesus' honor, The new song I will sing. Home, home, My etc."], "credits": {"author": "K. Sandell (Sweden)", "tune": "Home Sweet Home"}}, {"number": 232, "old_number": 147, "title": "I gave My life for thee", "first_line": "I gave My life for thee, My precious blood I shed, That thou might ransomed be, ", "verses": ["I gave My life for thee, My precious blood I shed, That thou might ransomed be, And quickened from the dead; I gave, I gave My life for thee, What hast thou given for Me?", "My Father's house of light, My glory circled throne, I left for earthly night, And wanderings sad and lone; I left, I left it all for thee, Hast thou left aught for Me?", "I suffered much for thee, More than the tongue can tell, Of bitterest agony, To rescue thee from hell; I've borne, I've borne it all for thee, What hast thou borne for Me?", "And I have brought to thee, Down from My home above, Salvation full and free, My pardon and my love; I bring, I bring rich gifts to thee, What hast thou brought to Me?"], "credits": {"author": "F.R.Havergal (1858) (England)", "tune": "Kenosis"}}, {"number": 233, "old_number": "221", "title": "I saw a river of living water", "first_line": "I saw a river of living water, Proceeding out from the throne of God; On either ", "verses": ["I saw a river of living water, Proceeding out from the throne of God; On either side was the Tree eternal, Who purchased me with His own true blood.", "Behold, He cometh; He who is faithful, And His reward shall He bring one day; There is no night there; no need for candle; And God shall wipe all my tears away. )", "\"Behold, I make all things new,\" He told me; \"I am the First and the Last for aye; There shall be no death, no pain, no crying, For all the old things have passed away.\"", "O come, Lord Jesus, my pray'r be answered; And take me home on Thy arms of love; Thy hand will guide me ifI'm but faithful, O praise my Savior in realms above."], "credits": {"author": "M.Michelsen (US"}}, {"number": 234, "old_number": "292", "title": "The sound of joy, a ring of gladness", "first_line": "I think I hear those wedding bells, Upon that distant shore. A strain so clear, ", "verses": ["I think I hear those wedding bells, Upon that distant shore. A strain so clear, the echos swell. I hear it more and more.", "I hear a voice, God's holy word, It pleads and calls to me. His word so sharp - a two edged sword, Strikes intermittently.", "The sound ofjoy, a ring of peace, It answers in my heart. It strikes the pain and gives release, Where sin and doubts will smart.", "I think I see the distant shore, As through a fog and haze. Though clearer than it was before, In fears in former days.", "A shore so calm, no winds that blow. To raise my doubts and fears. No waves that toss me to and fro, And bring me burning tears.", "I think I see those roses red, And flowers blooming rare. Their color and their hues He said, Will show no blemish there.", "I'm sure I feel a warmer glow, Of grace within my heart. The love of Christ, He does bestow, And mercy will impart.", "All pain and tears will pass away, The trumpet then will sound. O joyous heart to see that day, Where peace and joy abound."], "credits": {"author": "R.Stewart (USA)"}}, {"number": 235, "old_number": null, "title": "Their furious wrath did crucify the Lord", "first_line": "If God had not been on our side, And had not come to aid us, The foes with all t", "verses": ["If God had not been on our side, And had not come to aid us, The foes with all their pow'r and pride, Would surely have dismayed us; For we His flock would have to fear, The threat of men both far and near, Who rise in might against us.", "Their furious wrath did God permit, Would surely have consumed us, And as a deep and yawning pit, With life and limb entombed us. Like men o'er whom dark waters roll, Their wrath would have engulfed our soul, And like a flood o'erwhelmed us.", "Blest be the Lord, Who foiled their threat, That they could not devour us; Our souls, like birds escaped their net, They could not overpow'r us. The snare is broken - we are free! Our help is ever, Lord, in Thee, Who madest earth and heaven."], "credits": {"author": "M.Luther (1524) (Germany)", "translator": "Composite translation", "tune": "Luther11Hymn"}}, {"number": 236, "old_number": "295", "title": "So honor, praise, and glory", "first_line": "In heaven is my home indeed, For on my homeward way I speed, Oh there I yearn wi", "verses": ["In heaven is my home indeed, For on my homeward way I speed, Oh there I yearn with all my heart, And there I sigh to soon depart.", "In heaven is my home indeed, A foreign soil this is to me, Down here a wanderer I am, When shall I reach my native land?", "In heaven is my home indeed, This strife will there forever cease, There griefwill change to happiness, And weeping into joyfulness.", "In heaven is my home indeed, My crown is waiting there for me, Which through His merit He has won, Beloved Bridegroom, Blessed Son.", "In heaven is my home indeed, My pathway here through death doth lead, But when my road is at the end, My troubles too are ended then.", "So honor, praise, and thanks to Him, Maker of all, we raise our hymn. And praises to our Savior sound, Who victory over death has found.", "Thus if my Bridegroom, Jesus dear, In faithfulness I follow here, It is my hope and firm belief, That heaven is my home indeed."], "credits": {"author": "I. W. Vikman 1912 (", "tune": "Taivaassa On"}}, {"number": 237, "old_number": "296", "title": "In heaven where eternal God doth dwell", "first_line": "In heaven where eternal God, His mansion hath prepared; All God's elect who here", "verses": ["In heaven where eternal God, His mansion hath prepared; All God's elect who here have trod, May live forever there. Their tribulations then have ceased, From sin and trouble are released, In blessedness they dwell.", "They ever had to battle here, In warfare all the time; Their striving, dauntless and sincere, 'Gainst enemy's design. When they have reached the peaceful shore, They thank the Lamb forevermore, Amid God's own elect.", "Our mortal tongue cannot relate, Nor longing eyes yet see, The reason cannot comprehend, Such joy as there will be, For the glory God to none has shown, That He is keeping for His own, His home of blissful rest."], "credits": {"author": "0. Pesonius (1886) (Finland)", "tune": "Taivaassa, Johan Jumala (297)."}}, {"number": 238, "old_number": null, "title": "O what a mighty, rushing sound", "first_line": "O happy day when we shall stand, Amid the heavenly throng, And sing with hosts f", "verses": ["O happy day when we shall stand, Amid the heavenly throng, And sing with hosts from every land, The new celestial song. The new celestial song.", "O blessed day! From far and near, The servants of the Lord, Shall meet the ransomed millions there, Who heard God's Kotini saving word. Who heard God's saving word.", "O what a mighty, rushing flood, Of love without surcease, Shall roll about the throne of God, In joy and endless peace. In joy and endless peace.", "God, may Thy bounteous grace inspire Our hearts so that we may, All join the heavenly white-robed choir, Upon that glorious day. Upon that glorious day."], "credits": {"translator": "G.T.Rygh 1860-1942", "tune": "Lobt Gott !hr Christen"}}, {"number": 239, "old_number": null, "title": "On my heart imprint Thine image", "first_line": "On my heart imprint Thine image, Blessed Jesus, King of grace, That life's riche", "verses": ["On my heart imprint Thine image, Blessed Jesus, King of grace, That life's riches cares and pleasures, Have no power Thee to effa e; This the superscription be: Jesus crucified for me, Is my life, my hopes found tion ' And my glory and salvation."], "credits": {"tune": "Freu Dich Sehr (Genevan 42)"}}, {"number": 240, "old_number": null, "title": "In Jesus' heart there burns a love", "first_line": "Strait is the gate to heaven above, And narrow is the way; Yet there is room in ", "verses": ["Strait is the gate to heaven above, And narrow is the way; Yet there is room in God's great love, For thee, for thee alway. For thee, for thee alway.", "In Paradise there still is room, There still is room for thee; For thee the Savior hath a home, Where heavenly mansions be. Where heavenly mansions be.", "Though thousand times ten thous ds stand White robed in glory there, There is a place t God's right hand, For thee in heaven so fair. For thee in heaven so fair.", "In Jesus' heart there still is room, In heaven is room also, The gospel message bids thee come, Praise God who loves thee, too. Praise God who loves thee, too.", "Now God be praised, Who even me, A glorious diadem, Will grant when I His glory see, In His Jerusalem. In His Jerusalem."], "credits": {"author": "K Sandell (1832-1903) (Swelkn)", "translator": "A Nelson (1863-1949)", "tune": "Lobt Gott !hr Christen"}}, {"number": 241, "old_number": null, "title": "Swiftly, so swiftly doth time fly away", "first_line": "Swiftly, so swiftly doth time pass. Just as the sands in an hourglass. Soon, per", "verses": ["Swiftly, so swiftly doth time pass. Just as the sands in an hourglass. Soon, perhaps soon, I shall there arrive, At the wide river of death.", "Then finds my weary heart rest there, Rest at the breast of my Savior, From every need and all pain released, In that sweet homeland of peace.", "In heaven's regions, so peaceful, No tears are seen all is blissful. In that fair land from bondage I'm free, Death there no longer stalks me.", "Welcome, Oh time of life's evening, When mortal eyes close forever; At peace and rest I ever shall be, In that fair land of the free.", "Welcome, thou, dawn of that morning, When unto Jesus I 'waken; Life on this earth I shall miss no more, Or yearn to be here again.", "Whisper so softly, ye linden, Sigh wind, Oh sigh in its branches; Over the grave where I rest in peace, Hidden from all earthly strife.", "In Thy dear arms, Jesus, keep me, In Thy blest wounds let my rest be. Thou, Lord, who gavest Thy life for Thy sheep, Purchased me with Thine own blood.", "Jesus, Thy dove now is yearning, To be released from bonds earthly; Soon this free purchased spirit can fly, To the blest home high above.", "When for Thy own, Lord, Thou cometh, Each clad in snowy white garments; There 'mongst the hosts, cleansed in Jesus' blood, Grant that I also may be."], "credits": {"author": "J.Appelberg 1893 (Sw", "translator": "S.K", "tune": "TUien Sa Hastigt Forsu"}}, {"number": 242, "old_number": null, "title": "Think of the time, with the Lord", "first_line": "Think of the time, when all the haze of this dim world, Is by the sun of heaven ", "verses": ["Think of the time, when all the haze of this dim world, Is by the sun of heaven swept away. The glorious day of paradise is dawning, And heavenly sunlight shines upon my way.", "Think of the time, when all of this life's mysteries, Which while on earth have always been concealed, Are understood; all questions shall be answered, For all will be by God Himself revealed.", "Think of the time, when all our sorrows are no more, With every tear by God's heart wiped away. All hurts are healed, all longings reach their harbor, All crying stilled while in His arms we stay.", "Think of the time, with my eyes made foreveden) er clear, I'll enter heaven, where for me there's Hine inner a place, And I shall see Him on Whom I've believed, Eternally I'llpraise Him face to face.", "Think of the time, when I shall be forever pure, No sinful thoughts, no faults in word or deed. When every snare eternally is broken, From all temptations I'm forever freed.", "Think ofthe time, when each cord which now binds us, With all the Christians in this mortal land, Becomes in paradise all clean and shining, And tied together by our Father's hand.", "Think of the time, when all of my beloved friends Who here on earth have helped me ' on my way, Are met once more in heaven's golden mansions, To praise our Lord, in God's eternal day.", "Oh heavenly thought, sing purely in my wretched heart, Whene're this heavy road seems hard and long. Strengthen my soul and soothe all of my heartaches, And bring me home, oh blessed homeland song. Anthor: W.A.Wexels (1841) (Nor"], "credits": {"translator": "C.0.Rose", "tune": "Tank, Nar En Gdng Det Tiicken Har Forsvu"}}, {"number": 243, "old_number": "151", "title": "Who trusts in God a strong abode", "first_line": "Who trusts in God a strong abode In heaven and earth possesses; Who ' looks in l", "verses": ["Who trusts in God a strong abode In heaven and earth possesses; Who ' looks in love to Christ above, No fear his heart oppresses; In Thee alone, dear Lord, we own, Sweet hope and consolation; Our shield from foes, our balm for woes, Our great and sure salvation.", "Though Satan's wrath beset our path, And worldly scorn assail us, While Thou art near we will not fear; Thy strength shall never fail us. Thy rod and staff shall keep us safe, And guide our steps forever; Nor shades of death, nor hell beneath, Our souls from Thee shall sever.", "In all the strife of mortal life, Our feet shall stand securely; Temptation's hour shall lose its power, For Thou shalt guard us surely. O God, renew, with heavenly dew, Our body, soul, and spirit, Until we stand at Thy right hand, Through Jesus' saving merit.", "Death and Funeral Times of Death way) nius nnit I"], "credits": {"translator": "B.H.&nnedy 1863", "tune": "0 Gud! Ditt Rike lngen Ser"}}, {"number": 244, "old_number": null, "title": "God's Son to our graves once descended", "first_line": "I know of a sleep in Jesus' name, A rest from all toil and sorrow; Earth folds i", "verses": ["I know of a sleep in Jesus' name, A rest from all toil and sorrow; Earth folds in her arms my weary frame, And shelters it till the morrow; My soul is at home with God in heaven, Her sorrows are past and over.", "I know of a peaceful eventide; And when I am faint and weary, At times with the journey sorely tried, Through hours that are long and dreary, Then often I yearn to lay me down, And sink into blissful slumber.", "I know of a morning bright and fair, When tidings of joy shall wake us, When songs from on high shall fill the air, And God to His glory take us, When Jesus shall bid us rise from sleep, How joyous that hour of waking!", "Oh, that is a morning dear to me, And oft, o'er the mountains streaming, In spirit its heavenly light I see, As golden the peaks are beaming. Then sing I for joy like birds at dawn, That carol in lofty lindens.", "God's Son to our graves then takes His way, His voice hear all tribes and nations; The portals are rent that guard our clay, And moved are the sea's foundations. He calls out aloud: \"Ye dead, come forth!\" In glory we rise to meet Him.", "O Jesus, draw near my dying bed, And take me into Thy keeping, And say when my spirit hence is fled, \"This child is not dead, but sleeping.\" And leave me not, Savior, till I rise, To praise Thee in life eternal."], "credits": {"author": "M.B.Landstad (1861) (Germany)", "translator": "Composite translation", "tune": "Den Signede Dag"}}, {"number": 245, "old_number": "62", "title": "I fall asleep in Jesus' arms", "first_line": "I fall asleep in Jesus' wounds, There pardon for my sin abounds; Yea, Jesus' blo", "verses": ["I fall asleep in Jesus' wounds, There pardon for my sin abounds; Yea, Jesus' blood and righteousness, My jewels are, my glorious dress, In which before my God I'll stand, When I shall reach the heavenly land.", "So now in peace I yield my breath, I am God's child in life and death. 'Tis well, O death, thou takest me, To dwell with Christ eternally; Through Jesus Christ I am made whole; Receive, O Lord, my ransomed soul!"], "credits": {"author": "P.Eber (1538) (Germany)", "translator": "C. Winkworth (1858)", "tune": "Yater Unser"}}, {"number": 246, "old_number": "64", "title": "My God, I know that I must die", "first_line": "My God, I know that I must die, M mortal life is passing hence; On earth i neith", "verses": ["My God, I know that I must die, M mortal life is passing hence; On earth i neither hope nor try, To find a lasting residence. Then teach me by Thy heavenly grace ' With joy and peace my death to face.", "My God, I know not when I die; What is the moment or the hour; How soon the clay may broken lie, How quickly pass away the flowers; en may Thy child prepared be, Through time to meet eternity.", "My God, I know not how I die; For death has many ways to come, In dark mysterious agony, Or gently as a sleep to some. Just as Thou wilt, if but it be, To bring me blessed Lord, to Thee!", "My God, I know not where I die, Where is my grave, beneath what strand; Yet from its gloom I do rely, To be delivered by Thy hand, Content, I take what spot is mine, Since all the earth, my Lord is Thine.", "My gracious Lord, when I must die Oh ' ' bear my happy soul above, With Christ, my Lord, eternally, To share Thy glory and Thy love: Then comes it right and well to me ' When, where, and how my death shall be."], "credits": {"author": "B.Schmolck (1672-1737) (Germany)", "translator": "Jane Borthwick (1854)", "tune": "Vater Unser"}}, {"number": 247, "old_number": 65, "title": "My life is hid in Jesus", "first_line": "My life is hid in Jesus, And death is gain to me; Then, whensoe'er He pleases, I", "verses": ["My life is hid in Jesus, And death is gain to me; Then, whensoe'er He pleases, I meet it willingly.", "For Christ, my Lord and brother, I leave this world so dim, And gladly seek that other, Where I shall be with Him.", "My woes are nearly over, Though long and dark the road; My sin His merits cover, And I have peace with God.", "Lord, when my powers are failing, My breath comes heavily, And words to me are failing, O hear my sighs to Thee!", "When mind and thought, O Savior, Are flickering, like a light, That to and fro doth waver, Ere 'tis extinguished quite;", "In that last hour, O grant me, To slumber soft and still, No doubts to vex or haunt me, Safe anchored on Thy will;", "And so to Thee still cleaving, Through all death's agony, To fall asleep believing, And wake in heaven with Thee.", "Amen! Thou Christ, my Savior, Wilt grant this unto me: Thy Spirit lead me ever, That I fare happily."], "credits": {"author": "Anonymous (1609) (Germany)", "translator": "Catherine Winkworth (1863)", "tune": "A Great And Mighty Wonder"}}, {"number": 248, "old_number": 66, "title": "Now the cares of day are ended", "first_line": "Now the cares of day are emktl And life's evening brings me rest; As the I allow", "verses": ["Now the cares of day are ended, And life's evening brings me rest; As the Lord allows to enter, Into peace my soul distressed.", "He to sleep doth grant the pilgrim, Worn and weary from his fray, Gladly, then, I'll wing my way in, To the silence of the grave.", "Hard is not the earthly hollow, Where I'm lowered to repose; And the grave is not confining, Into which I'll be enclosed.", "Though on earth the storms are raging, They cannot disturb my sleep, Sweet to me the peace prevailing, In my chamber hewn so deep.", "When the day of life eternal, Shall one day begin to dawn, Jesus, Lord of all creation, Will give my unfading crown.", "From the tomb His voice will call me, Summon me at last to rise, Into life will resurrect me, Carry me to paradise."], "credits": {"author": "M.W. Vikstrom (1836) (Finland)", "translator": "Elma Anderson", "tune": "Now the cares ofday are ended"}}, {"number": 249, "old_number": "68", "title": "Praise God this hour of parting", "first_line": "Praise God this hour of sorrow, Shall bring a brighter morrow; I go to paradise,", "verses": ["Praise God this hour of sorrow, Shall bring a brighter morrow; I go to paradise, My mother dear and father, When round my grave you gather, Lay me to rest with songs of praise.", "What better can befall me, Than that the Lord doth call me, From hence where sin holds sway? Who is on earth a stranger, Must ever be in danger, Till God hath closed life's fleeting day.", "God takes His own from anguish, And pain, in which they languish, Within this vale of tears, And gives them to inherit. The crown that Christ did merit: The joy of heaven's eternal years.", "Farewell, I now must leave you; The grief this day doth give you, Soon others, too, shall bear. Be ye to God commended; In heaven all woe is ended, And we shall meet in glory there."], "credits": {"author": "J.Heermann (1585-1657)", "translator": "0. H. Smeby 1851-1929", "tune": "Innsbruck"}}, {"number": 250, "old_number": null, "title": "Safe in the arms of Jesus", "first_line": "Safe in the arms of Jesus, Safe on His gentle breast. There by His love o'ershad", "verses": ["Safe in the arms of Jesus, Safe on His gentle breast. There by His love o'ershaded, Sweetly my soul shall rest. Hark 'tis the voice of angels, Borne in a song to me, Over the fields of glory, Over the jasper sea. Safe in the arms of Jesus, Safe on His gentle breast, There by His love o'ershaded, Sweetly my soul shall rest.", "Safe in the arms of Jesus, Safe from corroding care, Safe from the world's temptations, Sin cannot harm me there. Free from the blight of sorrow, Free from my doubts and fears; Only a few more trials, Only a few _ the arms etc. more tears. Safe m", "Jesus my heart's dear Refuge' Jesus has died for me, Firm on the Rock or Ages, Ever Y trust s al be. Here let me wait with patience, Wait till the night is o'er- Wait till I see t e morning, Break on the glden shore. Safe m the arms etc."], "credits": {"author": "F.Crosby (1868) (USA)", "tune": "Safe In The Arms OfJesus"}}, {"number": 251, "old_number": "70", "title": "Sleep on, beloved, sleep and take thy rest", "first_line": "Sleep on, beloved, sleep and tak t y rest; Lay down thy head upon thy SaVIor s b", "verses": ["Sleep on, beloved, sleep and tak t y rest; Lay down thy head upon thy SaVIor s breast; We love thee well, but Jesus loves thee best - Good-night! Good-night', ) Good-night!", "Calm is thy slumber as an infant's sleep; But thou shalt wake no more to toil and weep: Thine is a perfect rest secure and deep - Good-night! Good-night! Go od-night!", "Until . the shadows from this earth are cast, Until He gathers in His sheaves at last ' Until the twilight gloom be over past - Goodnight! Good-night! Good-night!", "Until the Easter glory lights the skies, Until the dead in Jesus shall arise, And He shall come, but not in lowly guise - Goodnight! Good-night! Good-night!", "Until made beautiful by love divine, Thou, in the likeness of thy Lord shalt shine, And He shall bring the golden crown of thine - Good-night! Good-night! Good-night!", "Only \"Good-night,\" beloved - not \"farewell!\". A little while and all His saints shall dwell, In hallowed union indivisible - Goodnight! Good-night! Good-night!", "Until we meet again before His throne, Clothed in the spotless robe He gives His own Until we know even as we are known - d Goo -night! Good-night! Good-night!"], "credits": {"author": "S.Doudney (1871) (U", "tune": "Sleep On, Bel"}}, {"number": 252, "old_number": "21", "title": "The moment of our parting", "first_line": "The moment of our parting, Brings sorrow to our hearts; To earthly duties callin", "verses": ["The moment of our parting, Brings sorrow to our hearts; To earthly duties calling, Each one of us departs.", "Farewell, dear friends, I leave thee, In Jesus' tender care; He'll shelter thee and keep thee, Within His love so fair.", "We cannot stay together, Upon this land below; Beyond the grave, forever, We'll dwell in joy, we know.", "I pray that God will guide thee, Dear friend, along the way, That we shall meet in glory, At journey's end, one day.", "Oh gather us, dear Jesus, Within Thy wounds embrace; Oh, sanctify and shield us, With Thy great love and grace.", "Bestow Thy gifts upon us, We pray, dear Lord, to Thee, That waves will not engulf us, On life's uncertain sea.", "God, lead us in Thy mercy, That we Thy face may see, To dwell with Thee in glory, In all eternity.", "And in this vale of sorrow, Each day I long to see, That bright and happy morrow, To sing eternally."], "credits": {"author": "V.Hoppman-Ahrenainen (1869) (Finland)"}}, {"number": 253, "old_number": "23", "title": "To our bountiful Father above", "first_line": "There's a land that is fairer than day, And by faith we can see it afar; For the", "verses": ["There's a land that is fairer than day, And by faith we can see it afar; For the Father waits over the way, To prepare us a dwelling place there. In the sweet by and by, We shall meet on that beautiful shore. :,:", "We shall sing on that beautiful shore, The melodious songs of the blest, And our spirits shall sorrow no more, Not a sigh for the blessing of rest. In the sweet by etc.", "To our bountiful Father above, We will offer our tribute of praise, For the glorious gift of His love, And the blessings that hallow our days. In the sweet by etc."], "credits": {"author": "S.F. Bennett (1868) (USA)", "tune": "There's A Land That Is Fairer Than Day"}}, {"number": 254, "old_number": null, "title": "All the way my Savior leads me", "first_line": "An the way my Savior leads me; What have I to ask beside? Can I doubt His tender", "verses": ["An the way my Savior leads me; What have I to ask beside? Can I doubt His tender mercy, Who through life has been my guide? Heav'nly peace, divinest comfort, Here by faith in Him to dwell! For I know whate'er befall me, Jesus doeth all things well.", "All the way my Savior leads me; Cheers each winding path I tread; Gives me grace for every trial, Feeds me with the living bread; Though my weary steps may falter, And my soul athirst may be, Gushing from the Rock before me, Lo, a spring ofjoy I see.", "All the way my Savior leads me; Oh, the fullness of His love! Perfect rest to me is promised, In my Father's house above; When my spirit, clothed immortal, Wings its flight to realms of day, This my song through endless ages: Jesus led me all the way."], "credits": {"author": "F.Crosby (1875) (USA)", "tune": "All The Way My Savior Leads Me"}}, {"number": 255, "old_number": "347", "title": "Be not dismayed whate'er betide", "first_line": "Be not dismayed whate'er betide, God will take care of you; Beneath His wings of", "verses": ["Be not dismayed whate'er betide, God will take care of you; Beneath His wings oflove abide, God will take care of you. God will take care of you, Through every day O'er all the way; He willtake care of you God ' will take care of you.", "Through days of toil when heart doth fail God will take care of you; When danger fierce your path assail, God will take care of you. God will take care etc.", "All you may need He will provide, God will take care of you; Nothing you ask will be denied, God will take care of you. God will take care etc.", "No matter what may be the test, God will take care of yo.u; Lean, weary one, upon His breast, God will take care of you. God will take care etc."], "credits": {"author": "C.D. Martin (1904) (USA)", "tune": "God Cares"}}, {"number": 256, "old_number": null, "title": "Be still my soul; the Lord is on thy side", "first_line": "Be still my soul; the Lord is on th side; Bear patiently the cross of grief or p", "verses": ["Be still my soul; the Lord is on th side; Bear patiently the cross of grief or pam; Leave to thy God to order and provide, In every change He faithful will remain, Be still, my soul, thy best, thy heav'nly Frind, Through thorny ways leads to a joyful end. ;", "Be still, my soul; thy God doth undertake To guide the future as He hath the past Thy hope, thy confidence, let nothing shake. All now mysterious shall be bright at last. Be still, my soul; the waves and winds, still know, His voice who ruled them while He dwelt below.", "Be still, my soul; though dearest friends depart, And all is darkened in the vale of tears; Then shalt thou better know His love, His heart, Who comes to soothe thy sorrows and thy fears. Be still, my soul; thy Jesus can repay, From His own fullness, all He takes away.", "Be still, my soul; the hour is hastening on, When we shall be forever with the Lord, When disappointment, grief, and fear are gone, Sorrow forgot, love's purest joys restored. Be still, my soul; when change and tears are past, All safe and blessed we shall meet at last."], "credits": {"author": "K von Schl", "translator": "Jane Brothwick (", "tune": "Finl"}}, {"number": 257, "old_number": null, "title": "Still rejoice amid thy sorrows", "first_line": "Chosen seed and Zion's children, Ransomed from eternal wrath, Traveling to the h", "verses": ["Chosen seed and Zion's children, Ransomed from eternal wrath, Traveling to the heav'nly Canaan, On a rough and thorny path; Church of God, in Christ elected, Thou to God art reconciled, But on earth thou art a stranger, Persecuted and reviled.", "Still rejoice amid thy,trials, Nor regard thy lot amiss; For the kind and loving Savior, Is the source of all thy bliss; May He ever be thy portion, He who gave thee life and breath: In His keeping fear no evil, Now or in the hour of death.", "Pleasantly thy lines have fallen, Underneath the Tree of life: For the Lord is thy salvation, And thy shield in all thy strife: Here the timid bird finds shelter, Here the swallow finds a nest; Trembling fugitive a refuge, And the weary pilgrim rest.", "And upon this blest foundation, Lord, our Lord and Savior King, May Thy Spirit e'er unite us, To it may we ever cling. May we members of one body, Grow into a perfect whole; Grant, O Lord, that in Thy people, There may be one heart and soul.", "Ev'ry day the Lord Himself is near me, With a special mercy for each hour; All my cares He fain would bear and cheer me, He Whose name is Counselor and Pow'r. The protection of His child and treasure, Is a charge that on Himself He laid; \"As thy days, thy strength shall be in measure,\" This the pledge to me He made.", "Help me then, in ev'ry tribulation, So to trust Thy promises, O Lord, That I lose not faith's sweet consolation, Offered me within Thy holy word. Help me, Lord when toil and trouble meeting, E'er k to ta e as from a father's hand, One by one, th days, the moments fleeting, Till I reach the promised land."], "credits": {"author": "A. C. Rutstrom (1721-1772) (Swetkn) K. Sandell (1865) (", "translator": "Clautk W. Foss (1855-1935) Andrew L. Skoog (1856", "tune": "Lammets Folk Blott"}}, {"number": 258, "old_number": 352, "title": "Day by day, and with each passing moment", "first_line": "Day by day, and with each passing moment, Strength I find to meet my trials here", "verses": ["Day by day, and with each passing moment, Strength I find to meet my trials here; Trusting in my Father's wise bestowment, I've no cause for worry or for fear. He, Whose heart is kind beyond all measure, Gives unto each day what He deems best, Lovingly it's part of pain and pleasure, Mingling toil with peace and rest.", "Ev'ry day the Lord Himself is near me, With a special mercy for each hour; All my cares He fain would bear and cheer me, He Whose name is Counselor and Pow'r. The protection of His child and treasure, Is a charge that on Himself He laid; \" As thy days, thy strength shall be in measure,\" This the pledge to me He made.", "Help me then, in ev'ry tribulation, So to trust Thy promises, O Lord, That I lose not faith's sweet consolation, Offered me within Thy holy word. Help me, Lord when toil and trouble meeting, E'er to take as from a father's hand, One by one, thõ days, the moments fleeting, Till I reach the promised land."], "credits": {"author": "K. Sandell (1865) (Sweden)", "translator": "Andrew L. Skoog (1856-1934)", "tune": "Blott En Dag"}}, {"number": 259, "old_number": "354", "title": "Nor think amid the heat of strife", "first_line": "If thou but suffer God to guide thee, And hope in Him through all thy wa?'s, , H", "verses": ["If thou but suffer God to guide thee, And hope in Him through all thy wa?'s,, He'll give thee strength, whate er betide thee And bear thee through the evil days. ' Who trusts in God's unchanging love, Builds on the Rock that naught can move.", "What can these anxious cares avail thee, These never ceasing moans and sighs? What can it help if thou bewail thee, O'er e:ich dark moment as it flies? Our cross and tnals do but press, The heavier for our bitterness. 117", "Be patient and await His leisure, In chee rful hope with heart content, To take whate'er the Father's pleasure, And His discerning love hath sent, Nor doubt our inmo st wants are known, To Him Who chose us for His own.", "He knows the time for joy and truly, Will send it when He sees it meet; Whe n He has tried and purged thee duly. And finds thee free from all deceit, He comes to thee all unaware. And makes thee own His loving care.", "Nor think amid the heat of trial, That God hath cast thee off unheard; That he whose hopes meet no denial, Must surely be of God preferred; Time passes and much change doth bring, And sets a bound to everything.", "All are alike before the Highest; En Dag 'Tis easy to our God, we know, To raise thee up, though low thou liest, To make the rich man poor and low; True wonders still by Him are wrought, Who setteth up and brings to naug ht.", "Sing, pray, and keep His ways unswervin g; So do thine own part faithfully. And trust His word, though undeserving, Thou yet shalt find it true for thee, God never will forsake in need, The soul that trusts in Him indeed."], "credits": {"author": "G.Neumark (1641) (Germany)", "translator": "Catherine Winkworth (1855 1863)", "tune": "Neumark"}}, {"number": 260, "old_number": "357", "title": "My soul be joyful in the Lord", "first_line": "My soul be joyful in the Lord, And in good comfort ever. In troubles He doth hel", "verses": ["My soul be joyful in the Lord, And in good comfort ever. In troubles He doth help afford, Y'ell drown in perils never. One's path here doth not always lie, Amidst fair blooms and roses. Who trustingly in God confides, In comfort he reposes.", "For Joseph, Job, and David too, T'was manifested clearly, They many tears and sorrows knew, Afflicted were severely. Yet, at His pleasure God appeared, And graciously did aid them; Who trusts in God need never fear, The world cannot o'erwhelm them.", "Designs of Satan and the world, From God cannot me sever. I seek my refuge in the Lord, His grace He granteth ever. He always help for me provides, Forever I shall thank Him. Who trustingly in God abides, From him naught will be lacking.", "Wretched and blind, indeed, is he, Who 'pon this world trust places; Forsakes his Lord so heedlessly, Unhappiness he faces. For God in Christ our Helper is, Ne'er can be any other. Who thus believes, blessing is his, He lives in shelter. Amen."], "credits": {"author": "C. Schmucker", "tune": "0 Gud! Ditt Rike lngen Ser"}}, {"number": 261, "old_number": null, "title": "The Lord is my shepherd", "first_line": "The Lord is my Shepherd, no want shall I know; I feed in green pasture, safe fol", "verses": ["The Lord is my Shepherd, no want shall I know; I feed in green pasture, safe folded I rest; He leadeth my soul where the still waters flow, Restores me when wand'ring, redeems when oppressed. Restores me when wand'ring, redeems when oppressed.", "Through the valley and shadow of death though I stray, Since Thou art my Guardian, no evil I fear; Thy rod shall defend me, Thy staff be my stay; No harm can befall, with my Comforter near. No harm can befall, with my Comforter near.", "In the midst of affliction, my table is spread; With blessings unmeasured, my cup runneth o'er; With perfume and oil Thou annointest my head; O what shall I ask of Thy providence more? O what shall I ask of Thy providence more?", "Let goodness and mercy, my bountiful God, Still follow my steps till I meet Thee above; I seek, by the path which my forefathers trod, Through the land of their sojourn, Thy kingdom of love. Through the land of their sojourn, Thy kingdom of love."], "credits": {"author": "J.Montgomery (1822) (England)", "tune": "The Lord Is My Shepard, No Want Shall I Know"}}, {"number": 262, "old_number": "362", "title": "There is turmoil all around us", "first_line": "There is turmoil all around us, Many trials these latter days; May the Lord yet ", "verses": ["There is turmoil all around us, Many trials these latter days; May the Lord yet guard and guide us, Bless with grace His Church always. When surrounded by temptation, Fears and doubts rising within; Here we find sweet consolation, And remission for our sin.", "Come, all, thank the King of glory, For the victory He has brought; From the garden to Golgatha, Bloody footsteps He has trod. Come, behold in faith His suffering, Dying anguish He has borne. When world's vanity would tempt us, There behold His crown of thorn.", "We have no firm place of dwelling, While in this abode of clay; But the soul with expectation, Views the homeland where we may, Dwell with God in heaven's brightness, With the faithful, gone before; By His grace and love so boundless, We shall reach that glorious shore."], "credits": {"author": "A.Juvonen (US", "tune": "Conve"}}, {"number": 263, "old_number": null, "title": "We Christians should ever consider", "first_line": "We Christians should ever consider, What Christ hath so graciously taught; For H", "verses": ["We Christians should ever consider, What Christ hath so graciously taught; For He, Who hath made us His children, Would have us retain in our thought, How little things earthly do merit, Lest we, who should heaven inherit, The heavenly prize leave unsought.", "All nature a sermon may preach thee, The birs sing thy murmurs away; The birds, which not sowing nor reaping, God fails not to feed day by day; And He, Who those creatures doth cherish, He never will leave thee to perish; Or art thou not better than they?", "The lilies, nor toiling nor spinning, Their clothing how gorgeous and fair! What tints in their tiny robes woven, What wondrous devices are there! All Solomon's stores could not render, One festival robe of such splendor, As modest field lilies do wear.", "If God o'er the grass and the flowers Such delicate beauty hath spread The flow'rs which today are so fragrant, Tomorrow are faded and dead; Oh, why, then, should earthly cares fret thee? Thy Father will never forget thee, Nor fail to provide thee with bread.", "A) rse Hymns for Other Occasions Praise and Thanksgiving"], "credits": {"author": "H.Spegel, J.O. Wallin (Sweden)", "tune": "Oss Kristna Bor Tro Och Besinna"}}, {"number": 264, "old_number": "193", "title": "O Lord my God! When I in awesome wonder", "first_line": "Lord my God! When I in awesome wonder, Consider all the worlds Thy hands have ma", "verses": ["Lord my God! When I in awesome wonder, Consider all the worlds Thy hands have made, I see the stars I hear the roling thder, Thy pow'r throghout the universe displayed, Then sings my soul, my 2S2 Savior God to Thee; How great Thou art, How great Thou art! Then sings my soul, my Savior God to Thee; How great Thou art, How great Thou art!", "When through the woods and forest glades I wander, And hear the birds sing sweetly in the trees; When I look down from lofty mountains grandeur, And hear the brook and feel the gentle breeze; Then sings my soul, etc.", "And when I think that God, His Son not sparing, Sent Him to die, I scarce can take it in; That on the cross my burden gladly bearing, He bled and died to take away my sin; Then sings my soul, etc.", "When Christ shall come with shout of acclamation, And take me home, what joy shall fill my heart! Then I shall bow in humble adoration, And there proclaim, my God, how great Thou art! Then sings my soul, etc."], "credits": {"author": "C.G Boberg (1859-1940) (S", "translator": "S.", "tune": "0 Sto"}}, {"number": 265, "old_number": 104, "title": "O come, O come Immanuel", "first_line": "O come, O come Immanuel, And ransom captive Israel, That mourns in lonely exile ", "verses": ["O come, O come Immanuel, And ransom captive Israel, That mourns in lonely exile here, Until the Son of God appear. Rejoice! Rejoice! Immanuel has come to thee, O Israel. 2S3", "O come, Thou Rod of Jesse, free, Thine own from Satan's tyranny; From depths of hell Thy people save, And give them victory o'er the grave. Rejoice! Rejoice! Immanuel has come to thee, O Israel.", "O come, Thou Key of David, come, And open wide our heavenly home; Make safe the way that leads on high, And close the path to misery. Rejoice! Rejoice! Immanuel has come to thee, O Israel.", "O come, O come, Thou Lord of might, Who to Thy tribes on Sinai's height, In ancient time didst give the law, In cloud of majesty and awe. Rejoice! Rejoice! Immanuel has come to thee, O Israel."], "credits": {"author": "Latin: c. 12th century J.Montgomery (1816) (England)", "translator": "John Mason Neale (1851)", "tune": "Veni Emmanuel &gent Square"}}, {"number": 266, "old_number": 88, "title": "Angels, from the realms of glory", "first_line": "Angels, from the realms of glory, Wing your flight o'er all the earth; Ye who sa", "verses": ["Angels, from the realms of glory, Wing your flight o'er all the earth; Ye who sang creation's story, Now proclaim Messiah's birth. Come and worship, Come and worship, Worship Christ the newborn King.", "Shepherds in the fields abiding, Watching o'er your flocks by night, God with man is now residing, Yonder shines the infant Light. Come and worship, Come and worship, Worship Christ the newborn King.", "Sages, leave your contemplations, Brighter visions beam afar; Seek the great Desire of nations, Ye have seen His natal star. Come and worship, Come and worship, Worship Christ the newborn King.", "Saints before the altar bending, Watching long in hope and fear, Suddenly the Lord descending, In His temple shall appear. Come and worship, Come and worship, Worship Christ the newborn King."], "credits": {"author": "J.Montgomery (1816) (England)", "tune": "Regent Square"}}, {"number": 267, "old_number": "95", "title": "Come hither, ye faithful", "first_line": "Come hither, ye faithful, triumphantly sing! Come, see in the manger the angels'", "verses": ["Come hither, ye faithful, triumphantly sing! Come, see in the manger the angels' great King! To Bethlehem hasten . with joyful accord; O come ye, come hither to worship the Lord! O come ye, come hither to worship the Lord!", "True Son of the Father, He comes from the skies, To be born of a virgin He does not despise: T o Bethlehem hasten with joyful accord, O come ye, come hither to worship the Lo d! O come ye, come hither to worship the Lord!", "Hark! hark to the angels! all singing in heaven, \"To God in the highest all glory be given!\" To Bethlehem hasten with joyful accord; O come ye, come hither to worship the Lord! O come ye, come hither to worship the Lord!", "To Thee, then, O Jesus, this day of Thy birth, Be glory and honor through heaven and earth; True Godhead incarnate! Omnipotent Word! O come, let us hasten to worship the Lord! O come, let us hasten to worship the Lord!"], "credits": {"author": "J.F. Wade (1711-1786)", "translator": "E.Caswall (1870)", "tune": "Adeste Fid.eles"}}, {"number": 268, "old_number": null, "title": "Still through the cloven skies they come", "first_line": "It came upon a midnight clear, That glorious song of old, From angels bending ne", "verses": ["It came upon a midnight clear, That glorious song of old, From angels bending near the earth, To touch their harps of gold; Peace on the earth, good-will to men, From heavens all-gracious King; The world in solemn stillness lay, To hear the angels sing.", "Still through the cloven skies they come, With peaceful wings unfurled; And still celestial music floats, O'er allthe weary world; Above its sad and lowly plains, They bend on hovering wing; And ever o'er it's babel sounds, The blessed angels sing.", "Yet with the woes of sin and strife, The world has suffered long; Beneath the angel strain have rolled, Two thousand years of wrong; And men at war with men, hear not, The love-song which they bring; O hush the noise, ye men of strife, And hear the angels sing.", "And ye, beneath life's crushing load, Whose forms are bending low, Who toil along the climbing way, with painful steps and slow; Look up, for glad and golden hours, Come swiftly on the wing; O rest beside the weary road, And hear the angels sing."], "credits": {"author": "E.H. Sears (1849) (USA)", "tune": "Carol"}}, {"number": 269, "old_number": null, "title": "When Christmas morn is dawning", "first_line": "When Christmas morn is dawning, In faith I would repair, Unto the lowly manger; ", "verses": ["When Christmas morn is dawning, In faith I would repair, Unto the lowly manger; My Saviour Heth there, Unto the lowly manger; My Saviour lieth there.", "How kind, O loving Saviour, To come from heaven above; From sin and evil save us, And keep us in Thy love, From sin and evil save us, And keep us in Thy love.", "We need Thee, blessed Jesus, Our dearest Friend thou art; Forbid that we by sinning, Should grieve Thy loving heart, Forbid that we by sinning, Should grieve Thy loving heart.", "Jesu ' Name so sweetly ringing; May It sound o er all the earth. Hope and comfort It is bringing; Nothing else compares in worth. That great Name destroys all hatred, From that Name all wrong must flee. By tha t Name the Heavenly Zion, Brings forth much fruit eternally! Jesus' Name! Oh, etc.", "In the midst of midnight's darkness Guides a Light - It's Jesus' Name. To all helpless souls revealing, That peaceful harbor, our high aim, When the sun shall shine no longer, Jesus' Name will light the skies. Then Its praises by the ransomed. Will be sung in Paradise. Jesus' Name! Oh, etc."], "credits": {"author": "ABurckhardt (1851) (Sweden) D. Welander (1923) (Norway)", "translator": "C.W.Foss", "tune": "Wir Hatten Gebauet Tune from Zululand"}}, {"number": 270, "old_number": 111, "title": "Jesus' Name has power eternal", "first_line": "Jesus' Name has power eternal, It will remain as time goes by. Jesus' Name will ", "verses": ["Jesus' Name has power eternal, It will remain as time goes by. Jesus' Name will last forever, Never destroyed; it's always nigh. Always bringing forth new fruit with Tidings for the young and old. It has power so to gather, E'en now Jesus' Name is told.", "Jesus' Name is sweetly sounding, In the ears of those redeemed. Jesus' Name in all abounding, To believers ever esteemed. It has pow'r to lift the fallen, Pow'r to comfort those who mourn, Pow'r to still the storms of life, And bring sunshine after storm.", "Jesus' Name, how sweet it ringeth, In this land so cold and dark; Jesus' Name, the message bringeth, Life and hope and love's own spark. When we hear His Name so blessed, We are strengthened for the way, And our hearts within are rested, Looking to the brighter day."], "credits": {"author": "Anonymous (Finland)", "tune": "Jesus' Name"}}, {"number": 271, "old_number": null, "title": "O Mary, listen to Jesus speaking", "first_line": "Mary's weeping, she doesn't know, Her friend beside Jesus' grave, He tells her s", "verses": ["Mary's weeping, she doesn't know, Her friend beside Jesus' grave, He tells her softly that Christ the Lord, No longer lies in the cave, So weep now, Mary, with sorrow's tears, If you cannot know your friend, I speak to you, O Mary, hear, My voice may you comprehend.", "O Mary, listen to Jesus' voice, He gently speaks to you dear. So bring glad tidings of comfort now, That I alive shall appear, And weep no more, O Mary, now, My voice softly testifies, Your Lord's arisen from where He lay, I stand now before your eyes.", "O Mary, you are My witness now, For I have called you by name, So go to Peter, this message bear, The empty grave there proclaim, Yes, go to Peter with joyful news, His Lord is buried no more, O stop your weeping Mary, hear: I am your Savior and Lord."], "credits": {"author": "K. T. Andersen (Norway)", "tune": "Maria. Grdter"}}, {"number": 272, "old_number": "29", "title": "There are treasures for children in heaven", "first_line": "Tb.ere are treasures for children in heaven above, For the children who trust in", "verses": ["Tb.ere are treasures for children in heaven above, For the children who trust in their Lord; They shall dwell in the light of His favor and love: They shall praise Him with joyous accord. Oh whatjoy willbe there in heaven so fair; Oh what joy little children will share, In that homeland above, In the light of God's love; Oh what joy little children will share.", "They shall drink of the river that flows from the throne, They shall feast with the ransomed and blest, They shall tell of His glory Who calls them His own, In that beautiful country of rest. Oh what joy will etc.", "At the fountain of life they shall dwell evermore, Heaven's life-giving bread they shall share; Night is ended and death so disturbing is o'er, God shall reign with His children for e'er. Oh what joy will etc."], "credits": {"author": "A.Midlane (1859) (England)", "tune": "There Are Treasures For Children"}}, {"number": 273, "old_number": "31", "title": "Like the stars of the morning", "first_line": "When He cometh, when He cometh, To make up His jewels, All His jewels, precious ", "verses": ["When He cometh, when He cometh, To make up His jewels, All His jewels, precious jewels, His loved and His own. Like the stars of the morning, His bright crown adorning, They shall shine in their beauty, Bright gems for His crown.", "He will gather, He will gather, The gems for His kingdom, All the pure ones, All the bright ones, His loved and His own. Like the stars of etc.", "Little children, little children, Who love their Redeemer, Are the jewels, preciousjewels, His loved and His own. Like the stars of etc."], "credits": {"author": "W.O.Cushing (1856) (USA", "tune": "When He Cometh"}}, {"number": 274, "old_number": null, "title": "How sweet the Name of Jesus sounds", "first_line": "How sweet the Name of Jesus sounds, In a believer's ear! It soothes his sorrows,", "verses": ["How sweet the Name of Jesus sounds, In a believer's ear! It soothes his sorrows, heals his wounds, And drives away his fear.", "It makes the wounded spirit whole, And calms the troubled breast; 'Tis manna to the hungry soul, And to the weary, rest.", "Dear Name, the Rock on which I build, My Shield and Hiding Place, My never failing treasury, filled, With boundless stores of grace!", "Jesus! my Savior, my true Friend, O Prophet, God and King, My Lord, my Life, my Way, my End, To Thee all praise I bring."], "credits": {"author": "J.Newton (1779) (England) A.H. Olander (1904) (", "tune": "Belmont", "translator": "Composite tra"}}, {"number": 275, "old_number": null, "title": "If I gained the world, but lost the Savior", "first_line": "(lG5) In gained the world, but lost the Savior, Were my life worth living for a ", "verses": ["(lG5) In gained the world, but lost the Savior, Were my life worth living for a day? Could my yearning heart find rest and comfort, In the things that soon must pass away? If I gained the world, but lost the Savior Would my gain be worth the lifelong strife? Are all earthly pleasures worth comparing For a moment with a Christ filled life? '", "Had I wealth and love in fullest measure And a name revered both far and near, Yet no hope beyond, no harbor waiting, Where my storm-tossed vessel I could steer- If I gained the world, but lost the Savior,' Who endured the cross and died for me. Could ùhen all thú world afford a refuge, Whither, m my anguish I might flee?", "Oh what emptiness! Without the Savior 'Mid the sins and sorrows here below! And eternity how dark without Him! Only night d tea;s and endless woe! What, though I might hve without the Savior When I come to die how would it be? Oh tΏ face the valley's gloom without Him! And without Him all eternity!", "Oh the joy of having all in Jesus! What a balm the broken heart to heal! Ne'er a sin so great but He'll forgive it; Nor a sorrow that He does not feel! If I have but Jesus, only Jesus, Nothing else in all the world beside, Oh then ev'rything is mine in Jesus; For my needs and more He will proyide."], "credits": {"author": "A.H. Olander (1904) (Sweden)", "translator": "Composite translation", "tune": "Olander"}}, {"number": 276, "old_number": "166", "title": "I'm a pilgrim, and I'm a stranger", "first_line": "I'm a pilgrim, and I'm a stranger; I can tarry, I can tarry but a night! Do not ", "verses": ["I'm a pilgrim, and I'm a stranger; I can tarry, I can tarry but a night! Do not detain me, for I am going, To where the fountains are ever flowing. I'm a pilgrim, and I'm a stranger, I can tarry, I can tarry but a night.", "Of that city to which I journey, My Redeemer, My Redeemer is the Light; There is no sorrow, nor any sighing, Nor any tears there, nor any dying. I'm a pilgrim, etc.", "There the sunbeams are ever shining, Oh, my longing, Oh, my longing heart is there; Here in this country, so dark and dreary, I long have wandered forlorn and weary. I'm a pilgrim, etc."], "credits": {"author": "M.S.D.Shindl.er (1841", "tune": "Buono"}}, {"number": 277, "old_number": null, "title": "Let the Heavenly Pilot guide you", "first_line": "Oft in fear and dismay do you ponder, The great goal that's beyond this life's s", "verses": ["Oft in fear and dismay do you ponder, The great goal that's beyond this life's sea, In your heart might a tempest be raging, With the trials too heavy to bear. Let the Heavenly Pilot take over, And your vessel will glide o'er the wave, When the storm on the ocean is raging, He's able and willing to save.", "When all hope to reach harbor has ended. And all thoughts for salvation depart, Just for you God's warm arms are now open, Sorrow flees and new joy fills your heart. Let the Heavenly Pilot etc."], "credits": {}}, {"number": 278, "old_number": null, "title": "Swift as a dream doth our lifetime appear", "first_line": "Swift as a dream doth the time fleet away, Year after year in its flight, /: Lif", "verses": ["Swift as a dream doth the time fleet away, Year after year in its flight, Life like a stream in its course hurries on, Short is the day ere the night.", "Gone is the yesterday ne'er to return, Gone from our life evermore, Yet not forgotten in records of time, Kept on eternity's shore.", "Into this world just to live and to die, Short and uncertain our life, Soon to go out as a flickering light, Ending all sorrow and strife.", "Flee from the world and its glamor and fame, All of it passes away; Build thee a mansion in heaven above, There in eternity stay."], "credits": {"tune": "Livet Forsvinner I Hast Som En"}}, {"number": 279, "old_number": "264", "title": "O yes, He cares, I know He cares", "first_line": "Does Jesus care when my heart is pained Too deeply for mirth or song; As the bur", "verses": ["Does Jesus care when my heart is pained Too deeply for mirth or song; As the burd ns press, and the cares distress, And the way grows weary and long? O yes, He cares, I know He cares, His heart is touched with my grief. When the days are weary, the long nights dreary, I know my Savior cares.", "Does Jesus care when my way is dark, With a nameless dread and fear? As the daylight fades into deep night shades, Does He care enough to be near? O yes, He cares, etc.", "Does Jesus care when I've tried and failed To resist some temptation strong; When' for my deep grief, I find no relief, Tho my tears flow all the night long? O yes, He cares, etc.", "Does Jesus care when I've said \"goodbye,\" To the dearest on earth to me, And my sad heart aches, till it nearly breaks, Is it aught to Him? Does He see? O yes, He cares, etc."], "credits": {"author": "F.E. Graeff(1901) (USA)", "tune": "My Saviour Cares"}}, {"number": 280, "old_number": "335", "title": "Amazing grace! How sweet the sound", "first_line": "Amazing grace! How sweet the sound, That saved a wretch like me! I once was lost", "verses": ["Amazing grace! How sweet the sound, That saved a wretch like me! I once was lost, but now am found; Was blind, but now I see.", "Twas grace that taught my heart to fear, And grace my fears relieved; How precious did that grace appear, The hour I first believed!", "Through many dangers, toils, and snares, I have already come; 'Tis grace hath brought me safe thus far, And grace will lead me home.", "When we've been there ten thousand years, Bright shining as the sun, We've no less days to sing God's praise, Than when we first begun. Au.tlwr: J.Newton (1725-1807)"], "credits": {"tune": "New Britain"}}, {"number": 281, "old_number": "201", "title": "Ring the bells of heaven", "first_line": "Ring the bells of heaven, There is joy today, For a soul returning from the wild", "verses": ["Ring the bells of heaven, There is joy today, For a soul returning from the wild; See the Father meet him out upon the way, And His servants robe the wandering child. Glory, glory, how the angels sing, Glory, glory, how the loud harps ring. 'Tis a ransomed army like a mighty sea, Pealing forth the anthem of the free.", "Ring the bells of heaven, There is joy today, For a wandr'er now is reconciled; Yes, a soul is rescued from his sinful way, And is born anew a ransomed child. Glory, glory, how etc.", "Ring the bells of heaven, Spread the feast today, Angels swell the glad, triumphant strain; Tell the joyful tidings, bear it far away, For a precious soul is born today. Glory, glory, how etc."], "credits": {"author": "W.O.Cushing (1866)", "tune": "Ring The Bells OfHe"}}, {"number": 282, "old_number": "262", "title": "You are called to a wedding in Heaven", "first_line": "You are called to a wedding in Heaven, You're extended a welcome of God, Therefo", "verses": ["You are called to a wedding in Heaven, You're extended a welcome of God, Therefore purge from you this world's vain pleasures, Come today when this call sounds abroad. You are called to a wedding in Heaven, It is you who shall be His own bride, Let Him draw you away from false pleasures, Come today with His invite abide.", "All is ready in Heaven; they wait there, Yes, they wait; therefore do not delay, Soon Himself shall He come to receive you, All who travel that Heavenly way. You are called to etc.", "Hear, my friend, tell me what you shall answer, When this heavenly call comes your way? Will you hasten to heed His high calling? Answer, \"Yes, since I'm called, I'll obey.\" You are called to the supper in heaven, Oh believe it and make no delay; Jesus knocks at the door, I will open, He has called me, and I will obey."], "credits": {"author": "J.Jensen (Norway)", "tune": "Du Er lnnbudt Til Bryllup I Him.kn"}}, {"number": 283, "old_number": null, "title": "I am Thine, O Lord, I have heard Thy voice", "first_line": "I am Thine, O Lord, I have heard Thy voice, And it told Thy love to me; But I lo", "verses": ["I am Thine, O Lord, I have heard Thy voice, And it told
