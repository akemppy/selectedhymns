 Is thy heart with conflict pressed? Is thy soul still harassed sore? See His bloody sweat, His conflict, Watch His agony increase, Hear His prayer, and taste His peace!", "Art thou by sore want surrounded? Do thy pains press forth thy sighs? Art thou wronged and deeply wounded? Does a scornful world despise? Friends forsake thee or deny thee? See what Jesus must endure, He Who as the light was pure!", "Look to Jesus still to shield thee, When this dwelling thou must leave, In that last need He will shield thee, Peace the world can never give. Look to Him, thy head low bending: He, Who finished all for thee, Takes thee then with Him to be."], "credits": {"author": "F.M.Franzen (1772-1847) (Sweden)", "tune": "Jesu Hav I Standigt Minne"}}, {"number": 206, "old_number": null, "title": "Jesus, Priceless Treasure", "first_line": "Jesus, priceless Treasure, Fount of purest pleasure, Truest Friend to me. Ah, ho", "verses": ["Jesus, priceless Treasure, Fount of purest pleasure, Truest Friend to me. Ah, how long in anguish, Shall my spirit languish, Yearning, Lord, for Thee? Thou art ine, O Lamb divine! I will suffer naught to hide Thee, Naught I ask beside Thee.", "In Thine arms I rest me; Foes who would molest me, Cannot reach me here. Though he earth be shaking, Every heart be quaking, Jesus calms my fear. Lightnings fl.ash and thunders crash; Yet, though sin and hell assail me, Jesus will not fail me.", "Fear, I bid thee cease. World, thou shalt not harm me, Nor thy threats alarm me, While I sing of peace. God's great power guards every hour; Earth and all its depths adore Him, Silent bow before Him.", "Hence, all fear and sadness! For the Lord of gladness, Jesus, enters in. Those who love the Father, Though the storms may gather, Still have peace within. Yea, whate'er I here must bear, Thou art still my purest Pleasure, Jesus, priceless Treasure!"], "credits": {"author": "J.Freudo (1655) (Ge", "translator": "Composite tran", "tune": "Jesu, Meine"}}, {"number": 207, "old_number": "284", "title": "My faith looks up to Thee", "first_line": "My faith looks up to Thee, Thou Lamb of Calvary, Savior Divine! Now hear me whil", "verses": ["My faith looks up to Thee, Thou Lamb of Calvary, Savior Divine! Now hear me while I pray, Take all my guilt away, O let me from this day, Be wholly Thine.", "May Thy rich grace impart, Strength to my fainting heart, My zeal inspire; As Thou hast died for me, O, may my love to Thee, Pure, warm, and changeless be, A living fire.", "While life's dark maze I tread, And griefs around me spread, Be Thou my Guide; Bid darkness turn to day, Wipe sorrow's tears away; Nor let me ever stray, From Thee aside.", "When ends life's transient dream, When death's cold, sullen stream, Shall o'er me roll, Blest Savior, then, in love, Fear and distrust remove; O bear me safe above, A ransomed soul."], "credits": {"author": "R.Palmer (1830) (USA)", "tune": "Olivet"}}, {"number": 208, "old_number": "285", "title": "Nearer, my God, to Thee", "first_line": "Nearer, my God to Thee NearN b er to Thee, E'en though it e a cros That raiseth ", "verses": ["Nearer, my God to Thee NearN b er to Thee, E'en though it e a cros That raiseth me; Still allmy song shall be, earer my God, to Thee; Nearer, my God, to Thee; Nearer to Thee!", "Though like the wanderer, The sun gone rmany) dow!l, Darkness be over me, My rest a stone; slation Yet m my dreams I'd be, Nearer my God, etc. Freude", "There let the way appear, Steps unto Heaven; All that Thou sendest me, In mercy given; Angels to beckon me, Nearer my God, to Thee; Nearer, my God, to Thee; Nearer to Thee!", "Or if on joyful wing, Cleaving the sky, Sun, moon, and stars forgot, Upward I fly; Still all my song shall be, Nearer my God, etc."], "credits": {"author": "S.F.Adam (1841) (England)", "tune": "Bethany"}}, {"number": 209, "old_number": "231", "title": "Lord, crown our faith's great endeavor", "first_line": "God the Rock of ages, Who , evermore hast been, Although the tempest rages, Our ", "verses": ["God the Rock of ages, Who, evermore hast been, Although the tempest rages, Our dwelling place serene; Before Thy first creations, O Lord, the same as now, To endless generations, The everlasting, Thou!", "Our years are like the shadows, On sunny hills that lie, Or grasses in the meadows, That blossom but to die: A sleep, a dream, a story, By strangers quickly told, An unremaining glory, Of things that soon are old.", "O Thou, Who canst not slumber, Whose light grows never pale, Teach us aright to number, Our years before they fail; On us Thy mercy lighten, On us Thy goodness rest, And let Thy Spirit brighten, The hearts Thyself hast blessed.", "Lord, crown our faith's endeavor, With beauty and with grace, Till, clothed in light forever, We see Thee face to face; A joy no language measures, A fountain brimming o'er, An endless flow of treasures, An ocean without shore."], "credits": {"author": "E.H.Bickersteth, Jr. (1862"}}, {"number": 210, "old_number": null, "title": "I hear Him speak, I know His voice", "first_line": "The little while I linger here Should grief and sorrow fret me? No; Jesus is my ", "verses": ["The little while I linger here Should grief and sorrow fret me? No; Jesus is my Shepherd dear, He never will forget me. He gave His life His flock to save, His Spirit and His word He gave. With these He's ever with us.", "I hear Him speak, I know His voice, I go : where'er He beckons. His own He knows they are His choice, '!h eir numbers, too He reckons. And He will seek the straying sheep, The feeble in His bosom keep And ' gently raise the fallen.", "He strengthens me with living bread, With \"='a rs sweet and gracious, Which flow from 1fe s great Fountain-head, With peace and oy most precious. Though rough and thorny is my way, If from His path I do not stray I ' shall not be forsaken.", "How empty the world's pomp and show How brief its joys and pleasures! The nigh t approaches now, and lo! We leave all earthly treasures. Then, what are all things here belo, To Jesus' promise, \"Where I go, I will receive you also.\"", "Not a shadow can rise, Not a cloud in the skies, But His smile quickly drives it away; Not a doubt nor a fear, Not a sigh nor a tear, Can abide while we trust and obey. Trust and obey, etc.", "But we never can prove, The delights of His love, Until all on the altar we lay; For the favor He shows, And the joy He bestows, Are for them who will trust and obey. Trust and obey, etc.", "Then in fellowship sweet, We will sit at His feet, Or we11 walk by His side in the way; What He says we will do, Where He sends we will go, Never fear only trust and obey. Trust and obey, etc."], "credits": {"author": "F.M.Fro.nzen (Sweden) J.H.Sammis (1887)", "tune": "Den Knrta Stund, Jag Vandrar Har Trust an"}}, {"number": 211, "old_number": 170, "title": "When we walk with the Lord", "first_line": "When we walk with the Lord In the light of His word, What a glory He shΡds on ou", "verses": ["When we walk with the Lord In the light of His word, What a glory He shΡds on our way! While we do His good will He abides with us still, And with all who' will trust and obey. Trust and obey, For there's no other way, To be happy in Jesus, But to trust and obey.", "āot a shadow can rise, Not a cloud in the skies, But His smile quickly drives it away; Not a doubt nor a fear, Not a sigh nor a tear, Can abide while we trust and obey. Trust and obey, etc.", "But we never can prove, The delights of His love, Until all on the altar we lay; For the favor He shows, And the joy He bestows, Are for them who will trust and obey. Trust and obey, etc.", "Then in fellowship sweet, We will sit at His feet, Or we11 walk by His side in the way; What He says we will do, Where He sends we will go, Never fear only trust and obey. Trust and obey, etc."], "credits": {"author": "J.H.Sammis (1887) (USA)", "tune": "Trust and Obey"}}, {"number": 212, "old_number": "211", "title": "Abide, O dearest Jesus", "first_line": "Abide, O dearest Jesus, Among us with Thy grace, That Satan may not harm us, Nor", "verses": ["Abide, O dearest Jesus, Among us with Thy grace, That Satan may not harm us, Nor we to sin give place.", "Abide, O dear Redeemer, Among us with Thy word, And thus now and hereafter, True peace and joy afford.", "Abide with heav'nly brightness, Among us, precious Light; Thy truth direct and keep us, From error's gloomy night.", "Abide with richest blessings, Among us, bounteous Lord; Let us in grace and wisdom, Grow daily through Thy word.", "Abide with Thy protection, Among us, Lord, our Strength, Lest world and Satan fell us, And overcome at length.", "Abide, O faithful Savior, Among us with Thy love; Grant steadfastness and help us' To reach our home above."], "credits": {"author": "J.Stegmann (1628) (Germany)", "translator": "A.Crull (1892)", "tune": "Christus Der Ist Mein Leben"}}, {"number": 213, "old_number": 215, "title": "Father! Whate'er of earthly bliss", "first_line": "Father! Whate'er of earthly bliss, Thy sovereign will denies, Accepted at Thy th", "verses": ["Father! Whate'er of earthly bliss, Thy sovereign will denies, Accepted at Thy throne of grace, Let this petition rise:", "Give me a calm, a thankful heart, From every murmur free; The blessings of Thy grace impart, And make me live to Thee.", "Let the sweet hope that Thou art mine, My life and death attend; Thy presence through my journey shine, And crown my journey's end."], "credits": {"author": "A.Steele (1760) (England)", "tune": "Naomi"}}, {"number": 214, "old_number": "219", "title": "Holy Ghost, dispel our sadness", "first_line": "Holy Ghost, dispel our sadness. Pierce the clouds of sinful night; Come, Thou so", "verses": ["Holy Ghost, dispel our sadness. Pierce the clouds of sinful night; Come, Thou source of sweetest gladness, Breathe Thy life, and spread Thy light! Loving Spirit, God of peace! Great Distributor of grace! Rest upon this congregation, Hear, O hear our supplication!", "Known to Thee are all recesses, Of the earth and spreading skies; Every sand the shore possesses, Thy omniscient mind descries. Holy Fountain! Wash us clean, Both from error and from sin! Make us flee what Thou refusest, And delight in what Thou choosest!", "Manifest Thy love forever; Fence us in on every side; In distress be our reliever, Guard and teach, support and guide! Let Thy kind effectual grace, Turn our feet from evil ways; Show Thyself our new creator, And conform us to Thy nature!"], "credits": {"author": "P.Gerhardt (1684) (G", "translator": "J.", "tune": "Freu Dich Sehr (Gene"}}, {"number": 215, "old_number": "222", "title": "Jesus, Lord, and precious Savior", "first_line": "Jesus, Lord, and precious Savior, All my comfort and my joy! Graciously extend T", "verses": ["Jesus, Lord, and precious Savior, All my comfort and my joy! Graciously extend Thy favor, Let Thy word my soul employ. Jesus come, abide with me, Let me ever be with Thee.", "Let my words and thoughts, O Savior, To Thy praise and glory tend; Help me, Lord, that I may gather, Treasures that shall never end. Jsus come, abide with me, Let me ever be with Thee.", "When my days on earth are over, Let me gladly take my rest; May the time come blessed Savior; When to Thee it seemetl best. Jesus come, abide with me, Let me ever . be with Thee.", "English by ANelson (1863 . 1949)"], "credits": {"author": "J.Arrhenius (Germany)", "translator": "German ro Swedish: by J.0. Wallin ;", "tune": "Kalmar"}}, {"number": 216, "old_number": "223", "title": "Jesus, Savior, pilot me", "first_line": "Jesus, Savior, pilot me, Over life's tempestuous sea; Unknown waves before me ro", "verses": ["Jesus, Savior, pilot me, Over life's tempestuous sea; Unknown waves before me roll, Hiding rocks and treacherous shoal; Chart and compass come from Thee' Jesus, Savior, pilot me.", "As a mother stills her child, Thou canst hush the ocean wild; Boisterous waves obey Thy will, When Thou sayest to them \"Be still!\" Wondrous Sov'reign of the sea, Jesus,
